<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#E8622A;min-height:100vh;
    font-family:'Space Mono',monospace;
    overflow-x:hidden;position:relative;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px);
    background-size:28px 28px;pointer-events:none;z-index:0;
  }
  .bg-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .c1{width:480px;height:480px;background:#D4501F;top:-140px;right:-100px;opacity:0.4;}
  .c2{width:300px;height:300px;background:#C94318;bottom:-90px;left:-70px;opacity:0.35;}

  /* NAV */
  .topnav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    padding:16px 48px;
    display:flex;justify-content:space-between;align-items:center;
    background:rgba(232,98,42,0.85);backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(255,255,255,0.1);
  }
  .logo{
    font-family:'Cormorant Garamond',serif;
    font-size:18px;font-weight:300;
    color:#FFF5E6;text-decoration:none;letter-spacing:0.04em;
  }
  .logo em{font-style:italic;color:#FFD4A8;}
  nav{display:flex;flex-wrap:wrap;gap:8px;}
  nav a{
    padding:7px 16px;
    border:1px solid rgba(255,245,230,0.3);
    border-radius:99px;font-size:10px;
    letter-spacing:0.1em;text-transform:uppercase;
    color:#FFF5E6;text-decoration:none;
    background:rgba(255,255,255,0.08);
    transition:background 0.2s,border-color 0.2s;
  }
  nav a:hover,nav a.active{background:rgba(255,255,255,0.22);border-color:rgba(255,245,230,0.7);}

  .page-content{
    position:relative;z-index:10;
    max-width:860px;margin:0 auto;
    padding:110px 48px 80px;
  }
  .page-title{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(40px,7vw,72px);font-weight:300;
    color:#FFF5E6;line-height:1;margin-bottom:8px;
  }
  .page-title em{font-style:italic;color:#FFD4A8;}
  .page-label{
    font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
    color:rgba(255,245,230,0.5);margin-bottom:48px;display:block;
  }
  .divider{
    width:48px;height:1px;
    background:rgba(255,245,230,0.3);
    margin:32px 0;
  }

  @media(max-width:600px){
    .topnav{padding:12px 20px;}
    .page-content{padding:90px 24px 60px;}
    nav a{padding:6px 12px;font-size:9px;}
  }

  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:start;}
  .about-char{display:flex;justify-content:center;}
  .about-char img{width:180px;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.2));}
  .about-text{font-size:13px;line-height:2.1;color:rgba(255,245,230,0.8);letter-spacing:0.03em;}
  .about-text p+p{margin-top:18px;}
  .tag-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:28px;}
  .tag{
    padding:6px 14px;border:1px solid rgba(255,245,230,0.3);
    border-radius:99px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
    color:rgba(255,245,230,0.7);
  }
  @media(max-width:600px){.about-grid{grid-template-columns:1fr;}}
</style>
