<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#E8622A;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Mono',monospace;overflow:hidden;position:relative;cursor:pointer;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
  .bg-circle{position:fixed;border-radius:50%;pointer-events:none;}
  .c1{width:480px;height:480px;background:#D4501F;top:-140px;right:-100px;opacity:0.45;}
  .c2{width:300px;height:300px;background:#C94318;bottom:-90px;left:-70px;opacity:0.4;}
  .c3{width:160px;height:160px;background:#F07840;top:55%;left:6%;opacity:0.25;}
  .container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:40px 24px;}
  .char-scene{position:relative;width:240px;height:260px;display:flex;align-items:flex-end;justify-content:center;}
  #charSleep,#charWake{position:absolute;bottom:20px;width:160px;transition:opacity 0.2s;}
  #charSleep{animation:sleep-sway 3s ease-in-out infinite;transform-origin:bottom center;}
  #charWake{opacity:0;pointer-events:none;}
  #charSleep img,#charWake img{width:160px;height:160px;object-fit:contain;object-position:bottom center;filter:drop-shadow(0 8px 24px rgba(0,0,0,0.25));}
  @keyframes sleep-sway{0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);}}
  #charSleep.hide{opacity:0;}
  #charWake.show{opacity:1;}
  @keyframes jolt{0%{transform:rotate(0deg);}20%{transform:rotate(-10deg) scale(1.08);}40%{transform:rotate(8deg);}60%{transform:rotate(-4deg);}80%{transform:rotate(2deg);}100%{transform:rotate(0deg);}}
  #charWake.jolt{animation:jolt 0.4s ease-out;}
  .bubbles{position:absolute;top:0;right:0;display:flex;flex-direction:column-reverse;align-items:flex-start;gap:6px;pointer-events:none;z-index:4;transition:opacity 0.3s;}
  .bubble{background:rgba(255,255,255,0.92);border:2px solid rgba(255,255,255,0.6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#888;animation:bubble-float var(--dur,2.4s) ease-in-out infinite var(--delay,0s);}
  .bubble:nth-child(1){width:28px;height:28px;--dur:2.4s;--delay:0s;font-size:9px;}
  .bubble:nth-child(2){width:40px;height:40px;--dur:2.4s;--delay:0.15s;}
  .bubble:nth-child(3){width:54px;height:54px;--dur:2.4s;--delay:0.3s;font-size:14px;}
  @keyframes bubble-float{0%,100%{transform:translateY(0) scale(1);opacity:0.9;}50%{transform:translateY(-8px) scale(1.05);opacity:1;}}
  .bubble.pop{animation:pop 0.3s ease-out forwards!important;}
  @keyframes pop{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:0.5;}100%{transform:scale(0);opacity:0;}}
  .char-shadow{position:absolute;bottom:4px;width:110px;height:14px;background:rgba(0,0,0,0.2);border-radius:50%;animation:shad 3s ease-in-out infinite;}
  @keyframes shad{0%,100%{transform:scaleX(1);opacity:0.2;}50%{transform:scaleX(0.85);opacity:0.12;}}
  .title-block{text-align:center;margin-top:16px;}
  .site-name{font-family:'Cormorant Garamond',serif;font-size:clamp(46px,10vw,86px);font-weight:300;line-height:0.95;color:#FFF5E6;letter-spacing:-0.01em;}
  .site-name em{font-style:italic;color:#FFD4A8;display:block;}
  .tagline{margin-top:12px;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,245,230,0.55);}
  .hint{margin-top:10px;font-size:10px;letter-spacing:0.12em;color:rgba(255,245,230,0.38);animation:hint-blink 2s ease-in-out infinite;}
  @keyframes hint-blink{0%,100%{opacity:0.38;}50%{opacity:0.7;}}
  nav{margin-top:32px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
  nav a{padding:10px 22px;border:1px solid rgba(255,245,230,0.3);border-radius:99px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#FFF5E6;text-decoration:none;background:rgba(255,255,255,0.08);transition:background 0.2s,border-color 0.2s;}
  nav a:hover{background:rgba(255,255,255,0.2);border-color:rgba(255,245,230,0.65);}
  .footer-text{position:fixed;bottom:20px;font-size:10px;letter-spacing:0.1em;color:rgba(255,245,230,0.3);}
  @media(max-width:480px){nav a{padding:8px 14px;font-size:10px;}}
</style>
</head>
