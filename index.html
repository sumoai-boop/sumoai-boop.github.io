<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

  body{
    min-height:100vh;
    font-family:'Space Mono',monospace;
    overflow:hidden;
    position:relative;
    cursor:default;
    background:#000;
  }

  /* 全螢幕自然桌布 SVG */
  .wallpaper{
    position:fixed;inset:0;z-index:0;
    width:100%;height:100%;
  }

  /* Menubar */
  .menubar{
    position:fixed;top:0;left:0;right:0;z-index:100;
    height:28px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    font-size:12px;color:rgba(255,255,255,0.92);
    letter-spacing:0.02em;
  }
  .menubar-left{display:flex;align-items:center;gap:16px;font-weight:600;}
  .menubar-right{display:flex;align-items:center;gap:12px;font-size:11px;opacity:0.85;}
  .mb-menu{padding:0 6px;border-radius:4px;cursor:default;transition:background 0.15s;font-size:12px;}
  .mb-menu:hover{background:rgba(255,255,255,0.2);}
  .apple-logo{font-size:14px;}

  /* ── Dock ── */
  .dock-wrap{
    position:fixed;bottom:20px;left:50%;
    transform:translateX(-50%);
    z-index:200;
    transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
  }
  .dock-wrap.hidden{
    transform:translateX(-50%) translateY(calc(100% + 20px));
    opacity:0;
  }
  /* 觸發區：底部感應條 */
  .dock-trigger{
    position:fixed;bottom:0;left:0;right:0;height:6px;z-index:199;
  }
  .dock{
    display:flex;align-items:flex-end;gap:10px;
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:22px;
    padding:10px 16px;
    box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .dock-item{
    display:flex;flex-direction:column;align-items:center;
    gap:4px;text-decoration:none;
    position:relative;cursor:pointer;
  }
  .dock-icon{
    width:60px;height:60px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:30px;
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 4px 16px rgba(0,0,0,0.3);
  }
  .dock-item:hover .dock-icon{transform:translateY(-14px) scale(1.28);}
  .dock-label{
    font-size:9px;letter-spacing:0.06em;
    color:rgba(255,255,255,0.85);
    text-transform:uppercase;
    opacity:0;transition:opacity 0.15s;
    white-space:nowrap;
    background:rgba(0,0,0,0.6);
    padding:2px 7px;border-radius:4px;
    position:absolute;bottom:-22px;
  }
  .dock-item:hover .dock-label{opacity:1;}
  .dock-sep{
    width:1px;height:48px;
    background:rgba(255,255,255,0.22);
    margin:0 4px;align-self:center;
  }

  .ic-about  {background:linear-gradient(135deg,#667eea,#764ba2);}
  .ic-photos {background:linear-gradient(135deg,#f093fb,#f5576c);}
  .ic-dramas {background:linear-gradient(135deg,#1a1a2e,#e8622a);}
  .ic-food   {background:linear-gradient(135deg,#f7971e,#ffd200);}
  .ic-travel {background:linear-gradient(135deg,#0f2027,#2c5364);}
  .ic-threads{background:linear-gradient(135deg,#111,#333);}
  .ic-uber{background:linear-gradient(135deg,#000,#1a1a1a);border:2px solid rgba(255,255,255,0.3);}

  @media(max-width:600px){
    .dock-icon{width:46px;height:46px;font-size:22px;border-radius:12px;}
    .dock{gap:7px;padding:8px 12px;}
  }
</style>
</head>
<body>
<!-- 桌布（日夜自動切換）-->
<img id="wallpaper" style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;" alt="">
<script>
(function(){
  var DAY = "https://sumoai-boop.github.io/wallpaper-xp.jpg";
  var NIGHT = "https://sumoai-boop.github.io/wallpaper-xp.jpg";
  function updateWallpaper(){
    var h = new Date().getHours();
    // 06:00~18:00 白天；其餘夜晚
    document.getElementById('wallpaper').src = DAY;
  }
  updateWallpaper();
  // 每分鐘檢查一次
  setInterval(updateWallpaper, 60000);
})();
</script>

<!-- Menubar -->
<div class="menubar">
  <div class="menubar-left">
    <span class="apple-logo" style="font-size:16px;margin-right:4px">🗿</span>
    <a href="index.html" style="font-weight:700;margin-right:8px;color:rgba(255,255,255,0.92);text-decoration:none;">Sumoai's Reel</a>
    <span class="mb-menu">檔案</span>
    <span class="mb-menu">編輯</span>
    <span class="mb-menu">顯示方式</span>
    <span class="mb-menu">前往</span>
    <span class="mb-menu">視窗</span>
    <span class="mb-menu">輔助說明</span>
  </div>
  <div class="menubar-right">
    <!-- 藍芽 -->
    <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle">
      <path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/>
    </svg>
    <!-- WiFi -->
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle">
      <path d="M1 9l2 2c5.07-5.07 13.27-5.05 18.36 0l2-2C16.93 2.37 7.1 2.35 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.77 7.27-2.76 10.03 0l2-2C15.14 9.14 8.87 9.13 5 13z"/>
    </svg>
    <!-- 音量 -->
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
    <!-- 台灣國旗 -->
    <img src="https://flagcdn.com/16x12/tw.png" width="16" height="12" style="vertical-align:middle;border-radius:1px" alt="TW">
    <!-- 時間 -->
    <span id="mbTime" style="letter-spacing:0.03em"></span>
    <!-- 放大鏡 -->
    <svg width="13" height="13" viewBox="0 0 24 24" fill="rgba(255,255,255,0.85)" style="vertical-align:middle;cursor:default">
      <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
    </svg>
  </div>
</div>

<!-- Dock -->
<div class="dock-wrap">
  <div class="dock">
    <a href="about.html" class="dock-item" onclick="event.stopPropagation()">
      <div class="dock-icon ic-about">👤</div>
      <span class="dock-label">關於</span>
    </a>
    <a href="photos.html" class="dock-item" onclick="event.stopPropagation()">
      <div class="dock-icon ic-photos">📷</div>
      <span class="dock-label">照片</span>
    </a>
    <a href="dramas.html" class="dock-item" onclick="event.stopPropagation()">
      <div class="dock-icon ic-dramas">🎬</div>
      <span class="dock-label">追劇</span>
    </a>
    <a href="food.html" class="dock-item" onclick="event.stopPropagation()">
      <div class="dock-icon ic-food">🍜</div>
      <span class="dock-label">食記</span>
    </a>
    <div class="dock-sep"></div>
    <a href="travel.html" class="dock-item" onclick="event.stopPropagation()">
      <div class="dock-icon ic-travel">✈️</div>
      <span class="dock-label">旅遊足跡</span>
    </a>
    <a href="threads.html" class="dock-item" onclick="event.stopPropagation()">
      <div class="dock-icon ic-threads">🧵</div>
      <span class="dock-label">Threads</span>
    </a>
    <a href="uber.html" class="dock-item" onclick="event.stopPropagation()">
      <div class="dock-icon ic-uber">🚗</div>
      <span class="dock-label">Uber</span>
    </a>
  </div>
</div>

<!-- Dock 底部觸發區 -->
<div class="dock-trigger" id="dockTrigger"></div>

<script>
// Dock 自動隱藏（只在非首頁）
(function(){
  var isHome = true; // 首頁不隱藏
  var dock = document.querySelector('.dock-wrap');
  var trigger = document.getElementById('dockTrigger');
  if(!dock || !trigger || isHome) return;
  dock.classList.add('hidden');
  trigger.addEventListener('mouseenter', function(){
    dock.classList.remove('hidden');
  });
  dock.addEventListener('mouseleave', function(){
    dock.classList.add('hidden');
  });
})();

function updateTime(){
  const now = new Date();
  const d = ['日','一','二','三','四','五','六'][now.getDay()];
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('mbTime').textContent =
    `週${d} ${now.getMonth()+1}/${now.getDate()} ${h}:${m}`;
}
updateTime();
setInterval(updateTime, 10000);
</script>
</body>
</html>
