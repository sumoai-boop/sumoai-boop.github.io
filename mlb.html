<style>
  :root{
    --ink:#16130F;--card:#211D17;--card-edge:#322B22;
    --orange:#FD5A1E;--orange-soft:#FF8A5C;--cream:#EFE5D6;--muted:#9A8F80;--green:#6FBF73;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{background:var(--ink);color:var(--cream);font-family:'Noto Sans TC',sans-serif;min-height:100vh;}
  .num{font-family:'Archivo',sans-serif;font-variant-numeric:tabular-nums;}
/* ── Global Menubar ── */
.global-menubar{position:fixed;top:0;left:0;right:0;z-index:9999;height:28px;background:rgba(0,0,0,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;color:rgba(255,255,255,0.92);font-family:'Space Mono','Noto Sans TC',monospace;}
.gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
.gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
.mb-menu{padding:0 6px;border-radius:4px;cursor:default;font-size:12px;color:rgba(255,255,255,0.95);}
.mb-menu:hover{background:rgba(255,255,255,0.2);}
/* ── Global Dock ── */
.global-dock-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(calc(100% - 2px));z-index:9998;transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1),opacity 0.3s;opacity:0;}
.global-dock-wrap.visible{transform:translateX(-50%) translateY(-12px);opacity:1;}
.global-dock{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,0.16);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.25);border-radius:20px 20px 0 0;padding:10px 14px 14px;box-shadow:0 -4px 30px rgba(0,0,0,0.25);}
.gd-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;position:relative;}
.gd-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 3px 12px rgba(0,0,0,0.28);}
.gd-item:hover .gd-icon{transform:translateY(-10px) scale(1.22);}
.gd-label{font-size:9px;letter-spacing:0.05em;color:rgba(255,255,255,0.8);text-transform:uppercase;opacity:0;transition:opacity 0.15s;white-space:nowrap;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;position:absolute;bottom:-20px;font-family:monospace;}
.gd-item:hover .gd-label{opacity:1;}
.gd-sep{width:1px;height:40px;background:rgba(255,255,255,0.2);margin:0 3px;align-self:center;}
.gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
.ic-photos{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-dramas{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-food{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-travel{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-threads{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-uber{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-weight{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-reminder{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-netflix{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-mlb{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-chloe{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.dock-trigger-zone{position:fixed;bottom:0;left:0;right:0;height:8px;z-index:9997;}
  .wrap{max-width:1040px;margin:0 auto;padding:64px 24px 120px;}

  /* Hero title */
  .page-head{position:relative;padding:24px 0 36px;border-bottom:1px solid var(--card-edge);margin-bottom:40px;overflow:hidden;}
  .page-head::before{
    content:"MLB";position:absolute;right:-20px;top:-30px;
    font-family:'Archivo',sans-serif;font-weight:900;font-stretch:125%;
    font-size:min(180px,28vw);line-height:1;color:transparent;
    -webkit-text-stroke:1px rgba(253,90,30,.18);pointer-events:none;user-select:none;
  }
  .eyebrow{font-size:12px;letter-spacing:.28em;color:var(--orange);font-weight:700;margin-bottom:10px;font-family:'Space Mono',monospace;}
  h1.title{font-family:'Archivo','Noto Sans TC',sans-serif;font-weight:900;font-stretch:110%;font-size:clamp(30px,5.5vw,48px);line-height:1.05;}
  .subtitle{margin-top:12px;color:var(--muted);font-size:14px;letter-spacing:.03em;}

  /* Player grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:18px;}
  .pcard{
    position:relative;display:block;text-decoration:none;color:inherit;
    background:var(--card);border:1px solid var(--card-edge);border-radius:18px;
    padding:24px 18px 20px;overflow:hidden;
    transition:transform .22s cubic-bezier(.34,1.4,.64,1),border-color .22s,box-shadow .22s;
  }
  .pcard::after{
    content:attr(data-num);position:absolute;right:-6px;bottom:-22px;
    font-family:'Archivo';font-weight:900;font-stretch:125%;font-size:96px;line-height:1;
    color:transparent;-webkit-text-stroke:1px rgba(239,229,214,.06);pointer-events:none;
  }
  .pcard:hover{transform:translateY(-6px);border-color:var(--orange);box-shadow:0 14px 40px rgba(0,0,0,.45),0 0 0 1px rgba(253,90,30,.3);}
  .ph-wrap{position:relative;width:108px;height:108px;margin:0 auto 16px;}
  .ph-ring{
    position:absolute;inset:0;border-radius:50%;
    background:linear-gradient(145deg,var(--orange),#C23A0A);
    padding:3px;
  }
  .ph-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;background:#2A251D;display:block;}
  .pname-zh{text-align:center;font-size:19px;font-weight:900;letter-spacing:.02em;}
  .pname-en{text-align:center;font-family:'Archivo';font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--orange-soft);margin-top:3px;}
  .pteam{text-align:center;font-size:11.5px;color:var(--muted);margin-top:10px;letter-spacing:.04em;position:relative;z-index:1;}
  .ppos{display:inline-block;margin-top:9px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--cream);background:rgba(253,90,30,.16);border:1px solid rgba(253,90,30,.4);border-radius:999px;padding:2px 10px;position:relative;z-index:1;}
  .enter{text-align:center;margin-top:14px;font-size:11px;color:var(--muted);letter-spacing:.08em;opacity:0;transition:opacity .2s;position:relative;z-index:1;}
  .pcard:hover .enter{opacity:1;color:var(--orange);}

  .src-note{margin-top:48px;font-size:11.5px;color:var(--muted);letter-spacing:.04em;text-align:center;}
</style>

<script>
(function(){
  var dock=document.getElementById('globalDock'),trigger=document.getElementById('dockTrigger');
  if(!dock||!trigger)return;
  var timer;
  trigger.addEventListener('mouseenter',function(){clearTimeout(timer);dock.classList.add('visible');});
  trigger.addEventListener('touchstart',function(){dock.classList.add('visible');},{passive:true});
  dock.addEventListener('mouseenter',function(){clearTimeout(timer);dock.classList.add('visible');});
  dock.addEventListener('mouseleave',function(){timer=setTimeout(function(){dock.classList.remove('visible');},600);});
})();
</script>
<script>
(function(){
  function t(){
    var el=document.getElementById('gmbTime');if(!el)return;
    var now=new Date(),d=['日','一','二','三','四','五','六'][now.getDay()];
    var h=String(now.getHours()).padStart(2,'0'),m=String(now.getMinutes()).padStart(2,'0');
    el.textContent='週'+d+' '+(now.getMonth()+1)+'/'+(now.getDate())+' '+h+':'+m;
  }t();setInterval(t,10000);
})();
</script>
