<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李政厚 Jung Hoo Lee | MLB 數據追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16130F;          /* 暖黑 */
    --card:#211D17;
    --card-edge:#322B22;
    --orange:#FD5A1E;       /* 巨人橘 */
    --orange-soft:#FF8A5C;
    --cream:#EFE5D6;
    --muted:#9A8F80;
    --green:#6FBF73;
    --red:#E05B5B;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--ink);
    color:var(--cream);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;
  }
  .num{font-family:'Archivo',sans-serif;font-variant-numeric:tabular-nums;}

  .wrap{max-width:980px;margin:0 auto;padding:0 20px 80px;}

  /* ---------- Hero ---------- */
  .hero{
    position:relative;
    padding:56px 0 36px;
    overflow:hidden;
    border-bottom:1px solid var(--card-edge);
  }
  .hero::before{
    content:"51";
    position:absolute;
    right:-30px;top:-60px;
    font-family:'Archivo',sans-serif;
    font-weight:900;
    font-stretch:125%;
    font-size:min(340px,60vw);
    line-height:1;
    color:transparent;
    -webkit-text-stroke:1px rgba(253,90,30,.22);
    pointer-events:none;
    user-select:none;
  }
  .hero-inner{display:flex;align-items:flex-end;gap:28px;position:relative;flex-wrap:wrap;}
  .headshot{
    width:148px;height:148px;border-radius:50%;
    border:3px solid var(--orange);
    background:#2A251D;
    object-fit:cover;flex-shrink:0;
  }
  .eyebrow{
    font-size:12px;letter-spacing:.25em;color:var(--orange);
    font-weight:700;margin-bottom:6px;
  }
  h1{
    font-family:'Archivo','Noto Sans TC',sans-serif;
    font-weight:900;font-stretch:110%;
    font-size:clamp(34px,6vw,56px);
    line-height:1.05;letter-spacing:.01em;
  }
  h1 .zh{font-family:'Noto Sans TC';font-weight:900;}
  .bio-line{margin-top:10px;color:var(--muted);font-size:14px;display:flex;flex-wrap:wrap;gap:6px 18px;}
  .bio-line b{color:var(--cream);font-weight:500;}
  .tag-wind{
    display:inline-block;margin-top:12px;padding:5px 14px;
    border:1px solid var(--orange);border-radius:999px;
    color:var(--orange-soft);font-size:13px;letter-spacing:.12em;
  }

  /* ---------- Section title ---------- */
  .sec{margin-top:44px;}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;}
  .sec-head h2{font-size:18px;font-weight:700;letter-spacing:.06em;}
  .sec-head .en{font-family:'Archivo';font-size:11px;letter-spacing:.22em;color:var(--muted);font-weight:600;}
  .sec-head .season-pill{
    margin-left:auto;font-family:'Archivo';font-weight:800;font-size:13px;
    color:var(--ink);background:var(--orange);border-radius:6px;padding:3px 10px;
  }

  /* ---------- Stat grid ---------- */
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(118px,1fr));
    gap:10px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:12px;
    padding:16px 14px 13px;
  }
  .stat-card .v{font-family:'Archivo';font-weight:800;font-size:28px;line-height:1;font-variant-numeric:tabular-nums;}
  .stat-card .k{margin-top:7px;font-size:12px;color:var(--muted);letter-spacing:.08em;}
  .stat-card.hot .v{color:var(--orange);}

  /* ---------- Tables ---------- */
  .tbl-wrap{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:14px;
    overflow-x:auto;
  }
  table{border-collapse:collapse;width:100%;min-width:680px;font-size:13.5px;}
  thead th{
    font-family:'Archivo';font-weight:700;font-size:11px;letter-spacing:.1em;
    color:var(--muted);text-align:right;
    padding:12px 12px;border-bottom:1px solid var(--card-edge);
    white-space:nowrap;
  }
  thead th:first-child, tbody td:first-child{text-align:left;padding-left:18px;}
  tbody td{
    padding:11px 12px;text-align:right;
    border-bottom:1px solid rgba(50,43,34,.55);
    font-variant-numeric:tabular-nums;font-family:'Archivo','Noto Sans TC';
    white-space:nowrap;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:rgba(253,90,30,.05);}
  tr.career-row td{
    background:rgba(253,90,30,.08);
    font-weight:800;color:var(--orange-soft);
    border-top:1px solid var(--orange);
  }
  td.pos{color:var(--green);} td.neg{color:var(--red);}
  .team-cell{color:var(--muted);font-size:12px;}

  /* ---------- States ---------- */
  .loading,.err{
    padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;letter-spacing:.05em;
  }
  .err{color:var(--red);}
  .spinner{
    width:34px;height:34px;border-radius:50%;margin:0 auto 16px;
    border:3px solid var(--card-edge);border-top-color:var(--orange);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spinner{animation:none;}}

  .src-note{margin-top:36px;font-size:11.5px;color:var(--muted);letter-spacing:.04em;text-align:center;}
  .src-note a{color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <!-- Hero -->
  <header class="hero">
    <div class="hero-inner">
      <img class="headshot" id="headshot" alt="Jung Hoo Lee"
           src="https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:silo:current.png,q_auto:best,f_auto/v1/people/808982/headshot/67/current">
      <div>
        <div class="eyebrow">SAN FRANCISCO GIANTS · CF · #51</div>
        <h1><span class="zh">李政厚</span> JUNG HOO LEE</h1>
        <div class="bio-line" id="bioLine">載入中…</div>
        <span class="tag-wind">바람의 손자 · 風之孫</span>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="loading"><div class="spinner"></div>正在從 MLB 官方 API 載入即時數據…</div>
  </div>

  <p class="src-note">資料來源：MLB Stats API（statsapi.mlb.com）· 每次開啟頁面即時更新</p>
</div>

<script>
const PLAYER_ID = 808982;
const API = 'https://statsapi.mlb.com/api/v1';
const app = document.getElementById('app');

const fmt3 = v => {
  if (v === undefined || v === null || v === '' || v === '.---') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return n < 1 ? n.toFixed(3).replace(/^0/, '') : n.toFixed(3);
};
const n0 = v => (v === undefined || v === null) ? '—' : v;

async function getJSON(url){
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function init(){
  try{
    const year = new Date().getFullYear();

    const [people, yby, logRes] = await Promise.all([
      getJSON(`${API}/people/${PLAYER_ID}`),
      getJSON(`${API}/people/${PLAYER_ID}/stats?stats=yearByYear,career&group=hitting`),
      getJSON(`${API}/people/${PLAYER_ID}/stats?stats=gameLog&group=hitting&season=${year}`)
        .catch(() => null)
    ]);

    // ---- Bio ----
    const p = people.people && people.people[0];
    if (p){
      document.getElementById('bioLine').innerHTML =
        `生日 <b>${p.birthDate || '—'}</b>（${p.currentAge ?? '—'} 歲）` +
        `<span>身高 <b>${p.height || '—'}</b></span>` +
        `<span>體重 <b>${p.weight ? p.weight + ' lb' : '—'}</b></span>` +
        `<span>打擊 <b>${p.batSide ? p.batSide.code === 'L' ? '左打' : p.batSide.code === 'R' ? '右打' : p.batSide.code : '—'}</b></span>` +
        `<span>傳球 <b>${p.pitchHand ? p.pitchHand.code === 'R' ? '右投' : '左投' : '—'}</b></span>`;
    }

    // ---- Year by year & career ----
    let ybySplits = [], careerStat = null;
    (yby.stats || []).forEach(s => {
      const type = s.type && s.type.displayName;
      if (type === 'yearByYear') ybySplits = s.splits || [];
      if (type === 'career' && s.splits && s.splits[0]) careerStat = s.splits[0].stat;
    });

    // 本季：取 yearByYear 最後一年；若 API 還沒有本年資料則顯示最近一季
    const latest = ybySplits.length ? ybySplits[ybySplits.length - 1] : null;

    // ---- Game log（最近 10 場，新到舊）----
    let games = [];
    if (logRes && logRes.stats && logRes.stats[0] && logRes.stats[0].splits){
      games = logRes.stats[0].splits.slice(-10).reverse();
    }

    render(latest, ybySplits, careerStat, games);
  }catch(e){
    console.error(e);
    app.innerHTML = `<div class="err">載入失敗（${e.message}）。<br>請確認網路連線後重新整理；MLB API 偶爾會短暫無回應。</div>`;
  }
}

function render(latest, yby, career, games){
  let html = '';

  // ===== 本季數據 =====
  if (latest){
    const s = latest.stat;
    html += `
    <section class="sec">
      <div class="sec-head">
        <h2>本季數據</h2><span class="en">SEASON STATS</span>
        <span class="season-pill num">${latest.season}</span>
      </div>
      <div class="stat-grid">
        <div class="stat-card hot"><div class="v">${fmt3(s.avg)}</div><div class="k">打擊率 AVG</div></div>
        <div class="stat-card"><div class="v">${n0(s.homeRuns)}</div><div class="k">全壘打 HR</div></div>
        <div class="stat-card"><div class="v">${n0(s.rbi)}</div><div class="k">打點 RBI</div></div>
        <div class="stat-card"><div class="v">${n0(s.hits)}</div><div class="k">安打 H</div></div>
        <div class="stat-card"><div class="v">${n0(s.runs)}</div><div class="k">得分 R</div></div>
        <div class="stat-card"><div class="v">${n0(s.stolenBases)}</div><div class="k">盜壘 SB</div></div>
        <div class="stat-card"><div class="v">${fmt3(s.obp)}</div><div class="k">上壘率 OBP</div></div>
        <div class="stat-card hot"><div class="v">${fmt3(s.ops)}</div><div class="k">攻擊指數 OPS</div></div>
      </div>
    </section>`;
  }

  // ===== 最近比賽 =====
  if (games.length){
    html += `
    <section class="sec">
      <div class="sec-head"><h2>最近比賽</h2><span class="en">LAST ${games.length} GAMES</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>日期</th><th>對手</th><th>AB</th><th>H</th><th>2B</th><th>HR</th>
          <th>RBI</th><th>R</th><th>BB</th><th>SO</th><th>SB</th><th>AVG</th>
        </tr></thead><tbody>
        ${games.map(g => {
          const st = g.stat || {};
          const opp = g.opponent ? g.opponent.abbreviation || g.opponent.name : '—';
          const vs = g.isHome ? 'vs' : '@';
          const hitCls = (st.hits|0) >= 2 ? ' class="pos"' : '';
          return `<tr>
            <td>${(g.date || '').slice(5)}</td>
            <td class="team-cell" style="text-align:right">${vs} ${opp}</td>
            <td>${n0(st.atBats)}</td><td${hitCls}>${n0(st.hits)}</td>
            <td>${n0(st.doubles)}</td><td>${n0(st.homeRuns)}</td>
            <td>${n0(st.rbi)}</td><td>${n0(st.runs)}</td>
            <td>${n0(st.baseOnBalls)}</td><td>${n0(st.strikeOuts)}</td>
            <td>${n0(st.stolenBases)}</td><td>${fmt3(st.avg)}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div>
    </section>`;
  }

  // ===== 逐年成績 =====
  if (yby.length){
    html += `
    <section class="sec">
      <div class="sec-head"><h2>逐年成績</h2><span class="en">YEAR BY YEAR · MLB</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>年度</th><th>球隊</th><th>G</th><th>AB</th><th>H</th><th>2B</th><th>3B</th>
          <th>HR</th><th>RBI</th><th>R</th><th>SB</th><th>BB</th><th>SO</th>
          <th>AVG</th><th>OBP</th><th>SLG</th><th>OPS</th>
        </tr></thead><tbody>
        ${yby.map(y => {
          const s = y.stat || {};
          return `<tr>
            <td class="num" style="font-weight:700">${y.season}</td>
            <td class="team-cell" style="text-align:right">${y.team ? y.team.abbreviation || y.team.name : 'SF'}</td>
            <td>${n0(s.gamesPlayed)}</td><td>${n0(s.atBats)}</td><td>${n0(s.hits)}</td>
            <td>${n0(s.doubles)}</td><td>${n0(s.triples)}</td><td>${n0(s.homeRuns)}</td>
            <td>${n0(s.rbi)}</td><td>${n0(s.runs)}</td><td>${n0(s.stolenBases)}</td>
            <td>${n0(s.baseOnBalls)}</td><td>${n0(s.strikeOuts)}</td>
            <td>${fmt3(s.avg)}</td><td>${fmt3(s.obp)}</td><td>${fmt3(s.slg)}</td><td>${fmt3(s.ops)}</td>
          </tr>`;
        }).join('')}
        ${career ? `<tr class="career-row">
            <td>生涯</td><td></td>
            <td>${n0(career.gamesPlayed)}</td><td>${n0(career.atBats)}</td><td>${n0(career.hits)}</td>
            <td>${n0(career.doubles)}</td><td>${n0(career.triples)}</td><td>${n0(career.homeRuns)}</td>
            <td>${n0(career.rbi)}</td><td>${n0(career.runs)}</td><td>${n0(career.stolenBases)}</td>
            <td>${n0(career.baseOnBalls)}</td><td>${n0(career.strikeOuts)}</td>
            <td>${fmt3(career.avg)}</td><td>${fmt3(career.obp)}</td><td>${fmt3(career.slg)}</td><td>${fmt3(career.ops)}</td>
          </tr>` : ''}
        </tbody></table></div>
    </section>`;
  }

  if (!html){
    html = '<div class="err">目前查無數據，請稍後再試。</div>';
  }
  app.innerHTML = html;
}

init();
</script>
</body>
</html>
