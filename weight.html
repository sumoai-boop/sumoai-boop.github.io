<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>體重記錄 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
:root{
  --ik-blue:#0058A3;
  --ik-blue-dark:#004F93;
  --ik-yellow:#FFDB00;
  --ik-black:#111111;
  --ik-gray:#F5F5F5;
  --ik-gray-2:#DFDFDF;
  --ik-gray-txt:#767676;
  --ik-red:#E00751;
}
body{
  font-family:'Noto Sans TC','Inter',sans-serif;
  background:#FFFFFF;
  color:var(--ik-black);
}


/* 全域 Menubar（全站共用） */
.global-menubar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  height:28px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  font-size:12px;color:rgba(255,255,255,0.92);
  font-family:'Inter','Noto Sans TC',monospace;
}
.gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
.gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
.mb-menu{padding:0 6px;border-radius:4px;cursor:default;font-size:12px;color:rgba(255,255,255,0.95);}
.mb-menu:hover{background:rgba(255,255,255,0.2);}

/* Dock（全站共用，不變） */
.global-dock-wrap{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%) translateY(calc(100% - 2px));
  z-index:9998;
  transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1),opacity 0.3s;
  opacity:0;
}
.global-dock-wrap.visible{transform:translateX(-50%) translateY(-12px);opacity:1;}
.global-dock{
  display:flex;align-items:flex-end;gap:10px;
  background:rgba(30,33,48,0.82);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:22px;
  padding:10px 16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.18);
}
.gd-item{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;position:relative;}
.gd-icon{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.gd-item:hover .gd-icon{transform:translateY(-14px) scale(1.28);}
.gd-label{font-size:9px;letter-spacing:0.06em;color:rgba(255,255,255,0.85);text-transform:uppercase;opacity:0;transition:opacity 0.15s;white-space:nowrap;background:rgba(0,0,0,0.6);padding:2px 7px;border-radius:4px;position:absolute;bottom:-22px;font-family:'Inter',monospace;}
.gd-item:hover .gd-label{opacity:1;}
.gd-sep{width:1px;height:48px;background:rgba(255,255,255,0.22);margin:0 4px;align-self:center;}
.gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
.ic-ai{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-photos{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-dramas{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-food{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-threads{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-uber{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-weight{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-reminder{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-netflix{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-mlb{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-chloe{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-trips{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.dock-trigger-zone{position:fixed;bottom:0;left:0;right:0;height:8px;z-index:9997;}

/* ── 頁首：IKEA 藍色橫幅 ── */
.ik-header{
  background:var(--ik-blue);
  margin-top:28px;
  padding:34px 32px 30px;
}
.ik-header-inner{max-width:1200px;margin:0 auto;}
.ik-logo-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;}
.ik-title{
  font-family:'Inter','Noto Sans TC',sans-serif;
  font-weight:900;
  font-size:clamp(38px,6vw,60px);
  color:var(--ik-yellow);
  letter-spacing:-0.02em;
  line-height:1;
  font-style:italic;
}
.ik-subtitle{font-size:14px;font-weight:500;color:rgba(255,255,255,0.9);letter-spacing:0.04em;}
.ik-header-note{margin-top:10px;font-size:12px;color:rgba(255,255,255,0.65);}

/* 主內容 */
.page-content{
  position:relative;z-index:10;
  max-width:1200px;
  margin:0 auto;
  padding:32px 32px 140px;
}
.section-heading{
  font-size:20px;font-weight:900;letter-spacing:0.01em;
  margin:36px 0 16px;
  display:flex;align-items:center;gap:10px;
}
.section-heading::after{content:'';flex:1;height:1px;background:var(--ik-gray-2);}

/* 設定列 */
.settings-row{display:flex;gap:12px;margin-bottom:4px;flex-wrap:wrap;}
.settings-item{
  display:flex;align-items:center;gap:10px;
  background:var(--ik-gray);
  border-radius:0;
  padding:10px 16px;
}
.settings-item label{font-size:12px;font-weight:700;color:var(--ik-black);}
.settings-item input{
  background:#fff;border:1px solid var(--ik-gray-2);
  color:var(--ik-black);font-family:inherit;font-size:14px;font-weight:600;
  width:76px;padding:6px 8px;outline:none;border-radius:0;
}
.settings-item input:focus{border-color:var(--ik-blue);box-shadow:0 0 0 2px rgba(0,88,163,0.15);}
.settings-item .u{font-size:12px;color:var(--ik-gray-txt);}

/* ── 統計卡：IKEA 價格標籤風 ── */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.stat-card{
  background:var(--ik-yellow);
  padding:16px 16px 14px;
  position:relative;
  min-height:112px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.stat-card.blue{background:var(--ik-blue);}
.stat-card.blue .stat-label{color:rgba(255,255,255,0.85);}
.stat-card.blue .stat-val{color:#fff;}
.stat-card.blue .stat-val .unit{color:rgba(255,255,255,0.7);}
.stat-label{
  font-size:12px;font-weight:700;color:var(--ik-black);
  letter-spacing:0.02em;
}
.stat-val{
  font-family:'Inter','Noto Sans TC',sans-serif;
  font-size:38px;font-weight:900;line-height:1;
  color:var(--ik-black);letter-spacing:-0.02em;
  align-self:flex-end;
}
.stat-val .unit{font-size:14px;font-weight:700;color:rgba(17,17,17,0.55);margin-left:3px;}
.stat-val.pos{color:var(--ik-red);}
.stat-val.neg{color:#0A8A00;}

/* 圖表 */
.chart-section{
  background:#fff;
  border:1px solid var(--ik-gray-2);
  padding:20px 20px 8px;
}
.chart-empty{color:var(--ik-gray-txt);font-size:13px;padding:44px 0;text-align:center;}

/* 表單 */
.form-section{
  background:var(--ik-gray);
  padding:24px;
}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:12px;font-weight:700;color:var(--ik-black);}
.form-input{
  background:#fff;border:1px solid var(--ik-gray-2);border-radius:0;
  padding:11px 12px;color:var(--ik-black);
  font-family:inherit;font-size:14px;outline:none;transition:border-color 0.15s,box-shadow 0.15s;
}
.form-input:focus{border-color:var(--ik-blue);box-shadow:0 0 0 2px rgba(0,88,163,0.15);}
.form-input::placeholder{color:#AFAFAF;}
.btn-add{
  margin-top:18px;
  padding:12px 32px;
  background:var(--ik-blue);color:#fff;
  border:none;border-radius:99px;
  font-family:inherit;font-size:14px;font-weight:700;letter-spacing:0.02em;
  cursor:pointer;transition:background 0.15s;
}
.btn-add:hover{background:var(--ik-blue-dark);}

/* 表格 */
.w-table-wrap{border:1px solid var(--ik-gray-2);overflow:hidden;background:#fff;}
.w-table{width:100%;border-collapse:collapse;}
.w-table th{
  font-size:12px;font-weight:900;color:var(--ik-black);
  padding:12px 10px;border-bottom:2px solid var(--ik-black);
  background:#fff;text-align:center;cursor:pointer;user-select:none;white-space:nowrap;
}
.w-table th:hover{background:var(--ik-gray);}
.w-table td{
  font-size:13px;padding:11px 10px;
  border-bottom:1px solid var(--ik-gray-2);
  text-align:center;color:var(--ik-black);font-weight:500;
}
.w-table tr:last-child td{border-bottom:none;}
.w-table tr:hover td{background:var(--ik-gray);}
.change-pos{color:var(--ik-red);font-weight:700;}
.change-neg{color:#0A8A00;font-weight:700;}
.change-zero{color:var(--ik-gray-txt);}
.note-cell{max-width:220px;text-align:left;color:var(--ik-gray-txt);}
.btn-del{
  background:#fff;border:1px solid var(--ik-gray-2);color:var(--ik-black);
  border-radius:99px;padding:5px 14px;font-size:11px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all 0.15s;
}
.btn-del:hover{background:var(--ik-red);border-color:var(--ik-red);color:#fff;}
.empty-row td{padding:34px;color:var(--ik-gray-txt);}

@media(max-width:900px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .ik-header,.page-content{padding-left:20px;padding-right:20px;}
}

/* ===== 手機版共用修正 ===== */
@media(max-width:768px){
  /* Dock 縮小，12 個項目完整顯示 */
  .global-dock-wrap{max-width:100vw;}
  .global-dock{gap:2px!important;padding:5px 6px!important;border-radius:14px!important;
    max-width:calc(100vw - 12px);overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .global-dock::-webkit-scrollbar{display:none;}
  .gd-icon{width:29px!important;height:29px!important;border-radius:8px!important;font-size:15px!important;}
  .gd-icon svg{width:25px!important;height:25px!important;}
  .gd-icon span{font-size:17px!important;}
  .gd-item{flex-shrink:0;}
  .gd-item:hover .gd-icon{transform:translateY(-5px) scale(1.12)!important;}
  .gd-sep{height:22px!important;margin:0 1px!important;}
  .gd-label{display:none!important;}
  /* Menubar 精簡 */
  .menubar{font-size:10px!important;padding:0 8px!important;}
  .mb-menu{display:none!important;}
  .menubar-left{gap:8px!important;}
  .menubar-right{gap:7px!important;}
  /* 觸控目標加大 */
  button,.btn,a.btn{min-height:40px;}
  /* 內文最小字級，避免過小難讀 */
  body{-webkit-text-size-adjust:100%;}
  /* 表格一律可橫向捲動 */
  table{max-width:100%;}
  .table-wrap,.trip-table-wrap{overflow-x:auto!important;-webkit-overflow-scrolling:touch;}
  /* 圖片不溢出 */
  img,video,canvas{max-width:100%;height:auto;}
}
@media(max-width:420px){
  .gd-icon{width:26px!important;height:26px!important;border-radius:7px!important;}
  .gd-icon svg{width:22px!important;height:22px!important;}
  .gd-icon span{font-size:15px!important;}
  .global-dock{gap:1px!important;padding:4px 5px!important;}
  .gd-sep{height:19px!important;margin:0 1px!important;}
}
</style>
</head>

    </div>
    <div class="ik-header-note">每天量一下，組裝更好的自己。</div>
  </div>
</header>

<div class="page-content">

  <div class="section-heading">目前狀態</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">目前體重</div>
      <div class="stat-val" id="stat-current">—<span class="unit">kg</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">BMI</div>
      <div class="stat-val" id="stat-bmi">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">累計變化</div>
      <div class="stat-val" id="stat-total-change">—<span class="unit">kg</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">目標差距</div>
      <div class="stat-val" id="stat-target-gap">—<span class="unit">kg</span></div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">記錄天數</div>
      <div class="stat-val" id="stat-count">0<span class="unit">筆</span></div>
    </div>
  </div>

  <div class="section-heading">個人設定</div>
  <div class="settings-row">
    <div class="settings-item">
      <label>身高</label>
      <input type="number" id="s-height" value="170" step="0.5" onchange="onSettingsChange()"><span class="u">cm</span>
    </div>
    <div class="settings-item">
      <label>目標體重</label>
      <input type="number" id="s-target" placeholder="—" step="0.1" onchange="onSettingsChange()"><span class="u">kg</span>
    </div>
  </div>

  <div class="section-heading">趨勢圖</div>
  <div class="chart-section">
    <div id="chart-holder"><div class="chart-empty">尚無資料</div></div>
  </div>

  <div class="section-heading">新增記錄</div>
  <div class="form-section">
    <div class="form-grid">
      <div class="form-group">
        <label>日期</label>
        <input type="date" class="form-input" id="f-date">
      </div>
      <div class="form-group">
        <label>體重 (kg)</label>
        <input type="number" class="form-input" id="f-weight" step="0.1" placeholder="例如 74.5">
      </div>
      <div class="form-group">
        <label>備註</label>
        <input type="text" class="form-input" id="f-note" placeholder="選填">
      </div>
    </div>
    <button class="btn-add" onclick="addEntry()">＋ 新增記錄</button>
  </div>

  <div class="section-heading">歷史記錄</div>
  <div class="w-table-wrap">
    <table class="w-table">
      <thead>
        <tr>
          <th onclick="setSort('date')">日期</th>
          <th onclick="setSort('weight')">體重 (kg)</th>
          <th>BMI</th>
          <th>較前次</th>
          <th>備註</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="w-tbody"></tbody>
    </table>
  </div>
</div>

<script>
// Dock 顯示邏輯
(function(){
  var dock=document.getElementById('globalDock');
  var zone=document.querySelector('.dock-trigger-zone');
  function show(){dock.classList.add('visible');}
  function hide(){dock.classList.remove('visible');}
  zone.addEventListener('mouseenter',show);
  dock.addEventListener('mouseenter',show);
  dock.addEventListener('mouseleave',hide);
  setTimeout(show,600);
  setTimeout(function(){if(!dock.matches(':hover'))hide();},2600);
})();


// 全域 Menubar 時鐘
(function(){
  function t(){
    var el=document.getElementById('gmbTime');if(!el)return;
    var now=new Date(),d=['日','一','二','三','四','五','六'][now.getDay()];
    var h=String(now.getHours()).padStart(2,'0'),m=String(now.getMinutes()).padStart(2,'0');
    el.textContent='週'+d+' '+(now.getMonth()+1)+'/'+(now.getDate())+' '+h+':'+m;
  }t();setInterval(t,10000);
})();

// ── GitHub 設定 ──
const GH_OWNER='sumoai-boop', GH_REPO='sumoai-boop.github.io', GH_BRANCH='main', GH_TOKEN_KEY='gh_token_weight';
const GH_DATA_PATH='weight-data.json';

function getData(key,fallback){try{return JSON.parse(localStorage.getItem(key)||JSON.stringify(fallback));}catch{return fallback;}}
function saveData(key,data){localStorage.setItem(key,JSON.stringify(data));}

function showToast(msg,isErr){
  var t=document.getElementById('ghToast');
  if(!t){t=document.createElement('div');t.id='ghToast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:99px;font-size:13px;z-index:9999;font-family:inherit;font-weight:700;pointer-events:none;';document.body.appendChild(t);}
  t.textContent=msg;t.style.background=isErr?'#E00751':'#0058A3';t.style.color='#fff';t.style.opacity='1';
  clearTimeout(t._to);if(!isErr)t._to=setTimeout(()=>t.style.opacity='0',3000);
}
function getToken(){
  var tk=localStorage.getItem(GH_TOKEN_KEY);
  if(!tk){tk=prompt('請輸入 GitHub Personal Access Token（需有 repo 寫入權限）：');if(!tk)return null;localStorage.setItem(GH_TOKEN_KEY,tk.trim());}
  return tk.trim();
}
window.clearGHToken=function(){localStorage.removeItem(GH_TOKEN_KEY);alert('Token 已清除');};

function loadFromGitHub(){
  var token=localStorage.getItem(GH_TOKEN_KEY);
  if(!token){
    token=prompt('請輸入 GitHub Personal Access Token（需有 repo 寫入權限）：\n\n此 Token 僅儲存在你的瀏覽器本地。');
    if(!token){renderAll();return;}
    localStorage.setItem(GH_TOKEN_KEY, token.trim());
    token=token.trim();
  }
  var api='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_DATA_PATH;
  fetch(api+'?ref='+GH_BRANCH+'&t='+Date.now(), {headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
    .then(r=>{
      if(!r.ok){
        if(r.status===401){localStorage.removeItem(GH_TOKEN_KEY);alert('Token 無效，請重新輸入');}
        return null;
      }
      return r.json();
    })
    .then(fi=>{
      if(fi&&fi.content){
        var raw=atob(fi.content.split('\n').join(''));
        var json=JSON.parse(decodeURIComponent(escape(raw)));
        if(json.weightEntries) localStorage.setItem('weightEntries',JSON.stringify(json.weightEntries));
        if(json.weightSettings) localStorage.setItem('weightSettings',JSON.stringify(json.weightSettings));
        if(fi.sha) localStorage.setItem('gh_json_sha_weight', fi.sha);
      }
      renderAll();
    }).catch(e=>{console.warn('載入失敗:',e);renderAll();});
}
window.addEventListener('DOMContentLoaded', loadFromGitHub);

var _pushing=false;
async function pushToGitHub(){
  if(_pushing){showToast('⏳ 推送中，請稍候...',false);return;}
  _pushing=true;
  try{
    var token=getToken();if(!token)return;
    var entries=getData('weightEntries',[]), settings=getData('weightSettings',{});
    var api='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_DATA_PATH;
    var hdrs={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
    showToast('⏳ 連線 GitHub...',false);
    var sha=localStorage.getItem('gh_json_sha_weight');
    if(!sha){
      var r=await fetch(api+'?ref='+GH_BRANCH,{headers:hdrs});
      if(!r.ok){
        if(r.status===401){localStorage.removeItem(GH_TOKEN_KEY);showToast('❌ Token 無效',true);}
        else if(r.status===404){sha=null;}
        else{showToast('❌ 連線失敗('+r.status+')',true);return;}
      } else {
        var fi=await r.json();
        sha=fi.sha;
      }
    }
    var newData={weightEntries:entries,weightSettings:settings};
    var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(newData,null,2))));
    showToast('⏳ 推送中...',false);
    var body={message:'更新體重記錄',content:encoded,branch:GH_BRANCH};
    if(sha) body.sha=sha;
    var pr=await fetch(api,{method:'PUT',headers:hdrs,body:JSON.stringify(body)});
    if(!pr.ok){
      var e2=await pr.json();
      localStorage.removeItem('gh_json_sha_weight');
      showToast('❌ 推送失敗：'+(e2.message||pr.status),true);
    } else {
      var prData=await pr.json();
      var newSha=prData.content && prData.content.sha;
      if(newSha) localStorage.setItem('gh_json_sha_weight', newSha);
      else localStorage.removeItem('gh_json_sha_weight');
      showToast('✔ 已儲存至 GitHub',false);
    }
  }finally{_pushing=false;}
}
async function saveAndPush(){await pushToGitHub();}

// ── 資料邏輯 ──
var sortKey='date', sortAsc=false;

function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
document.getElementById('f-date').value=todayStr();

function getSettings(){return getData('weightSettings',{height:170,target:null});}
function setSettings(s){saveData('weightSettings',s);}

function onSettingsChange(){
  var h=parseFloat(document.getElementById('s-height').value)||170;
  var t=document.getElementById('s-target').value;
  setSettings({height:h,target:t===''?null:parseFloat(t)});
  saveAndPush();
  renderAll();
}

function bmi(weight,heightCm){
  if(!weight||!heightCm) return null;
  var h=heightCm/100;
  return weight/(h*h);
}

function addEntry(){
  var date=document.getElementById('f-date').value;
  var weight=parseFloat(document.getElementById('f-weight').value);
  var note=document.getElementById('f-note').value.trim();
  if(!date){alert('請選擇日期');return;}
  if(!weight||weight<=0){alert('請輸入有效體重');return;}
  var entries=getData('weightEntries',[]);
  entries.push({date:date,weight:weight,note:note});
  saveData('weightEntries',entries);
  document.getElementById('f-weight').value='';
  document.getElementById('f-note').value='';
  document.getElementById('f-date').value=todayStr();
  renderAll();
  saveAndPush();
}

function deleteEntry(idx){
  var entries=getData('weightEntries',[]);
  var sorted=sortedEntries();
  var target=sorted[idx];
  var realIdx=entries.findIndex(e=>e.date===target.date&&e.weight===target.weight&&e.note===target.note);
  if(realIdx>-1){
    entries.splice(realIdx,1);
    saveData('weightEntries',entries);
    renderAll();
    saveAndPush();
  }
}

function setSort(key){
  if(sortKey===key) sortAsc=!sortAsc; else {sortKey=key;sortAsc=(key==='date');}
  renderAll();
}

function sortedEntries(){
  var entries=getData('weightEntries',[]).slice();
  entries.sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
  return entries;
}

function chronoWithChange(){
  var chrono=sortedEntries();
  return chrono.map((e,i)=>({...e,change: i===0?null:+(e.weight-chrono[i-1].weight).toFixed(1)}));
}

function renderStats(){
  var chrono=chronoWithChange();
  var settings=getSettings();
  var curEl=document.getElementById('stat-current');
  var bmiEl=document.getElementById('stat-bmi');
  var totalEl=document.getElementById('stat-total-change');
  var gapEl=document.getElementById('stat-target-gap');
  var countEl=document.getElementById('stat-count');
  countEl.innerHTML=chrono.length+'<span class="unit">筆</span>';
  if(chrono.length===0){
    curEl.innerHTML='—<span class="unit">kg</span>';
    bmiEl.textContent='—';
    totalEl.innerHTML='—<span class="unit">kg</span>';
    gapEl.innerHTML='—<span class="unit">kg</span>';
    return;
  }
  var last=chrono[chrono.length-1];
  var first=chrono[0];
  curEl.innerHTML=last.weight.toFixed(1)+'<span class="unit">kg</span>';
  var b=bmi(last.weight,settings.height);
  bmiEl.textContent=b?b.toFixed(1):'—';
  var totalChange=+(last.weight-first.weight).toFixed(1);
  totalEl.className='stat-val '+(totalChange>0?'pos':totalChange<0?'neg':'');
  totalEl.innerHTML=(totalChange>0?'+':'')+totalChange.toFixed(1)+'<span class="unit">kg</span>';
  if(settings.target!=null && !isNaN(settings.target)){
    var gap=+(last.weight-settings.target).toFixed(1);
    gapEl.className='stat-val '+(gap>0?'pos':gap<0?'neg':'');
    gapEl.innerHTML=(gap>0?'+':'')+gap.toFixed(1)+'<span class="unit">kg</span>';
  } else {
    gapEl.className='stat-val';
    gapEl.innerHTML='—<span class="unit">kg</span>';
  }
}

function renderChart(){
  var holder=document.getElementById('chart-holder');
  var chrono=sortedEntries();
  if(chrono.length<2){
    holder.innerHTML='<div class="chart-empty">'+(chrono.length===0?'尚無資料':'至少需要 2 筆記錄才能繪製趨勢圖')+'</div>';
    return;
  }
  var W=1100,H=260,padL=44,padR=16,padT=16,padB=30;
  var iw=W-padL-padR, ih=H-padT-padB;
  var weights=chrono.map(e=>e.weight);
  var minW=Math.min(...weights), maxW=Math.max(...weights);
  if(minW===maxW){minW-=1;maxW+=1;}
  var pad=(maxW-minW)*0.15;
  minW-=pad;maxW+=pad;
  var n=chrono.length;
  function x(i){return padL+(n===1?iw/2:iw*i/(n-1));}
  function y(v){return padT+ih-(v-minW)/(maxW-minW)*ih;}

  var grid='',axis='';
  for(var i=0;i<=4;i++){
    var gy=padT+ih-i*ih/4;
    var val=minW+(maxW-minW)*i/4;
    grid+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(W-padR)+'" y2="'+gy+'" stroke="#EBEBEB" stroke-width="1"/>';
    axis+='<text x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end" font-size="11" fill="#767676">'+val.toFixed(1)+'</text>';
  }
  var xLabels='';
  var step=Math.max(1,Math.round((n-1)/6));
  for(var i=0;i<n;i+=step){
    xLabels+='<text x="'+x(i)+'" y="'+(H-10)+'" text-anchor="middle" font-size="10" fill="#767676">'+chrono[i].date.slice(5).replace('-','/')+'</text>';
  }
  if((n-1)%step!==0){
    xLabels+='<text x="'+x(n-1)+'" y="'+(H-10)+'" text-anchor="middle" font-size="10" fill="#767676">'+chrono[n-1].date.slice(5).replace('-','/')+'</text>';
  }
  var line=chrono.map((e,i)=>x(i)+','+y(e.weight)).join(' ');
  var last=chrono[n-1];
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet" font-family="Inter,Noto Sans TC,sans-serif">'
    +grid+axis+xLabels
    +'<polyline points="'+line+'" fill="none" stroke="#0058A3" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>'
    +'<circle cx="'+x(n-1)+'" cy="'+y(last.weight)+'" r="5" fill="#FFDB00" stroke="#0058A3" stroke-width="2.5"/>'
    +'<text x="'+(x(n-1)-10)+'" y="'+(y(last.weight)-12)+'" text-anchor="end" font-size="14" font-weight="900" fill="#0058A3">'+last.weight.toFixed(1)+'</text>'
    +'</svg>';
  holder.innerHTML=svg;
}

function renderTable(){
  var chrono=chronoWithChange();
  var settings=getSettings();
  var rows=chrono.slice();
  rows.sort((a,b)=>{
    var av=sortKey==='date'?a.date:a.weight, bv=sortKey==='date'?b.date:b.weight;
    return sortAsc?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });
  var tbody=document.getElementById('w-tbody');
  if(rows.length===0){
    tbody.innerHTML='<tr class="empty-row"><td colspan="6">尚無記錄，開始新增你的第一筆體重吧</td></tr>';
    return;
  }
  tbody.innerHTML=rows.map(e=>{
    var b=bmi(e.weight,settings.height);
    var chCls=e.change==null?'change-zero':e.change>0?'change-pos':e.change<0?'change-neg':'change-zero';
    var chTxt=e.change==null?'—':(e.change>0?'+':'')+e.change.toFixed(1);
    var idx=chrono.findIndex(x=>x.date===e.date&&x.weight===e.weight&&x.note===e.note);
    return '<tr>'
      +'<td>'+e.date+'</td>'
      +'<td style="font-weight:700;">'+e.weight.toFixed(1)+'</td>'
      +'<td>'+(b?b.toFixed(1):'—')+'</td>'
      +'<td class="'+chCls+'">'+chTxt+'</td>'
      +'<td class="note-cell">'+(e.note||'')+'</td>'
      +'<td><button class="btn-del" onclick="deleteEntry('+idx+')">刪除</button></td>'
      +'</tr>';
  }).join('');
}

function renderAll(){
  var settings=getSettings();
  document.getElementById('s-height').value=settings.height||170;
  document.getElementById('s-target').value=settings.target==null?'':settings.target;
  renderStats();
  renderChart();
  renderTable();
}
renderAll();
</script>
</body>
</html>
