<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix TOP 10 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#141414;min-height:100vh;font-family:'Space Mono',monospace;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(229,9,20,0.1) 0%,transparent 55%);pointer-events:none;z-index:0;}
  .topnav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 48px;display:flex;justify-content:space-between;align-items:center;background:rgba(232,98,42,0.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1);}
  .logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#FFF5E6;text-decoration:none;letter-spacing:0.04em;}
  .logo em{font-style:italic;color:#FFD4A8;}
  nav{display:flex;flex-wrap:wrap;gap:8px;}
  nav a{padding:7px 16px;border:1px solid rgba(255,245,230,0.3);border-radius:99px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#FFF5E6;text-decoration:none;background:rgba(255,255,255,0.08);transition:background 0.2s;}
  nav a:hover,nav a.active{background:rgba(120,30,0,0.95);border-color:rgba(100,20,0,0.8);color:#fff;}
  .page-content{position:relative;z-index:10;max-width:860px;margin:0 auto;padding:100px 48px 80px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,7vw,72px);font-weight:300;color:#FFF5E6;line-height:1;margin-bottom:6px;}
  .page-title em{font-style:italic;color:#E50914;}
  .page-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,245,230,0.35);margin-bottom:36px;display:block;}

  .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .tab{padding:8px 18px;border:1px solid rgba(255,255,255,0.15);border-radius:99px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.2s;background:transparent;}
  .tab.active{background:#E50914;border-color:#E50914;color:#fff;}
  .tab:hover:not(.active){border-color:rgba(255,255,255,0.4);color:#fff;}

  .week-nav{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
  .week-btn{background:transparent;border:1px solid rgba(255,255,255,0.15);border-radius:99px;color:rgba(255,255,255,0.45);font-family:monospace;font-size:11px;padding:7px 16px;cursor:pointer;transition:all 0.2s;}
  .week-btn:hover:not(.disabled){border-color:rgba(255,255,255,0.5);color:#fff;}
  .week-btn.disabled{opacity:0.25;cursor:default;pointer-events:none;}
  .current-week{font-size:11px;color:#FFF5E6;letter-spacing:0.08em;font-family:monospace;flex:1;text-align:center;}

  /* TOP 10 리스트 */
  .top10-list{display:flex;flex-direction:column;gap:1px;}
  .top10-item{display:grid;grid-template-columns:64px 1fr auto auto;align-items:center;gap:16px;padding:13px 16px;border-radius:8px;transition:background 0.18s;}
  .top10-item:hover{background:rgba(255,255,255,0.05);}

  .rank-num{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;line-height:1;text-align:right;flex-shrink:0;}
  .rank-1{color:#E50914;}
  .rank-2{color:#ff6030;}
  .rank-3{color:#ff8c42;}
  .rank-rest{color:rgba(255,255,255,0.22);}

  .item-title{color:#FFF5E6;font-size:13px;letter-spacing:0.02em;line-height:1.4;}
  .item-title-zh{color:#FFF5E6;font-size:13px;}
  .item-title-en{color:rgba(255,255,255,0.35);font-size:10px;margin-top:3px;letter-spacing:0.02em;}

  .item-views{color:rgba(255,255,255,0.45);font-size:10px;letter-spacing:0.06em;text-align:right;white-space:nowrap;}
  .item-views-num{color:#FFF5E6;font-size:13px;font-weight:400;}
  .item-views-label{font-size:9px;color:rgba(255,255,255,0.3);margin-top:2px;}

  .item-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
  .weeks-badge{font-size:9px;letter-spacing:0.08em;padding:3px 9px;border-radius:99px;white-space:nowrap;}
  .badge-new{background:rgba(229,9,20,0.25);color:#ff8080;border:1px solid rgba(229,9,20,0.35);}
  .badge-weeks{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.1);}

  .loading{text-align:center;padding:60px 0;color:rgba(255,255,255,0.3);font-size:12px;letter-spacing:0.15em;}
  .loading-dot{display:inline-block;animation:blink 1.4s ease-in-out infinite;}
  .loading-dot:nth-child(2){animation-delay:0.2s;}
  .loading-dot:nth-child(3){animation-delay:0.4s;}
  @keyframes blink{0%,80%,100%{opacity:0.2;}40%{opacity:1;}}

  .source-note{font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:0.08em;margin-top:36px;text-align:center;}
  .source-note a{color:rgba(229,9,20,0.5);text-decoration:none;}
  .source-note a:hover{color:#E50914;}

  @media(max-width:600px){
    .topnav{padding:12px 20px;}
    .page-content{padding:88px 16px 60px;}
    nav a{padding:6px 10px;font-size:9px;}
    .top10-item{grid-template-columns:48px 1fr auto;}
    .rank-num{font-size:36px;}
    .item-title-en{display:none;}
  }
</style>
</head>
<body>
<div class="topnav">
  <a href="index.html" class="logo">Sumoai's <em>Reel</em></a>
  <nav>

    <a href="netflix.html" class="active">TOP 10</a>
    <a href="threads.html">Threads</a>
  </nav>
</div>

<div class="page-content">
  <h1 class="page-title">Netflix <em>TOP 10</em></h1>
  <span class="page-label">— 全球每週排行 · 資料來源 Netflix Tudum · Movies | English</span>

  <div class="week-nav">
    <button class="week-btn" id="prevWeek">← 上週</button>
    <div class="current-week" id="weekDisplay"></div>
    <button class="week-btn disabled" id="nextWeek">下週 →</button>
  </div>

  <div class="top10-list" id="top10List">
    <div class="loading"><span class="loading-dot">●</span> <span class="loading-dot">●</span> <span class="loading-dot">●</span></div>
  </div>

  <div class="source-note">資料來源：<a href="https://www.netflix.com/tudum/top10" target="_blank">netflix.com/tudum/top10</a> · Global · Movies | English · 每週更新</div>
</div>

<script>
// 週列表（最新在前）
const WEEKS = [
  "3/23/26 - 3/29/26","3/16/26 - 3/22/26","3/9/26 - 3/15/26","3/2/26 - 3/8/26",
  "2/23/26 - 3/1/26","2/16/26 - 2/22/26","2/9/26 - 2/15/26","2/2/26 - 2/8/26",
  "1/26/26 - 2/1/26","1/19/26 - 1/25/26","1/12/26 - 1/18/26","1/5/26 - 1/11/26",
  "12/29/25 - 1/4/26","12/22/25 - 12/28/25","12/15/25 - 12/21/25","12/8/25 - 12/14/25",
];

// 中文片名對照
const ZH_TITLES = {
  "Peaky Blinders: The Immortal Man":"浴血黑幫：不朽之人",
  "War Machine":"戰爭機器",
  "Anaconda":"水蟒",
  "KPop Demon Hunters":"K-POP惡魔獵人",
  "The Bad Guys 2":"壞蛋聯盟2",
  "Minions: The Rise of Gru":"神偷奶爸：小小兵崛起",
  "What Happens in Vegas":"賭城大丈夫",
  "40 Acres":"40英畝",
  "The Rise of the Red Hot Chili Peppers: Our Brother, Hillel":"嗆辣紅椒崛起：我們的兄弟",
  "Louis Theroux: Inside the Manosphere":"路易·塞洛克斯：潛入男性主義圈",
  "Carry-On":"隨身行李",
  "Back in Action":"王者再出發",
  "The Recruit":"新進特工",
  "Squid Game: Season 2":"魷魚遊戲：第2季",
  "Joy Ride":"快樂之旅",
  "Lift":"竊盜高飛",
  "American Primeval":"美洲荒原",
  "Ad Vitam":"永恆之旅",
  "The Madness":"狂怒",
  "Outer Banks":"外灘男孩",
  "XO, Kitty":"摯愛凱蒂",
  "Nobody Wants This":"沒人要這個",
  "Emily in Paris":"艾蜜莉在巴黎",
  "Black Doves":"黑鴿子",
  "The Six Triple Eight":"六百三十八人",
  "The Piano Lesson":"鋼琴課",
  "Kraven the Hunter":"獵人克萊文",
  "Sonic the Hedgehog 3":"音速小子3",
  "Moana 2":"海洋奇緣2",
  "Wicked":"女巫前傳",
  "Carry-On":"隨身行李",
  "The Operative":"臥底行動",
  "The Merry Gentlemen":"快樂紳士",
  "Hot Frosty":"熱戀雪人",
  "That Christmas":"那個聖誕節",
  "How to Train Your Dragon":"馴龍高手",
  "The Housemaid":"致命管家",
  "Exterritorial":"域外追殺",
  "Mission: Impossible – The Final Reckoning":"不可能的任務：最終清算",
  "Novocaine":"無痛先生",
  "The Running Man":"逃亡遊戲",
  "Thrash":"狂鯊風暴",
  "Mickey 17":"米奇17號",
  "Superman":"超人",
  "Jurassic World Rebirth":"侏羅紀世界：重生",
  "Sinners":"罪人",
  "Missing":"失蹤搜救",
  "The Accountant 2":"會計師2",
  "The Fall Guy":"特技玩家",
  "Deadpool & Wolverine":"死侍與金鋼狼",
  "Alien: Romulus":"異形：羅穆路斯",
  "Transformers One":"變形金剛：源起",
  "Rebel Ridge":"逆嶺",
};

function getZH(title) {
  return ZH_TITLES[title] || title;
}

// 內建資料：最新一週
const BUILTIN = {
  "3/23/26 - 3/29/26": [
    {rank:1,title:"Peaky Blinders: The Immortal Man",views:"19.4M",weeks:2},
    {rank:2,title:"War Machine",views:"10.3M",weeks:4},
    {rank:3,title:"Anaconda",views:"7.9M",weeks:1},
    {rank:4,title:"KPop Demon Hunters",views:"4.9M",weeks:41},
    {rank:5,title:"The Bad Guys 2",views:"4.3M",weeks:1},
    {rank:6,title:"Minions: The Rise of Gru",views:"3.9M",weeks:12},
    {rank:7,title:"What Happens in Vegas",views:"3.2M",weeks:3},
    {rank:8,title:"40 Acres",views:"3.1M",weeks:1},
    {rank:9,title:"The Rise of the Red Hot Chili Peppers: Our Brother, Hillel",views:"2.8M",weeks:1},
    {rank:10,title:"Louis Theroux: Inside the Manosphere",views:"2.4M",weeks:3},
  ]
};
const CACHE = {...BUILTIN};

let currentIdx = 0;

function rankClass(r) {
  if(r===1) return 'rank-1';
  if(r===2) return 'rank-2';
  if(r===3) return 'rank-3';
  return 'rank-rest';
}

function renderList(data) {
  const list = document.getElementById('top10List');
  if(!data||!data.length){
    list.innerHTML='<div class="loading" style="color:rgba(255,255,255,0.25);">此週資料尚未收錄</div>';
    return;
  }
  list.innerHTML = data.map(item => `
    <div class="top10-item">
      <div class="rank-num ${rankClass(item.rank)}">${String(item.rank).padStart(2,'0')}</div>
      <div>
        <div class="item-title-zh">${getZH(item.title)}</div>
        <div class="item-title-en">${item.title}</div>
      </div>
      <div class="item-meta" style="text-align:right;">
        <div class="item-views-num">${item.views}</div>
        <div class="item-views-label">views</div>
      </div>
      <div class="item-meta">
        <span class="weeks-badge ${item.weeks===1?'badge-new':'badge-weeks'}">${item.weeks===1?'NEW':item.weeks+'W'}</span>
      </div>
    </div>
  `).join('');
}

function setLoading() {
  document.getElementById('top10List').innerHTML =
    '<div class="loading"><span class="loading-dot">●</span> <span class="loading-dot">●</span> <span class="loading-dot">●</span></div>';
}

async function fetchWeek(week) {
  if(CACHE[week]) { renderList(CACHE[week]); return; }
  setLoading();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`Search for Netflix global top 10 Movies English for the week of ${week} on Netflix Tudum. Return ONLY a valid JSON array with exactly 10 objects like: [{"rank":1,"title":"Movie Title","views":"12.3M","weeks":2},...]. The "weeks" field is the number of weeks in top 10. No markdown, no explanation, pure JSON only.`}]
      })
    });
    const data = await res.json();
    const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const match = text.match(/\[[\s\S]*\]/);
    if(match){
      const parsed = JSON.parse(match[0]);
      CACHE[week] = parsed;
      renderList(parsed);
    } else {
      renderList(null);
    }
  } catch(e) {
    renderList(null);
  }
}

function updateDisplay() {
  const week = WEEKS[currentIdx];
  document.getElementById('weekDisplay').textContent = week;
  document.getElementById('prevWeek').classList.toggle('disabled', currentIdx >= WEEKS.length-1);
  document.getElementById('nextWeek').classList.toggle('disabled', currentIdx <= 0);
  fetchWeek(week);
}

document.getElementById('prevWeek').addEventListener('click', () => {
  if(currentIdx < WEEKS.length-1){ currentIdx++; updateDisplay(); }
});
document.getElementById('nextWeek').addEventListener('click', () => {
  if(currentIdx > 0){ currentIdx--; updateDisplay(); }
});

updateDisplay();
</script>
</body>
</html>
