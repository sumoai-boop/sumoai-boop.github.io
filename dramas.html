<!-- ① 貼入 <style> 區塊內（</style> 之前） ─────────────────────── -->
<style>
/* ── 新增記錄浮動按鈕 ── */
#addRecordFab {
  position: fixed;
  bottom: 32px;
  right: 32px;
  z-index: 9999;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, #e8622a 0%, #ffb432 100%);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 24px rgba(232,98,42,0.45), 0 1px 6px rgba(0,0,0,0.4);
  transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s;
  line-height: 1;
}
#addRecordFab:hover {
  transform: scale(1.12) rotate(15deg);
  box-shadow: 0 6px 32px rgba(232,98,42,0.6), 0 2px 8px rgba(0,0,0,0.5);
}
#addRecordFab:active { transform: scale(0.95); }

/* ── Modal 背景 ── */
#addModal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10000;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  animation: arModalFadeIn 0.2s ease;
}
#addModal.open { display: flex; }
@keyframes arModalFadeIn {
  from { opacity: 0; } to { opacity: 1; }
}

/* ── Modal 內容 ── */
#addModalInner {
  background: #18120a;
  border: 1px solid rgba(255,180,50,0.18);
  border-radius: 16px;
  padding: 28px 28px 24px;
  width: 560px;
  max-width: 94vw;

  overflow-y: auto;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,180,50,0.08);
  animation: arModalSlideUp 0.25s cubic-bezier(.34,1.56,.64,1);
  position: relative;
}
@keyframes arModalSlideUp {
  from { transform: translateY(28px) scale(0.97); opacity: 0; }
  to   { transform: translateY(0)    scale(1);    opacity: 1; }
}

/* ── Modal 標題 ── */
#addModalInner h2 {

  font-weight: 600;

  height: 16px;
  background: linear-gradient(to bottom, #e8622a, #ffb432);
  border-radius: 2px;
}

/* ── 關閉按鈕 ── */
#addModalClose {

  background: none;

/* ── JSON 輸出區 ── */

  background: rgba(255,180,50,0.05);
  border: 1px solid rgba(255,180,50,0.12);
  border-radius: 10px;
  padding: 14px;
  display: none;

#arJsonOutput {

  border-radius: 7px;

}
.ar-copy-btn {

  border: 1px solid rgba(232,98,42,0.35);
  border-radius: 6px;
  color: #e8622a;

.ar-success-msg {

  font-size: 12px;
  text-align: center;
  display: none;
}
.ar-success-msg.show { display: block; }
</style>

<!-- ③ 貼在最後一個 </script> 之前（或新增一個 <script> 區塊） ── -->
<script>
(function() {
  // 設定今天日期
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('ar_date').value = today;
  document.getElementById('ar_year').value = new Date().getFullYear();

  var modal   = document.getElementById('addModal');
  var fab     = document.getElementById('addRecordFab');
  var closeBtn = document.getElementById('addModalClose');
  var cancelBtn = document.getElementById('arCancelBtn');

  function openModal() {
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(function(){ document.getElementById('ar_title').focus(); }, 100);
  }
  function closeModal() {
    modal.classList.remove('open');
    document.body.style.overflow = '';
    document.getElementById('arExportWrap').classList.remove('show');
    document.getElementById('arSuccessMsg').classList.remove('show');
  }

  fab.addEventListener('click', openModal);
  closeBtn.addEventListener('click', closeModal);
  cancelBtn.addEventListener('click', closeModal);
  modal.addEventListener('click', function(e){ if(e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && modal.classList.contains('open')) closeModal();
  });

  // 產生 JSON
  document.getElementById('arSubmitBtn').addEventListener('click', function() {
    var date     = document.getElementById('ar_date').value;
    var type     = document.getElementById('ar_type').value;
    var title    = document.getElementById('ar_title').value.trim();
    var orig     = document.getElementById('ar_orig').value.trim();
    var lang     = document.getElementById('ar_lang').value;
    var year     = parseInt(document.getElementById('ar_year').value);
    var imdbVal  = document.getElementById('ar_imdb').value;
    var doubVal  = document.getElementById('ar_douban').value;
    var persVal  = document.getElementById('ar_personal').value;
    var dist     = document.getElementById('ar_dist').value;
    var venue    = document.getElementById('ar_venue').value;

    var missing = [];
    if(!date)    missing.push('觀看日期');
    if(!title)   missing.push('中文片名');
    if(!year)    missing.push('上映年份');
    if(!persVal) missing.push('個人評分');
    if(missing.length) { alert('請填寫必填欄位：' + missing.join('、')); return; }

    var record = { date: date, year: year, type: type, lang: lang, title: title };
    if(orig)    record.orig     = orig;
    if(imdbVal) record.imdb    = parseFloat(imdbVal);
    if(doubVal) record.douban  = parseFloat(doubVal);
    record.personal = parseFloat(persVal);
    if(dist)    record.dist    = dist;
    record.venue = venue;

    document.getElementById('arJsonOutput').textContent = JSON.stringify(record);
    document.getElementById('arExportWrap').classList.add('show');
    document.getElementById('arSuccessMsg').classList.remove('show');
    document.getElementById('arExportWrap').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  // 複製到剪貼簿
  document.getElementById('arCopyBtn').addEventListener('click', function() {
    var text = document.getElementById('arJsonOutput').textContent;
    var msg  = document.getElementById('arSuccessMsg');
    if(navigator.clipboard) {
      navigator.clipboard.writeText(text).then(function(){
        msg.classList.add('show');
        setTimeout(function(){ msg.classList.remove('show'); }, 2500);
      });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      msg.classList.add('show');
      setTimeout(function(){ msg.classList.remove('show'); }, 2500);
    }
  });
})();
</script>

<!--
  ══════════════════════════════════════════════════════════════
  使用說明：
  1. 點右下角橘色 ＋ 按鈕 開啟表單
  2. 填寫欄位（標 * 的為必填）
  3. 點「✦ 產生記錄 JSON」
  4. 點「複製 JSON」
  5. 將複製的 JSON 貼到 dramas.html 中
     DATA=[ 之後的第一個位置，加上逗號：
     DATA=[{你貼的新記錄},{原本第一筆...}]
  ══════════════════════════════════════════════════════════════
-->
