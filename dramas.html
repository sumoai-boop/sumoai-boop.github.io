<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>追劇 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;} body,p,td,th,span,div,a,label{color:inherit;}
  body{background:#F4EFE6;color:#2C1A0E;min-height:100vh;font-family:'Space Mono',monospace;overflow-x:hidden;position:relative;}
  body::before{content:'';position:fixed;inset:0;background:transparent;pointer-events:none;z-index:0;}
  .topnav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 48px;display:flex;justify-content:space-between;align-items:center;background:rgba(232,98,42,0.92);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1);}
  .logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#2C1A0E;text-decoration:none;letter-spacing:0.04em;}
  .logo em{font-style:italic;color:#3D2010;}
  nav{display:flex;flex-wrap:wrap;gap:6px;}
  nav a{padding:6px 14px;border:1px solid rgba(160,50,0,0.5);border-radius:99px;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#ffffff;text-decoration:none;background:rgba(180,55,0,0.75);transition:background 0.2s;}
  nav a:hover,nav a.active{background:rgba(120,30,0,0.95);border-color:rgba(100,20,0,0.8);color:#ffffff;}
  .page-content{position:relative;z-index:10;max-width:1400px;margin:0 auto;padding:100px 32px 80px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,7vw,72px);font-weight:300;color:#2C1A0E;line-height:1;margin-bottom:6px;}
  .page-title em{font-style:italic;color:#7A4500;}
  .page-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(60,30,5,0.7);margin-bottom:32px;display:block;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px;}
  .stat-card{background:rgba(200,130,50,0.15);border:1px solid rgba(180,100,30,0.35);border-radius:10px;padding:14px 16px;text-align:center;}
  .stat-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(120,50,5,0.9);margin-bottom:8px;text-align:center;font-family:'Space Mono',monospace;}
  .stat-val{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#2C1A0E;}
  .stat-val em{font-style:italic;color:#7A4500;font-size:18px;}
  .top5-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(60,30,5,0.7);margin-bottom:16px;display:block;}
  .top5-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:48px;}
  .poster-card{border-radius:10px;overflow:hidden;position:relative;aspect-ratio:2/3;transition:transform 0.3s ease;}
  .poster-card:hover{transform:translateY(-6px);}
  .poster-card img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.75);transition:filter 0.3s;}
  .poster-card:hover img{filter:brightness(0.6);}
  .poster-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.1) 55%,transparent 100%);}
  .poster-info{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:14px 12px 12px;}
  .poster-rank{font-size:9px;letter-spacing:0.15em;color:rgba(60,25,5,0.85);margin-bottom:4px;}
  .poster-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#2C1A0E;line-height:1.25;margin-bottom:6px;}
  .poster-score-num{font-size:18px;font-family:'Cormorant Garamond',serif;font-weight:600;color:#3D2010;}
  .poster-score-label{font-size:9px;color:rgba(60,25,5,0.7);margin-left:4px;}
  .section-divider{height:1px;background:rgba(255,180,50,0.15);margin-bottom:28px;}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center;}
  .filter-input{flex:1;min-width:180px;background:rgba(255,180,50,0.05);border:1px solid rgba(255,180,50,0.2);border-radius:99px;padding:9px 16px;color:#2C1A0E;font-family:'Space Mono',monospace;font-size:13px;outline:none;}
  .filter-input::placeholder{color:rgba(60,30,5,0.6);}
  .filter-select{background:#fff;border:1px solid rgba(180,100,30,0.35);border-radius:99px;padding:9px 16px;color:#2C1A0E;font-family:'Space Mono',monospace;font-size:13px;outline:none;cursor:pointer;font-weight:500;}
  .filter-select option{background:#fff;color:#2C1A0E;}
  .filter-reset{background:rgba(232,98,42,0.15);border:1px solid rgba(232,98,42,0.45);border-radius:99px;padding:9px 16px;color:#E8622A;font-family:'Space Mono',monospace;font-size:13px;cursor:pointer;letter-spacing:0.05em;transition:all 0.2s;white-space:nowrap;font-weight:500;}
  .filter-reset:hover{background:rgba(232,98,42,0.35);color:#fff;}
  .del-btn{background:rgba(180,40,40,0.15);border:1px solid rgba(220,60,60,0.4);border-radius:6px;color:rgba(220,100,100,0.8);font-size:12px;cursor:pointer;padding:3px 8px;transition:all 0.2s;line-height:1;}
  .del-btn:hover{background:rgba(220,60,60,0.4);color:#fff;border-color:rgba(220,60,60,0.8);}
  .result-count{font-size:13px;color:rgba(220,190,130,0.8);letter-spacing:0.06em;margin-bottom:12px;font-weight:500;}
  .table-wrap{background:rgba(30,50,90,0.75);border:1px solid rgba(50,80,140,0.6);border-radius:12px;overflow:hidden;box-shadow:0 0 20px rgba(232,98,42,0.12),0 0 40px rgba(232,98,42,0.05);}
  .movie-table{width:100%;border-collapse:collapse;}
  .movie-table th{font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(200,230,255,0.95);padding:12px 14px;border-bottom:1px solid rgba(232,98,42,0.3);text-align:center;background:rgba(20,40,80,0.5);white-space:nowrap;font-weight:600;}
  .movie-table td{padding:11px 14px;border-bottom:1px solid rgba(232,98,42,0.12);font-size:12px;color:#4A2A08;vertical-align:middle;}
  .movie-table tr:last-child td{border-bottom:none;}
  .movie-table tr:hover td{background:rgba(255,255,255,0.08);}
  .title-cell{color:#E8F4FF;font-size:22px;font-weight:600;cursor:pointer;display:inline-block;position:relative;}
  .title-cell::after{content:'';position:absolute;left:0;bottom:-1px;width:0;height:1px;background:#E8622A;transition:width 0.25s ease;}
  .title-cell:hover{color:#3D2010;}
  .title-cell:hover::after{width:100%;}
  .orig-cell{color:#111111;font-size:10px;margin-top:2px;}
  .score-badge{display:inline-block;font-size:18px;font-weight:700;}
  .score-high{color:#FF8C00;}
  .score-mid{color:#00B8A0;}
  .score-low{color:#FF2222;text-shadow:0 0 6px rgba(255,0,0,0.6)30;}
  .venue-cinema{color:#111111;font-size:10px;font-weight:500;}
  .venue-home{color:#111111;font-size:10px;}
  .type-movie{display:inline-block;padding:3px 9px;border-radius:99px;font-size:12px;background:transparent;color:#111111;border:1.5px solid #111111;font-weight:700;}
  .type-tv{display:inline-block;padding:3px 9px;border-radius:99px;font-size:12px;background:transparent;color:#2DD4BF;border:1.5px solid #2DD4BF;font-weight:700;}
  .no-result{text-align:center;padding:48px 0;color:rgba(60,30,5,0.55);font-size:13px;letter-spacing:0.1em;}
  .active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;min-height:0;}
  .af-tag{display:inline-flex;align-items:center;gap:5px;background:rgba(232,98,42,0.15);border:1px solid rgba(232,98,42,0.4);border-radius:99px;padding:3px 10px;font-size:10px;color:#7A3800;cursor:pointer;}
  .af-tag:hover{background:rgba(232,98,42,0.3);}
  .af-tag .af-x{font-size:11px;opacity:0.7;}

  /* ── 海報燈箱 ── */
  .pm{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.92);align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
  .pm.open{display:flex;}
  .pm-inner{position:relative;display:flex;flex-direction:column;align-items:center;max-width:600px;width:100%;background:#F5EDE0;border:2px solid rgba(180,100,30,0.5);border-radius:20px;padding:40px 36px 32px;gap:24px;margin:auto;box-shadow:0 0 30px rgba(232,98,42,0.2),0 0 60px rgba(232,98,42,0.08),inset 0 0 30px rgba(232,98,42,0.04);}
  .pm-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:rgba(200,170,100,0.4);font-size:22px;cursor:pointer;line-height:1;z-index:10;}
  .pm-close:hover{color:#F5E6C0;}
  .pm-img-wrap{width:100%;display:flex;justify-content:center;}
  .pm-img{width:500px;max-width:92vw;height:auto;min-height:300px;border-radius:16px;display:block;object-fit:cover;box-shadow:0 16px 60px rgba(0,0,0,0.8);}
  .pm-placeholder{width:700px;max-width:92vw;height:1050px;max-height:72vh;background:rgba(180,140,60,0.07);border-radius:16px;display:flex;align-items:center;justify-content:center;color:rgba(200,170,100,0.3);font-size:11px;letter-spacing:0.1em;text-align:center;padding:16px;}
  .pm-info{width:100%;display:flex;flex-direction:column;align-items:center;gap:0;}
  .pm-title-zh{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#FFFFFF;line-height:1.3;margin-bottom:4px;text-align:center;}
  .pm-title-en{font-size:12px;color:rgba(220,190,130,0.75);margin-bottom:12px;letter-spacing:0.02em;text-align:center;}
  .pm-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;justify-content:center;}
  .pm-tag{font-size:10px;padding:3px 10px;border-radius:99px;background:rgba(232,98,42,0.12);color:#7A3800;border:1px solid rgba(232,98,42,0.35);}
  .pm-scores{display:flex;width:100%;border:1px solid rgba(180,140,60,0.12);border-radius:10px;overflow:hidden;margin-bottom:14px;}
  .pm-score-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border-right:1px solid rgba(180,140,60,0.12);}
  .pm-score-item:last-child{border-right:none;}
  .pm-score-lbl{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(220,190,130,0.6);}
  .pm-score-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:#FFD060;}
  .pm-overview{font-size:12px;color:rgba(220,200,160,0.85);line-height:1.9;width:100%;border-top:1px solid rgba(232,98,42,0.2);padding-top:14px;}

  @media(max-width:700px){
    .topnav{padding:12px 20px;}
    .page-content{padding:88px 16px 60px;}
    nav a{padding:5px 10px;font-size:8px;}
    .stats{grid-template-columns:repeat(2,1fr);}
    .top5-grid{grid-template-columns:repeat(3,1fr);}
    .movie-table th:nth-child(n+6),.movie-table td:nth-child(n+6){display:none;}
    .pm-img{width:200px;height:300px;}
    .pm-placeholder{width:200px;height:300px;}
  }

  /* ── 電影行事曆 ── */
  .cal-wrap{background:rgba(30,50,90,0.75);border:1px solid rgba(50,80,140,0.6);border-radius:14px;padding:24px;margin-bottom:24px;box-shadow:0 0 20px rgba(232,98,42,0.08);}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .cal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:#FFFFFF;letter-spacing:0.05em;}
  .cal-btn{background:transparent;border:1px solid rgba(255,180,100,0.7);border-radius:99px;color:#FFB060;font-size:22px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all 0.2s;}
  .cal-btn:hover{background:rgba(232,98,42,0.15);border-color:rgba(232,98,42,0.8);}
  .cal-today-btn{background:rgba(255,140,50,0.35);border:1px solid rgba(255,160,80,0.8);border-radius:99px;color:#FFD080;font-size:10px;padding:5px 14px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:0.06em;transition:all 0.2s;}
  .cal-today-btn:hover{background:rgba(232,98,42,0.45);color:#fff;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.75);text-align:center;padding-bottom:8px;}
  .cal-cell{min-height:62px;border-radius:8px;padding:6px;position:relative;cursor:default;transition:background 0.15s;}
  .cal-cell.has-movie{background:rgba(232,98,42,0.08);border:1px solid rgba(232,98,42,0.25);cursor:pointer;}
  .cal-cell.has-movie:hover{background:rgba(232,98,42,0.18);border-color:rgba(232,98,42,0.6);}
  .cal-cell.empty{opacity:0.25;}
  .cal-cell.other-month .cal-date{color:rgba(200,169,110,0.25);}
  .cal-date{font-size:11px;color:rgba(200,169,110,0.5);line-height:1;margin-bottom:4px;}
  .cal-cell.has-movie .cal-date{color:rgba(255,220,150,0.9);}
  /* 日期詳細列表 */
  .cal-day-movies{background:rgba(24,18,10,0.97);border:1px solid rgba(232,98,42,0.4);border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 4px 30px rgba(0,0,0,0.5);}
  .cal-day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(232,98,42,0.2);}
  .cal-day-header span{font-family:'Cormorant Garamond',serif;font-size:18px;color:#2C1A0E;}
  .cal-day-close{background:transparent;border:none;color:rgba(200,170,100,0.4);font-size:18px;cursor:pointer;}
  .cal-day-close:hover{color:#2C1A0E;}
  /* 日期列底色標示 */
  .cal-date-bar{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(232,98,42,0.55),rgba(180,60,10,0.3));border-radius:5px 5px 0 0;padding:3px 6px;margin-bottom:4px;}
  .cal-date-num{font-size:12px;font-weight:700;color:#fff;line-height:1;}
  .cal-date-other{font-size:11px;color:rgba(200,169,110,0.25);padding:3px 6px;}
  .cal-counter{font-size:9px;color:rgba(255,220,180,0.8);letter-spacing:0.05em;}
  /* 海報區 */
  .cal-poster-area{position:relative;width:100%;}
  .cal-poster-wrap{position:relative;width:100%;border-radius:5px;overflow:hidden;aspect-ratio:2/3;background:rgba(180,140,60,0.08);cursor:pointer;}
  .cal-poster-wrap:hover .cal-poster-img{opacity:0.85;}
  .cal-poster-text-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:4px;font-size:8px;color:#7A3800;text-align:center;word-break:break-all;line-height:1.3;background:rgba(232,98,42,0.08);}
  .cal-poster-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.2s;}
  /* 切換箭頭：疊在海報上 */
  .cal-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);border:none;color:rgba(255,200,120,0.95);font-size:18px;cursor:pointer;border-radius:4px;padding:4px 5px;line-height:1;z-index:5;transition:background 0.15s;}
  .cal-arrow:hover{background:rgba(232,98,42,0.75);}
  .cal-arrow-l{left:2px;}
  .cal-arrow-r{right:2px;}
  .cal-cell.is-today .cal-date-bar{background:linear-gradient(90deg,rgba(255,180,30,0.75),rgba(232,98,42,0.75));box-shadow:0 0 8px rgba(255,180,30,0.4);}
  .cal-cell.is-today .cal-date-num{color:#fff;text-shadow:0 0 6px rgba(255,200,50,0.7);}
  .cal-day-thumb{width:44px;height:64px;border-radius:6px;overflow:hidden;flex-shrink:0;background:rgba(180,140,60,0.08);}
  .cal-day-thumb img{width:100%;height:100%;object-fit:cover;}
  .cal-day-thumb-empty{width:100%;height:100%;}
  .cal-day-item{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,180,50,0.06);}
  .cal-day-item:last-child{border-bottom:none;}
  .cal-day-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:#2C1A0E;flex:1;cursor:pointer;}
  .cal-day-title:hover{color:#7A3800;}
  .cal-day-orig{font-size:10px;color:rgba(200,169,110,0.4);margin-top:1px;}
  .cal-day-score{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:700;}


  /* ── 共用 Menubar ── */
  .global-menubar{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    height:28px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    font-size:12px;color:rgba(255,255,255,0.92);
    letter-spacing:0.02em;
    font-family:'Space Mono',monospace;
  }
  .gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
  .gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
  .mb-menu{padding:0 6px;border-radius:4px;cursor:default;transition:background 0.15s;font-size:12px;}
  .mb-menu:hover{background:rgba(255,255,255,0.2);}

  /* ── 共用 Dock ── */
  .global-dock-wrap{
    position:fixed;bottom:0;left:50%;
    transform:translateX(-50%) translateY(calc(100% - 2px));
    z-index:9998;
    transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
    opacity:0;
    padding-bottom:0;
  }
  .global-dock-wrap.visible{
    transform:translateX(-50%) translateY(-12px);
    opacity:1;
  }
  .global-dock{
    display:flex;align-items:flex-end;gap:8px;
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px 20px 0 0;
    padding:10px 14px 14px;
    box-shadow:0 -4px 30px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .gd-item{
    display:flex;flex-direction:column;align-items:center;
    gap:3px;text-decoration:none;position:relative;cursor:pointer;
  }
  .gd-icon{
    width:65px;height:65px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;
    font-size:38px;
    position:relative;
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 3px 12px rgba(0,0,0,0.28);
  }
  .gd-item:hover .gd-icon{transform:translateY(-10px) scale(1.22);}
  .gd-label{
    font-size:9px;letter-spacing:0.05em;color:rgba(255,255,255,0.8);
    text-transform:uppercase;opacity:0;transition:opacity 0.15s;
    white-space:nowrap;background:rgba(0,0,0,0.6);
    padding:2px 6px;border-radius:4px;
    position:absolute;bottom:-20px;
    font-family:'Space Mono',monospace;
  }
  .gd-item:hover .gd-label{opacity:1;}
  .gd-sep{width:1px;height:40px;background:rgba(255,255,255,0.2);margin:0 3px;align-self:center;}
  .gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
  .ic-about  {background:linear-gradient(160deg,#8E9FE8 0%,#6B7FD4 40%,#5060C0 100%);}
  .ic-photos {background:linear-gradient(160deg,#FF6B8B 0%,#E8344F 50%,#C01830 100%);}
  .ic-dramas {background:linear-gradient(160deg,#C8601A 0%,#A03A08 50%,#782000 100%);}
  .ic-food   {background:linear-gradient(160deg,#FFB800 0%,#FF9500 45%,#E07000 100%);}
  .ic-travel {background:linear-gradient(160deg,#4A80C4 0%,#2A5898 50%,#153070 100%);}
  .ic-threads{background:linear-gradient(160deg,#444 0%,#222 50%,#111 100%);}
  /* 底部觸發區 */
  .dock-trigger-zone{
    position:fixed;bottom:0;left:0;right:0;height:8px;z-index:999;
  }

  /* ── 新增觀影記錄 ── */

function buildTop5(){
  const top5=[...DATA].sort((a,b)=>b.personal-a.personal).slice(0,5);
  const grid=document.getElementById('top5Grid');
  grid.innerHTML='';
  top5.forEach((m,i)=>{
    const card=document.createElement('div');
    card.className='poster-card';
    card.innerHTML=`<img src="" alt="${m.title}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;"><div class="poster-overlay"></div><div class="poster-info"><div class="poster-rank" style="color:#FFD700;font-weight:700;font-size:11px;letter-spacing:0.1em;">${RANKS[i]}</div><div class="poster-title" style="color:#fff;font-size:14px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,0.8);">${m.title}</div><div><span class="poster-score-num" style="color:#FFD700;font-size:18px;font-weight:700;">${m.personal.toFixed(1)}</span><span class="poster-score-label" style="color:rgba(255,255,255,0.8);font-size:10px;margin-left:4px;">個人評分</span></div></div>`;
    card.onclick=()=>openPoster(m);
    grid.appendChild(card);
    // 動態抓 TMDB 海報
    fetchPosterForCard(m, card.querySelector('img'));
  });
}

async function fetchPosterForCard(m, imgEl){
  try{
    const LANG_MAP2={'CN':'zh','TW':'zh','HK':'zh','JP':'ja','KR':'ko',
      'US':'en','GB':'en','AU':'en','FR':'fr','DE':'de','ES':'es',
      'IT':'it','IN':'hi','ID':'id','TR':'tr','IR':'fa','NL':'nl','CH':'de','MY':'ms'};
    const origLang2 = LANG_MAP2[m.lang]||null;
    const isLatin = s => Array.from(s||'').every(c=>c.charCodeAt(0)<0x0400);
    const year = m.year||0;

    function pickBest(results, year){
      if(!results||!results.length) return null;
      let pool = results;
      if(origLang2){
        const langMatch = results.filter(r=>r.original_language===origLang2);
        if(langMatch.length) pool = langMatch;
      }
      if(year&&year>0){
        const exact=pool.find(r=>r.release_date&&parseInt(r.release_date.substring(0,4))===year);
        if(exact) return exact;
        const near=pool.find(r=>r.release_date&&Math.abs(parseInt(r.release_date.substring(0,4))-year)<=1);
        if(near) return near;
      }
      return pool[0];
    }

    let poster = null;

    // 直接指定 TMDB ID
    if(TMDB_ID_OVERRIDE[m.title]){
      const r=await fetch(`https://api.themoviedb.org/3/movie/${TMDB_ID_OVERRIDE[m.title]}?api_key=${TMDB}&language=zh-TW`);
      const d=await r.json();
      if(d.poster_path) poster=d.poster_path;
    }

    if(!poster && m.orig && m.orig!=='nan' && isLatin(m.orig)){
      const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(m.orig)}&language=zh-TW`);
      const d=await r.json();
      const hit=pickBest(d.results, year);
      if(hit&&hit.poster_path) poster=hit.poster_path;
    }
    if(!poster){
      const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(m.title)}&language=zh-TW`);
      const d=await r.json();
      const hit=pickBest(d.results, year);
      if(hit&&hit.poster_path) poster=hit.poster_path;
    }
    if(!poster && m.orig && m.orig!=='nan' && !isLatin(m.orig)){
      const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(m.orig)}&language=zh-TW`);
      const d=await r.json();
      const hit=pickBest(d.results, year);
      if(hit&&hit.poster_path) poster=hit.poster_path;
    }
    if(!poster){
      const r=await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB}&query=${encodeURIComponent(m.title)}&language=zh-TW`);
      const d=await r.json();
      if(d.results&&d.results[0]&&d.results[0].poster_path) poster=d.results[0].poster_path;
    }

    if(poster) imgEl.src=`https://image.tmdb.org/t/p/w300${poster}`;
    else imgEl.style.display='none';
  }catch(e){ imgEl.style.display='none'; }
}

let fLang='',fVenue='',fYear='',fDist='',fType='',sort='date-desc',q='';
const sc=s=>s>=8?'score-high':s>=6?'score-mid':'score-low';
const st=s=>s===0?'—':s.toFixed(1);

function render(){
  let data=DATA.filter(m=>{
    if(fLang&&m.lang!==fLang)return false;
    if(fType&&m.type!==fType)return false;
    if(fVenue&&m.venue!==fVenue)return false;
    if(fYear&&String(m.year)!==fYear)return false;
    if(fDist&&m.dist!==fDist)return false;
    if(q&&!m.title.includes(q)&&!m.orig.toLowerCase().includes(q.toLowerCase()))return false;
    return true;
  });
  data.sort((a,b)=>sort==='date-desc'?b.date.localeCompare(a.date):sort==='score-desc'?b.score-a.score:sort==='personal-desc'?b.personal-a.personal:b.year-a.year);
  const tbody=document.getElementById('movieBody');
  tbody.innerHTML='';

    {key:'fVenue',val:fVenue,label:fVenue,clear:()=>{fVenue='';document.getElementById('venueSelect').value='';}},
    {key:'fDist',val:fDist,label:fDist,clear:()=>{fDist='';document.getElementById('distSelect').value='';}},
  ];
  tags.forEach(t=>{
    if(!t.val) return;
    const tag=document.createElement('span');
    tag.className='af-tag';
    tag.innerHTML=t.label+' <span class="af-x">✕</span>';
    tag.onclick=()=>{t.clear();render();};
    afEl.appendChild(tag);
  });
  const avg=(DATA.reduce((s,m)=>s+m.personal,0)/DATA.length).toFixed(2);
  // 計算每月平均觀看部數
  const monthMap={};
  DATA.forEach(m=>{
    if(m.date){
      const ym=m.date.substring(0,7);
      monthMap[ym]=(monthMap[ym]||0)+1;
    }
  });
  const months=Object.keys(monthMap);
  const avgPerMonth=months.length>0?(DATA.length/months.length):0;
  const cin=DATA.filter(m=>m.venue.includes('🎬')).length;
  function countUp(el, target, suffix, decimals=0, duration=900){
    const start=0, step=16;
    let cur=start, steps=Math.ceil(duration/step);
    const inc=(target-start)/steps;
    const timer=setInterval(()=>{
      cur+=inc; steps--;
      if(steps<=0){clearInterval(timer);el.textContent=target.toFixed(decimals)+suffix;return;}
      el.textContent=cur.toFixed(decimals)+suffix;
    },step);
  }
  countUp(document.getElementById('sTotal'), DATA.length, ' 部');
  countUp(document.getElementById('sAvg'), parseFloat(avg), '', 2, 1000);
  countUp(document.getElementById('sBest'), avgPerMonth, ' 部', 1, 800);
  countUp(document.getElementById('sCinema'), cin, ' 場');
  buildFilters();
}

function buildFilters(){

    if(m.year) years[m.year] = (years[m.year]||0) + 1;
    if(m.dist && m.dist !== 'nan') dists[m.dist] = (dists[m.dist]||0) + 1;
  });

  const LANG_NAME = {'US':'🇺🇸 美國','KR':'🇰🇷 韓國','JP':'🇯🇵 日本','TW':'🇹🇼 台灣','CN':'🇨🇳 中國','HK':'🇭🇰 香港',
    'GB':'🇬🇧 英國','FR':'🇫🇷 法國','DE':'🇩🇪 德國','ES':'🇪🇸 西班牙','IT':'🇮🇹 義大利','AU':'🇦🇺 澳洲',
    'IN':'🇮🇳 印度','ID':'🇮🇩 印尼','TR':'🇹🇷 土耳其','IR':'🇮🇷 伊朗','NL':'🇳🇱 荷蘭','CH':'🇨🇭 瑞士',
    'MY':'🇲🇾 馬來西亞','SE':'🇸🇪 瑞典','PL':'🇵🇱 波蘭','BE':'🇧🇪 比利時','DK':'🇩🇰 丹麥','NO':'🇳🇴 挪威'};

  // 國家
  const langSel = document.getElementById('langSelect');
  const curLang = langSel.value;

    Object.entries(counts).sort((a,b)=>b[1]-a[1])

      .map(([k,v])=>`<option value="${k}">${k} (${v})</option>`).join('');
  distSel.value = curDist;

  // 觀看地點
  const venueSel = document.getElementById('venueSelect');

  venueSel.innerHTML = '<option value="">全部地點</option>' +
    Object.entries(venues).sort((a,b)=>b[1]-a[1])
      .map(([k,v])=>`<option value="${k}">${k} (${v})</option>`).join('');

  // 種類

  const TYPE_ICON = {'電影':'🎬','影集':'📺','紀錄片':'🎥','動畫':'🎨'};

async function openPoster(m){
  pm.classList.add('open');
  pmImg.style.display='none';
  pmPlaceholder.style.display='flex';
  pmPlaceholder.textContent='載入中...';
  document.getElementById('pmTitleZH').textContent=m.title;
  document.getElementById('pmTitleEN').textContent=m.orig!=='nan'?m.orig:'';
  document.getElementById('pmTags').innerHTML='';
  document.getElementById('pmOverview').textContent='';
  document.getElementById('pmPersonal').textContent=m.personal>0?m.personal.toFixed(1):'—';
  document.getElementById('pmScore').textContent=m.score>0?m.score.toFixed(2):'—';
  document.getElementById('pmIMDB').textContent=m.imdb>0?m.imdb:'—';
  document.getElementById('pmDouban').textContent=m.douban>0?m.douban:'—';
  try{
    // 年份+語言比對函數
    const LANG_MAP2={'CN':'zh','TW':'zh','HK':'zh','JP':'ja','KR':'ko',
      'US':'en','GB':'en','AU':'en','FR':'fr','DE':'de','ES':'es',
      'IT':'it','IN':'hi','ID':'id','TR':'tr','IR':'fa','NL':'nl','CH':'de','MY':'ms'};
    const origLang2 = LANG_MAP2[m.lang]||null;
    function pickBest(results, year){
      if(!results||!results.length) return null;
      let pool = results;
      if(origLang2){
        const langMatch = results.filter(r=>r.original_language===origLang2);
        if(langMatch.length) pool = langMatch;
      }
      if(year&&year>0){
        const exact=pool.find(r=>r.release_date&&parseInt(r.release_date.substring(0,4))===year);
        if(exact) return exact;
        const near=pool.find(r=>r.release_date&&Math.abs(parseInt(r.release_date.substring(0,4))-year)<=1);
        if(near) return near;
      }
      return pool[0];
    }
    const isLatin = s => Array.from(s||'').every(c=>c.charCodeAt(0)<0x0400);
    const year=m.year||0;

    // 直接指定 TMDB ID
    if(TMDB_ID_OVERRIDE[m.title]){
      const r0=await fetch(`https://api.themoviedb.org/3/movie/${TMDB_ID_OVERRIDE[m.title]}?api_key=${TMDB}&language=zh-TW`);
      const d0=await r0.json();
      if(d0.poster_path){
        pmImg.onload=()=>{pmPlaceholder.style.display='none';pmImg.style.display='block';};
        pmImg.src=`https://image.tmdb.org/t/p/w500${d0.poster_path}`;
        if(d0.genres) document.getElementById('pmTags').innerHTML=d0.genres.slice(0,5).map(g=>`<span class="pm-tag">${g.name}</span>`).join('');
        document.getElementById('pmOverview').textContent=d0.overview||'暫無簡介';
        return;
      }
    }
    let movie=null;
    // 1. 英文原名（拉丁）
    if(m.orig&&m.orig!=='nan'&&isLatin(m.orig)){
      let res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(m.orig)}&language=zh-TW`);
      let json=await res.json();
      movie=pickBest(json.results,year);
    }
    // 2. 中文片名
    if(!movie||!movie.poster_path){
      let res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(m.title)}&language=zh-TW`);
      let json=await res.json();
      movie=pickBest(json.results,year)||movie;
    }
    // 3. 非拉丁原名（韓文/日文）
    if((!movie||!movie.poster_path)&&m.orig&&m.orig!=='nan'&&!isLatin(m.orig)){
      let res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB}&query=${encodeURIComponent(m.orig)}&language=zh-TW`);
      let json=await res.json();
      movie=pickBest(json.results,year)||movie;
    }
    // 4. TV 備援
    if(!movie||!movie.poster_path){
      let res=await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB}&query=${encodeURIComponent(m.title)}&language=zh-TW`);
      let json=await res.json();
      if(json.results&&json.results[0]) movie=json.results[0];
    }
    if(movie){
      if(movie.poster_path){
        pmImg.onload=()=>{pmPlaceholder.style.display='none';pmImg.style.display='block';};
        pmImg.onerror=()=>{pmPlaceholder.textContent='無海報圖';};
        pmImg.src=`https://image.tmdb.org/t/p/w500${movie.poster_path}`;
      }else{pmPlaceholder.textContent='無海報圖';}
      if(movie.genre_ids&&movie.genre_ids.length){
        document.getElementById('pmTags').innerHTML=movie.genre_ids.slice(0,5).map(id=>GENRE[id]?`<span class="pm-tag">${GENRE[id]}</span>`:'').join('');
      }
      let overview=movie.overview||'';
      if(!overview){
        const r2=await fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${TMDB}&language=en-US`);
        const d2=await r2.json();
        overview=d2.overview||'';
      }
      document.getElementById('pmOverview').textContent=overview||'暫無簡介';
    }else{pmPlaceholder.textContent='找不到資料';}
  }catch(e){pmPlaceholder.textContent='載入失敗';}
}

(function(){
  const TMDB_KEY = 'e174d0983218845b167176a27b04b83f';
  let curYear, curMonth;
  const dates = DATA.map(m=>m.date).filter(Boolean).sort().reverse();
  if(dates.length){
    const d = new Date(dates[0]);
    curYear = d.getFullYear(); curMonth = d.getMonth();
  } else {
    const now = new Date();
    curYear = now.getFullYear(); curMonth = now.getMonth();
  }

  const posterCache = {};
  // 每格目前顯示的 index
  const cellIdx = {};

  function buildDateMap(){
    const map = {};
    DATA.forEach(m=>{
      if(!m.date) return;
      const k = m.date.substring(0,10);
      if(!map[k]) map[k]=[];
      map[k].push(m);
    });
    return map;
  }
  const dateMap = buildDateMap();
  const DOWS = ['一','二','三','四','五','六','日'];
  const sc = s => s>=8?'score-high':s>=6?'score-mid':'score-low';

  async function fetchPoster(movie){
    const title = movie.title;
    if(posterCache[title]!==undefined) return posterCache[title];
    posterCache[title] = null;
    // 年份比對：優先完全符合，其次差1年
    function pickBest(results, year){
      if(!results||!results.length) return null;
      if(year&&year>0){
        const exact=results.find(r=>r.release_date&&parseInt(r.release_date.substring(0,4))===year);
        if(exact) return exact;
        const near=results.find(r=>r.release_date&&Math.abs(parseInt(r.release_date.substring(0,4))-year)<=1);
        if(near) return near;
      }
      return results[0];
    }
    try {
      const year = movie.year||0;
      const isLatin = s => Array.from(s||'').every(c=>c.charCodeAt(0)<0x0400);
      const isTV = movie.type==='影集';

      // 直接指定 TMDB ID（解決搜尋易出錯的片）
      if(TMDB_ID_OVERRIDE[title]){
        const r = await fetch(`https://api.themoviedb.org/3/movie/${TMDB_ID_OVERRIDE[title]}?api_key=${TMDB_KEY}&language=zh-TW`);
        const d = await r.json();
        if(d.poster_path){
          posterCache[title] = `https://image.tmdb.org/t/p/w185${d.poster_path}`;
          return posterCache[title];
        }
      }

      // 語言代碼 → TMDB original_language
      const LANG_MAP={'CN':'zh','TW':'zh','HK':'zh','JP':'ja','KR':'ko',
        'US':'en','GB':'en','AU':'en','FR':'fr','DE':'de','ES':'es',
        'IT':'it','IN':'hi','ID':'id','TR':'tr','IR':'fa','NL':'nl','CH':'de','MY':'ms'};
      const origLang = LANG_MAP[movie.lang]||null;

      // pickBest 加入 original_language 比對
      function pickBestWithLang(results, year, origLang){
        if(!results||!results.length) return null;
        let pool = results;
        // 先用 original_language 過濾
        if(origLang){
          const langMatch = results.filter(r=>r.original_language===origLang);
          if(langMatch.length) pool = langMatch;
        }
        if(year>0){
          const exact = pool.find(r=>r.release_date&&parseInt(r.release_date.substring(0,4))===year);
          if(exact) return exact;
          const near = pool.find(r=>r.release_date&&Math.abs(parseInt(r.release_date.substring(0,4))-year)<=1);
          if(near) return near;
        }
        return pool[0];
      }

      // 影集優先走 TV 搜尋
      if(isTV && movie.orig && movie.orig!=='nan'){
        const res = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(movie.orig)}&language=zh-TW`);
        const json = await res.json();
        const m = pickBestWithLang(json.results, year, origLang);
        if(m && m.poster_path){
          posterCache[title] = `https://image.tmdb.org/t/p/w185${m.poster_path}`;
          return posterCache[title];
        }
      }
      if(isTV){
        const res = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(movie.title)}&language=zh-TW`);
        const json = await res.json();
        const m = pickBestWithLang(json.results, year, origLang);
        if(m && m.poster_path){
          posterCache[title] = `https://image.tmdb.org/t/p/w185${m.poster_path}`;
          return posterCache[title];
        }
      }

      // 英文原名搜電影（拉丁字母）
      if(movie.orig && movie.orig!=='nan' && isLatin(movie.orig)){
        const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(movie.orig)}&language=zh-TW`);
        const json = await res.json();
        const m = pickBestWithLang(json.results, year, origLang);
        if(m && m.poster_path){
          posterCache[title] = `https://image.tmdb.org/t/p/w185${m.poster_path}`;
          return posterCache[title];
        }
      }
      // 中文片名搜電影
      const res2 = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(movie.title)}&language=zh-TW`);
      const json2 = await res2.json();
      const m2 = pickBestWithLang(json2.results, year, origLang);
      if(m2 && m2.poster_path){
        posterCache[title] = `https://image.tmdb.org/t/p/w185${m2.poster_path}`;
        return posterCache[title];
      }
      // 非拉丁原名搜電影
      if(movie.orig && movie.orig!=='nan' && !isLatin(movie.orig)){
        const res3 = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(movie.orig)}&language=zh-TW`);
        const json3 = await res3.json();
        const m3 = pickBestWithLang(json3.results, year, origLang);
        if(m3 && m3.poster_path){
          posterCache[title] = `https://image.tmdb.org/t/p/w185${m3.poster_path}`;
          return posterCache[title];
        }
      }
      posterCache[title] = null;
      return null;
    } catch(e){ return null; }
  }

  async function prefetchMonthPosters(){
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    const arr = [];
    for(let d=1;d<=daysInMonth;d++){
      const ds = curYear+'-'+(String(curMonth+1).padStart(2,'0'))+'-'+(String(d).padStart(2,'0'));
      (dateMap[ds]||[]).forEach(m=>{ if(posterCache[m.title]===undefined) arr.push(m); });
    }
    for(let i=0;i<arr.length;i+=6){
      await Promise.all(arr.slice(i,i+6).map(m=>fetchPoster(m)));
    }
  }

  // 更新單格海報顯示
  function updateCell(dateStr, movies, idx){

      const el = document.createElement('div');
      el.className='cal-cell other-month';
      el.innerHTML=`<div class="cal-date cal-date-other">${d}</div>`;
      grid.appendChild(el);
    }

    // 本月
    for(let d=1;d<=daysInMonth;d++){
      const dateStr = curYear+'-'+(String(curMonth+1).padStart(2,'0'))+'-'+(String(d).padStart(2,'0'));
      const movies = dateMap[dateStr]||[];
      const el = document.createElement('div');
      const todayStr = (new Date()).toISOString().substring(0,10);
      el.className = 'cal-cell' + (movies.length?' has-movie':'') + (dateStr===todayStr?' is-today':'');
      el.dataset.date = dateStr;

      if(movies.length){
        const idx = cellIdx[dateStr]||0;
        const m = movies[idx];
        const pUrl = posterCache[m.title];
        const multi = movies.length>1;
        el.innerHTML = `
          <div class="cal-date-bar">
            <span class="cal-date-num">${d}</span>
            ${multi?`<span class="cal-counter">${idx+1}/${movies.length}</span>`:''}
          </div>
          <div class="cal-poster-area">
            ${multi?`<button class="cal-arrow cal-arrow-l" data-date="${dateStr}">&#8249;</button>`:''}
            <div class="cal-poster-wrap">
              ${pUrl
                ? `<img class="cal-poster-img" src="${pUrl}" alt="${m.title}">`
                : `<div class="cal-poster-img" style="display:none"></div>`}
              <div class="cal-poster-text-fb" style="display:${pUrl?'none':'flex'}">${m.title}</div>

            </div>
            ${multi?`<button class="cal-arrow cal-arrow-r" data-date="${dateStr}">&#8250;</button>`:''}
          </div>`;

        // 點海報主體 → 燈箱
        el.querySelector('.cal-poster-wrap').addEventListener('click',()=>{
          const ci = cellIdx[dateStr]||0;
          openPoster(movies[ci]);
        });

        // 左右箭頭
        if(multi){
          el.querySelector('.cal-arrow-l').addEventListener('click', e=>{
            e.stopPropagation();
            const ci = cellIdx[dateStr]||0;
            updateCell(dateStr, movies, (ci-1+movies.length)%movies.length);
          });
          el.querySelector('.cal-arrow-r').addEventListener('click', e=>{
            e.stopPropagation();
            const ci = cellIdx[dateStr]||0;
            updateCell(dateStr, movies, (ci+1)%movies.length);
          });
        }
      } else {
        el.innerHTML = `<div class="cal-date-bar"><span class="cal-date-num">${d}</span></div>`;
      }
      grid.appendChild(el);
    }

    // 後月
    const total = startDow + daysInMonth;
    const remain = total%7===0?0:7-(total%7);
    for(let i=1;i<=remain;i++){
      const el = document.createElement('div');
      el.className='cal-cell other-month';
      el.innerHTML=`<div class="cal-date cal-date-other">${i}</div>`;
      grid.appendChild(el);
    }
  }

  document.getElementById('calPrev').onclick=()=>{
    curMonth--; if(curMonth<0){curMonth=11;curYear--;}
    document.getElementById('calDayMovies').style.display='none';
    renderCal();
  };
  document.getElementById('calNext').onclick=()=>{
    curMonth++; if(curMonth>11){curMonth=0;curYear++;}
    document.getElementById('calDayMovies').style.display='none';
    renderCal();
  };
  document.getElementById('calToday').onclick=()=>{
    if(dates.length){const d=new Date(dates[0]);curYear=d.getFullYear();curMonth=d.getMonth();}
    document.getElementById('calDayMovies').style.display='none';
    renderCal();
  };
  document.getElementById('calDayClose').onclick=()=>{
    document.getElementById('calDayMovies').style.display='none';
  };

  renderCal();
})();

</script>

<script>
(function(){
  // ── GitHub 設定（儲存在 localStorage，不寫入原始碼）──
  var GH_TOKEN_KEY = 'ghToken_dramas';
  var GH_OWNER = 'sumoai-boop';
  var GH_REPO  = 'sumoai-boop.github.io';
  var GH_PATH  = 'dramas.html';
  var GH_BRANCH = 'main';

  // ── 從 GitHub 讀取最新資料 ──
  (function(){
    var token = localStorage.getItem(GH_TOKEN_KEY);
    if(!token) return;
    var api = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_PATH;
    fetch(api + '?ref=' + GH_BRANCH + '&t=' + Date.now(), {
      headers: {'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json'}
    }).then(function(r){ return r.json(); }).then(function(fi){
      if(!fi || !fi.sha) return;
      var html;
      if(fi.content && fi.content.trim() !== ''){
        html = decodeURIComponent(escape(atob(fi.content.split('\n').join(''))));
      } else if(fi.download_url){
        return fetch(fi.download_url + '?t=' + Date.now())
          .then(function(r){ return r.text(); })
          .then(function(text){ loadNewData(text); });
      }
      if(html) loadNewData(html);
    }).catch(function(e){ console.warn('dramas sync:', e); });

    function loadNewData(html){
      var m = html.indexOf('const DATA=[');
      var e = html.indexOf('];', m);
      if(m === -1 || e === -1) return;
      var newDataStr = html.slice(m + 'const DATA=['.length, e);
      try{
        var newData = JSON.parse('[' + newDataStr + ']');
        if(newData.length > 0 && newData.length >= DATA.length){
          DATA.length = 0;
          newData.forEach(function(d){ DATA.push(d); });
          render();
          if(typeof buildTop5 === 'function') buildTop5();
          if(typeof renderCal === 'function') renderCal();
        }
      }catch(e){ console.warn('parse error:', e); }
    }
  })();

  // ── 初始化 ──
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('ar_date').value = today;
  document.getElementById('ar_year').value = new Date().getFullYear();

  // ── Modal 開關 ──
  var modal = document.getElementById('addModal');
  function openModal(){
    modal.classList.add('open');
    document.body.style.overflow = 'hidden';
    setTimeout(function(){ document.getElementById('ar_title').focus(); }, 120);
  }
  function closeModal(){
    modal.classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('addRecordFab').addEventListener('click', openModal);
  document.getElementById('addModalClose').addEventListener('click', closeModal);
  document.getElementById('arCancelBtn').addEventListener('click', closeModal);
  modal.addEventListener('click', function(e){ if(e.target === modal) closeModal(); });
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape' && modal.classList.contains('open')) closeModal(); });

  // ── Toast 工具 ──
  function showToast(msg, isError){
    var toast = document.getElementById('arToast');
    if(!toast){
      toast = document.createElement('div');
      toast.id = 'arToast';
      toast.style.cssText = 'position:fixed;bottom:100px;right:32px;z-index:11000;color:#fff;font-family:"Space Mono",monospace;font-size:13px;font-weight:700;padding:12px 20px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.4);opacity:0;transform:translateY(10px);transition:opacity 0.3s,transform 0.3s;pointer-events:none;max-width:320px;line-height:1.5;';
      document.body.appendChild(toast);
    }
    toast.style.background = isError
      ? 'linear-gradient(135deg,#c0392b,#e74c3c)'
      : 'linear-gradient(135deg,#e8622a,#ffb432)';
    toast.textContent = msg;
    requestAnimationFrame(function(){ toast.style.opacity='1'; toast.style.transform='translateY(0)'; });
    setTimeout(function(){ toast.style.opacity='0'; toast.style.transform='translateY(10px)'; }, isError ? 5000 : 3000);
  }

  // ── GitHub API：取得檔案 SHA 並推送更新 ──
  async function pushToGitHub(newRecord){
    var token = localStorage.getItem(GH_TOKEN_KEY);
    if(!token){
      token = prompt('請輸入 GitHub Personal Access Token（需有 repo 寫入權限）：\n\n此 Token 僅儲存在你的瀏覽器本地，不會傳送給任何第三方。');
      if(!token) return false;
      localStorage.setItem(GH_TOKEN_KEY, token.trim());
      token = token.trim();
    }

    var apiBase = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_PATH;
    var headers = {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    };

    // 1. 取得現有檔案（需要 SHA）
    showToast('⏳ 正在連線 GitHub...', false);
    var getResp = await fetch(apiBase + '?ref=' + GH_BRANCH, { headers: headers });
    if(!getResp.ok){
      if(getResp.status === 401){
        localStorage.removeItem(GH_TOKEN_KEY);
        showToast('❌ Token 無效，請重新設定', true);
      } else {
        showToast('❌ GitHub 連線失敗（' + getResp.status + '）', true);
      }
      return false;
    }
    var fileInfo = await getResp.json();
    var sha = fileInfo.sha;

    // 2. 解碼目前內容（大檔案 content 為空，改用 download_url）
    var currentContent;
    if(fileInfo.content && fileInfo.content.trim() !== ''){
      currentContent = decodeURIComponent(escape(atob(fileInfo.content.replace(/\n/g, ''))));
    } else if(fileInfo.download_url){
      showToast('⏳ 檔案較大，正在下載...', false);
      var dlResp = await fetch(fileInfo.download_url);
      if(!dlResp.ok){ showToast('❌ 下載失敗（' + dlResp.status + '）', true); return false; }
      currentContent = await dlResp.text();
    } else {
      showToast('❌ 無法取得檔案內容', true);
      return false;
    }

    // 3. 在 DATA=[ 開頭插入新記錄（用正則，容許空格/換行變化）
    var dataMatch = currentContent.match(/const\s+DATA\s*=\s*\[/);
    if(!dataMatch){ showToast('❌ 找不到 DATA 陣列', true); return false; }
    var insertAt = dataMatch.index + dataMatch[0].length;
    var recordJson = JSON.stringify(newRecord);
    var newContent = currentContent.slice(0, insertAt) + recordJson + ',' + currentContent.slice(insertAt);

    // 4. 推送更新
    var encoded = btoa(unescape(encodeURIComponent(newContent)));
    var pushResp = await fetch(apiBase, {
      method: 'PUT',
      headers: headers,
      body: JSON.stringify({
        message: '新增觀影記錄：' + newRecord.title + ' (' + newRecord.date + ')',
        content: encoded,
        sha: sha,
        branch: GH_BRANCH
      })
    });

    if(!pushResp.ok){
      var err = await pushResp.json();
      showToast('❌ 推送失敗：' + (err.message || pushResp.status), true);
      return false;
    }
    return true;
  }

  // ── 新增記錄 ──
  document.getElementById('arSubmitBtn').addEventListener('click', async function(){
    var date   = document.getElementById('ar_date').value;
    var type   = document.getElementById('ar_type').value;
    var title  = document.getElementById('ar_title').value.trim();
    var orig   = document.getElementById('ar_orig').value.trim();
    var lang   = document.getElementById('ar_lang').value;
    var year   = parseInt(document.getElementById('ar_year').value);
    var imdbV  = document.getElementById('ar_imdb').value;
    var doubV  = document.getElementById('ar_douban').value;
    var persV  = document.getElementById('ar_personal').value;
    var dist   = document.getElementById('ar_dist').value;
    var venue  = document.getElementById('ar_venue').value;

    var missing = [];
    if(!date)  missing.push('觀看日期');
    if(!title) missing.push('中文片名');
    if(!year)  missing.push('上映年份');
    if(!persV) missing.push('個人評分');
    if(missing.length){ alert('請填寫必填欄位：' + missing.join('、')); return; }

    var r = { date:date, year:year, type:type, lang:lang, title:title, orig:orig||'' };
    r.imdb    = imdbV ? parseFloat(imdbV) : 0;
    r.douban  = doubV ? parseFloat(doubV) : 0;
    r.personal = parseFloat(persV);
    r.dist    = dist || '';
    r.venue   = venue;

    // 立即更新頁面 UI
    DATA.unshift(r);
    render();
    if(typeof buildTop5 === 'function') buildTop5();
    if(typeof renderCal === 'function') renderCal();

    // 更新年份篩選器
    (function(){
      var ySel = document.getElementById('yearSelect');
      var yVal = String(year);
      var found = false;
      for(var i=0; i<ySel.options.length; i++){ if(ySel.options[i].value===yVal){ found=true; break; } }
      if(!found){ var op=document.createElement('option'); op.value=yVal; op.textContent=yVal; ySel.appendChild(op); }
    })();

    closeModal();

    // 重置表單
    document.getElementById('ar_title').value   = '';
    document.getElementById('ar_orig').value    = '';
    document.getElementById('ar_imdb').value    = '';
    document.getElementById('ar_douban').value  = '';
    document.getElementById('ar_personal').value = '';
    document.getElementById('ar_dist').value    = '';
    document.getElementById('ar_date').value    = new Date().toISOString().split('T')[0];
    document.getElementById('ar_year').value    = new Date().getFullYear();

    // 推送到 GitHub
    var ok = await pushToGitHub(r);
    if(ok){
      showToast('✦ 已永久儲存「' + title + '」到網頁！\n約 1 分鐘後所有裝置生效', false);
    }
  });

  // ── 清除 Token（在 console 執行 clearGHToken() 可重設）──
  window.clearGHToken = function(){ localStorage.removeItem(GH_TOKEN_KEY); alert('Token 已清除'); };

  // ── 刪除記錄 ──
  async function deleteRecord(target){
    if(!confirm('確定要刪除「' + target.title + '」嗎？\n此操作會從網站永久移除。')) return;
    const idx = DATA.findIndex(m => m.title === target.title && m.date === target.date && m.personal === target.personal);
    if(idx === -1){ alert('找不到該記錄'); return; }
    DATA.splice(idx, 1);
    render();
    if(typeof buildTop5 === 'function') buildTop5();
    var token = localStorage.getItem(GH_TOKEN_KEY);
    if(!token){ token = prompt('請輸入 GitHub Personal Access Token：'); if(!token) return; localStorage.setItem(GH_TOKEN_KEY, token.trim()); token = token.trim(); }
    var apiBase = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_PATH;
    var headers = {'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
    showToast('⏳ 正在連線 GitHub...', false);
    var getResp = await fetch(apiBase + '?ref=' + GH_BRANCH, { headers: headers });
    if(!getResp.ok){ showToast('❌ GitHub 連線失敗（' + getResp.status + '）', true); return; }
    var fileInfo = await getResp.json();
    var sha = fileInfo.sha;
    var currentContent;
    if(fileInfo.content && fileInfo.content.trim() !== ''){
      currentContent = decodeURIComponent(escape(atob(fileInfo.content.replace(/\n/g, ''))));
    } else if(fileInfo.download_url){
      showToast('⏳ 下載中...', false);
      var dlResp = await fetch(fileInfo.download_url);
      currentContent = await dlResp.text();
    } else { showToast('❌ 無法取得檔案內容', true); return; }
    var targetJson = JSON.stringify(target);
    var newContent = currentContent.replace(targetJson + ',', '').replace(',' + targetJson, '').replace(targetJson, '');
    if(newContent === currentContent){ showToast('❌ 找不到對應記錄', true); return; }
    var encoded = btoa(unescape(encodeURIComponent(newContent)));
    var pushResp = await fetch(apiBase, {method:'PUT',headers:headers,body:JSON.stringify({message:'刪除：'+target.title,content:encoded,sha:sha,branch:GH_BRANCH})});
    if(!pushResp.ok){ var err = await pushResp.json(); showToast('❌ 推送失敗：'+(err.message||pushResp.status), true); }
    else { showToast('✦ 已刪除「'+target.title+'」', false); }
  }
  window.deleteRecord = deleteRecord;
})();
</script>
</body>
</html>
