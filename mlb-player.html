<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>李政厚 Jung Hoo Lee | MLB 數據追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16130F;          /* 暖黑 */
    --card:#211D17;
    --card-edge:#322B22;
    --orange:#FD5A1E;       /* 巨人橘 */
    --orange-soft:#FF8A5C;
    --cream:#EFE5D6;
    --muted:#9A8F80;
    --green:#6FBF73;
    --red:#E05B5B;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--ink);
    color:var(--cream);
    font-family:'Noto Sans TC',sans-serif;
    min-height:100vh;
  }
  .num{font-family:'Archivo',sans-serif;font-variant-numeric:tabular-nums;}

  .wrap{max-width:980px;margin:0 auto;padding:0 20px 80px;}

  /* ---------- Hero ---------- */
  .hero{
    position:relative;
    padding:72px 0 36px;
    overflow:hidden;
    border-bottom:1px solid var(--card-edge);
  }
  .hero::before{
    content:var(--jersey,"");
    position:absolute;
    right:-30px;top:-60px;
    font-family:'Archivo',sans-serif;
    font-weight:900;
    font-stretch:125%;
    font-size:min(340px,60vw);
    line-height:1;
    color:transparent;
    -webkit-text-stroke:1px rgba(253,90,30,.22);
    pointer-events:none;
    user-select:none;
  }
  .hero-inner{display:flex;align-items:flex-end;gap:28px;position:relative;flex-wrap:wrap;}
  .headshot{
    width:148px;height:148px;border-radius:50%;
    border:3px solid var(--orange);
    background:#2A251D;
    object-fit:cover;flex-shrink:0;
  }
  .back-link{
    display:inline-block;margin-bottom:18px;
    color:var(--muted);text-decoration:none;font-size:13px;letter-spacing:.08em;
    border:1px solid var(--card-edge);border-radius:999px;padding:5px 14px;
    transition:color .15s,border-color .15s;position:relative;z-index:2;
  }
  .back-link:hover{color:var(--orange);border-color:var(--orange);}
  .eyebrow{
    font-size:12px;letter-spacing:.25em;color:var(--orange);
    font-weight:700;margin-bottom:6px;
  }
  h1{
    font-family:'Archivo','Noto Sans TC',sans-serif;
    font-weight:900;font-stretch:110%;
    font-size:clamp(34px,6vw,56px);
    line-height:1.05;letter-spacing:.01em;
  }
  h1 .zh{font-family:'Noto Sans TC';font-weight:900;}
  .bio-line{margin-top:10px;color:var(--muted);font-size:14px;display:flex;flex-wrap:wrap;gap:6px 18px;}
  .bio-line b{color:var(--cream);font-weight:500;}
  .tag-wind{
    display:inline-block;margin-top:12px;padding:5px 14px;
    border:1px solid var(--orange);border-radius:999px;
    color:var(--orange-soft);font-size:13px;letter-spacing:.12em;
  }

  /* ---------- Section title ---------- */
  .sec{margin-top:44px;}
  .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:16px;}
  .sec-head h2{font-size:18px;font-weight:700;letter-spacing:.06em;}
  .sec-head .en{font-family:'Archivo';font-size:11px;letter-spacing:.22em;color:var(--muted);font-weight:600;}
  .sec-head .season-pill{
    margin-left:auto;font-family:'Archivo';font-weight:800;font-size:13px;
    color:var(--ink);background:var(--orange);border-radius:6px;padding:3px 10px;
  }

  /* ---------- Stat grid ---------- */
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(118px,1fr));
    gap:10px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:12px;
    padding:16px 14px 13px;
  }
  .stat-card .v{font-family:'Archivo';font-weight:800;font-size:28px;line-height:1;font-variant-numeric:tabular-nums;}
  .stat-card .k{margin-top:7px;font-size:12px;color:var(--muted);letter-spacing:.08em;}
  .stat-card.hot .v{color:var(--orange);}

  /* ---------- Trend chart ---------- */
  .chart-card{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:14px;
    padding:18px 14px 10px;
  }
  .chart-legend{margin-left:auto;display:flex;gap:14px;font-size:12px;color:var(--muted);}
  .chart-legend .lg{display:flex;align-items:center;gap:6px;}
  .chart-legend i{display:inline-block;width:14px;height:3px;border-radius:2px;}

  /* ---------- Tables ---------- */
  .tbl-wrap{
    background:var(--card);
    border:1px solid var(--card-edge);
    border-radius:14px;
    overflow-x:auto;
  }
  table{border-collapse:collapse;width:100%;min-width:680px;font-size:13.5px;}
  thead th{
    font-family:'Archivo';font-weight:700;font-size:11px;letter-spacing:.1em;
    color:var(--muted);text-align:right;
    padding:12px 12px;border-bottom:1px solid var(--card-edge);
    white-space:nowrap;
  }
  thead th:first-child, tbody td:first-child{text-align:left;padding-left:18px;}
  th.sortable{cursor:pointer;user-select:none;transition:color .15s,background .15s;}
  th.sortable:hover{color:var(--cream);background:rgba(253,90,30,.08);}
  th.sortable.sorted{color:var(--orange);}
  th .arr{font-size:9px;}
  .sort-hint{margin-left:auto;font-size:11px;color:var(--muted);letter-spacing:.05em;font-family:'Space Mono',monospace;}
  tbody td{
    padding:11px 12px;text-align:right;
    border-bottom:1px solid rgba(50,43,34,.55);
    font-variant-numeric:tabular-nums;font-family:'Archivo','Noto Sans TC';
    white-space:nowrap;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:rgba(253,90,30,.05);}
  tr.career-row td{
    background:rgba(253,90,30,.08);
    font-weight:800;color:var(--orange-soft);
    border-top:1px solid var(--orange);
  }
  td.pos{color:var(--green);} td.neg{color:var(--red);}
  .team-cell{color:var(--muted);font-size:12px;}

  /* ---------- States ---------- */
  .loading,.err{
    padding:60px 20px;text-align:center;color:var(--muted);font-size:14px;letter-spacing:.05em;
  }
  .err{color:var(--red);}
  .spinner{
    width:34px;height:34px;border-radius:50%;margin:0 auto 16px;
    border:3px solid var(--card-edge);border-top-color:var(--orange);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spinner{animation:none;}}

  .src-note{margin-top:36px;font-size:11.5px;color:var(--muted);letter-spacing:.04em;text-align:center;}
  .src-note a{color:var(--muted);}

/* ── Global Dock ── */
.global-dock-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(calc(100% - 2px));z-index:9998;transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1),opacity 0.3s;opacity:0;}
.global-dock-wrap.visible{transform:translateX(-50%) translateY(-12px);opacity:1;}
.global-dock{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,0.16);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.25);border-radius:20px 20px 0 0;padding:10px 14px 14px;box-shadow:0 -4px 30px rgba(0,0,0,0.25);}
.gd-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;position:relative;}
.gd-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 3px 12px rgba(0,0,0,0.28);}
.gd-item:hover .gd-icon{transform:translateY(-10px) scale(1.22);}
.gd-label{font-size:9px;letter-spacing:0.05em;color:rgba(255,255,255,0.8);text-transform:uppercase;opacity:0;transition:opacity 0.15s;white-space:nowrap;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;position:absolute;bottom:-20px;font-family:monospace;}
.gd-item:hover .gd-label{opacity:1;}
.gd-sep{width:1px;height:40px;background:rgba(255,255,255,0.2);margin:0 3px;align-self:center;}
.gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
.ic-photos{background:linear-gradient(145deg,#FF6B9D,#C8365A);}
.ic-dramas{background:linear-gradient(145deg,#2D1B69,#7C3AED);}
.ic-food{background:linear-gradient(145deg,#0EA5E9,#0369A1);}
.ic-travel{background:linear-gradient(145deg,#FF6B35,#D93A00);}
.ic-threads{background:linear-gradient(145deg,#3F3F46,#71717A);}
.ic-uber{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-reminder{background:linear-gradient(145deg,#34D399,#059669);}
.ic-netflix{background:linear-gradient(145deg,#E50914,#B20710);}
.ic-mlb{background:linear-gradient(145deg,#FD5A1E,#C23A0A);}
.dock-trigger-zone{position:fixed;bottom:0;left:0;right:0;height:8px;z-index:9997;}

/* ── Global Menubar ── */
.global-menubar{position:fixed;top:0;left:0;right:0;z-index:9999;height:28px;background:rgba(0,0,0,0.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;color:rgba(255,255,255,0.92);font-family:'Space Mono','Noto Sans TC',monospace;}
.gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
.gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
.mb-menu{padding:0 6px;border-radius:4px;cursor:default;font-size:12px;color:rgba(255,255,255,0.95);}
.mb-menu:hover{background:rgba(255,255,255,0.2);}
</style>
</head>
<body>

    <span style="font-size:16px">🗿</span>
    <a href="index.html" style="font-weight:700;color:rgba(255,255,255,0.92);text-decoration:none;">Sumoai's Reel</a>

  <div class="gm-right">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)"><path d="M1 9l2 2c5.07-5.07 13.27-5.05 18.36 0l2-2C16.93 2.37 7.1 2.35 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.77 7.27-2.76 10.03 0l2-2C15.14 9.14 8.87 9.13 5 13z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

  </div>
</div>

<div class="wrap">

  <!-- Hero -->
  <header class="hero" id="hero">
    <a href="mlb.html" class="back-link">‹ 球員列表</a>
    <div class="hero-inner">
      <img class="headshot" id="headshot" alt="">
      <div>
        <div class="eyebrow" id="heroTeam">載入中…</div>
        <h1 id="heroName"><span class="zh"></span> <span class="en-name"></span></h1>
        <div class="bio-line" id="bioLine">載入中…</div>
        <span class="tag-wind" id="heroTag" style="display:none"></span>
      </div>
    </div>
  </header>

  <div id="app">
    <div class="loading"><div class="spinner"></div>正在從 MLB 官方 API 載入即時數據…</div>
  </div>

  <p class="src-note">資料來源：MLB Stats API（statsapi.mlb.com）· 每次開啟頁面即時更新</p>
</div>

<script>
// 球員名冊（與首頁共用）
const PLAYERS = {
  '808982': {zh:'李政厚', en:'JUNG HOO LEE', team:'SAN FRANCISCO GIANTS', pos:'CF', num:'51', tag:'바람의 손자 · 風之孫'},
  '660271': {zh:'大谷翔平', en:'SHOHEI OHTANI', team:'LOS ANGELES DODGERS', pos:'DH/P', num:'17', tag:'二刀流 · 二刀流'},
  '592450': {zh:'亞倫·賈吉', en:'AARON JUDGE', team:'NEW YORK YANKEES', pos:'RF', num:'99', tag:'All Rise · 法官大人'},
  '656941': {zh:'凱爾·施瓦伯', en:'KYLE SCHWARBER', team:'PHILADELPHIA PHILLIES', pos:'DH/LF', num:'12', tag:'Schwarbomb · 砲管'},
  '545361': {zh:'麥克·楚奧特', en:'MIKE TROUT', team:'LOS ANGELES ANGELS', pos:'RF', num:'27', tag:'The Millville Meteor · 千億男'},
  '665742': {zh:'胡安·索托', en:'JUAN SOTO', team:'NEW YORK METS', pos:'RF', num:'22', tag:'Soto Shuffle · 索托晃步'},
  '808959': {zh:'村上宗隆', en:'MUNETAKA MURAKAMI', team:'CHICAGO WHITE SOX', pos:'1B/3B', num:'5', tag:'村神様 · 村上大神'},
  '547180': {zh:'布萊斯·哈波', en:'BRYCE HARPER', team:'PHILADELPHIA PHILLIES', pos:'1B', num:'3', tag:'Bryce Harper · 棒球神童'},
  '663728': {zh:'凱爾·雷利', en:'CAL RALEIGH', team:'SEATTLE MARINERS', pos:'C', num:'29', tag:'Big Dumper · 大砲捕手'},
  '700250': {zh:'班·萊斯', en:'BEN RICE', team:'NEW YORK YANKEES', pos:'DH/1B/C', num:'22', tag:'Benny Barrels · 飯桶'}
};

const params = new URLSearchParams(location.search);
const PLAYER_ID = params.get('id') || '808982';
const PROFILE = PLAYERS[PLAYER_ID] || null;
const API = 'https://statsapi.mlb.com/api/v1';
const app = document.getElementById('app');

const fmt3 = v => {
  if (v === undefined || v === null || v === '' || v === '.---') return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return v;
  return n < 1 ? n.toFixed(3).replace(/^0/, '') : n.toFixed(3);
};
const n0 = v => (v === undefined || v === null) ? '—' : v;

async function getJSON(url){
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

async function init(){
  // ---- 套用球員基本資料到 Hero ----
  const hero = document.getElementById('hero');
  document.getElementById('headshot').src =
    `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:silo:current.png,q_auto:best,f_auto/v1/people/${PLAYER_ID}/headshot/67/current`;
  if (PROFILE){
    document.getElementById('headshot').alt = PROFILE.en;
    document.getElementById('heroTeam').textContent = `${PROFILE.team} · ${PROFILE.pos} · #${PROFILE.num}`;
    document.querySelector('#heroName .zh').textContent = PROFILE.zh;
    document.querySelector('#heroName .en-name').textContent = PROFILE.en;
    const tag = document.getElementById('heroTag');
    tag.textContent = PROFILE.tag; tag.style.display = 'inline-block';
    hero.style.setProperty('--jersey', `"${PROFILE.num}"`);
    document.title = `${PROFILE.zh} ${PROFILE.en} | MLB 數據追蹤`;
  }

  try{
    const year = new Date().getFullYear();

    const [people, yby, logRes] = await Promise.all([
      getJSON(`${API}/people/${PLAYER_ID}`),
      getJSON(`${API}/people/${PLAYER_ID}/stats?stats=yearByYear,career&group=hitting`),
      getJSON(`${API}/people/${PLAYER_ID}/stats?stats=gameLog&group=hitting&season=${year}`)
        .catch(() => null)
    ]);

    // ---- Bio ----
    const p = people.people && people.people[0];
    if (p){
      // 用 API 即時資料校正球隊/背號/守位（比寫死的更準）
      const teamName = (p.currentTeam && p.currentTeam.name) ? p.currentTeam.name.toUpperCase() : (PROFILE ? PROFILE.team : '');
      const num = p.primaryNumber || (PROFILE ? PROFILE.num : '');
      const pos = (p.primaryPosition && p.primaryPosition.abbreviation) ? p.primaryPosition.abbreviation : (PROFILE ? PROFILE.pos : '');
      document.getElementById('heroTeam').textContent = `${teamName} · ${pos} · #${num}`;
      if (num) document.getElementById('hero').style.setProperty('--jersey', `"${num}"`);
      if (p.nameFirstLast) document.querySelector('#heroName .en-name').textContent = p.nameFirstLast.toUpperCase();

      document.getElementById('bioLine').innerHTML =
        `生日 <b>${p.birthDate || '—'}</b>（${p.currentAge ?? '—'} 歲）` +
        `<span>身高 <b>${p.height || '—'}</b></span>` +
        `<span>體重 <b>${p.weight ? p.weight + ' lb' : '—'}</b></span>` +
        `<span>打擊 <b>${p.batSide ? p.batSide.code === 'L' ? '左打' : p.batSide.code === 'R' ? '右打' : p.batSide.code : '—'}</b></span>` +
        `<span>傳球 <b>${p.pitchHand ? p.pitchHand.code === 'R' ? '右投' : '左投' : '—'}</b></span>`;
    }

    // ---- Year by year & career ----
    let ybySplits = [], careerStat = null;
    (yby.stats || []).forEach(s => {
      const type = s.type && s.type.displayName;
      if (type === 'yearByYear') ybySplits = s.splits || [];
      if (type === 'career' && s.splits && s.splits[0]) careerStat = s.splits[0].stat;
    });

    // 本季：取 yearByYear 最後一年；若 API 還沒有本年資料則顯示最近一季
    const latest = ybySplits.length ? ybySplits[ybySplits.length - 1] : null;

    // ---- Game log（最近 10 場，新到舊）----
    let allGames = [];
    if (logRes && logRes.stats && logRes.stats[0] && logRes.stats[0].splits){
      allGames = logRes.stats[0].splits; // 整季逐場（時間正序）
    }
    const games = allGames.slice(-10).reverse();

    render(latest, ybySplits, careerStat, games, allGames);
  }catch(e){
    console.error(e);
    app.innerHTML = `<div class="err">載入失敗（${e.message}）。<br>請確認網路連線後重新整理；MLB API 偶爾會短暫無回應。</div>`;
  }
}


// ── 上壘率 / 全壘打 SVG 折線圖 ──
function buildTrendChart(splits){
  // 累積 OBP = (H+BB+HBP)/(AB+BB+HBP+SF)；全壘打為累積
  let cOnBase = 0, cPA = 0, chr = 0;
  const pts = splits.map(g => {
    const st = g.stat || {};
    const h = st.hits|0, bb = st.baseOnBalls|0, hbp = st.hitByPitch|0;
    const ab = st.atBats|0, sf = st.sacFlies|0;
    cOnBase += h + bb + hbp;
    cPA     += ab + bb + hbp + sf;
    chr     += (st.homeRuns|0);
    return { date: g.date || '', obp: cPA > 0 ? cOnBase / cPA : 0, hr: chr };
  });

  const W = 920, H = 300;
  const padL = 50, padR = 42, padT = 16, padB = 34;
  const iw = W - padL - padR, ih = H - padT - padB;
  const n = pts.length;

  // 左軸上壘率固定 .000 ~ .500、右軸全壘打固定 0 ~ 70
  const maxOBP = 0.500;
  const maxHR  = 70;

  const x   = i => padL + (n === 1 ? iw/2 : i * iw / (n - 1));
  const yA  = v => padT + ih - v / maxOBP * ih;
  const yHR = v => padT + ih - v / maxHR  * ih;
  const fmtRate = v => v.toFixed(3).replace(/^0/, '');

  // 格線 + 左右軸標籤（各 5 格）
  let grid = '', axisL = '', axisR = '';
  for (let i = 0; i <= 5; i++){
    const gy = padT + ih - i * ih / 5;
    grid  += `<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="rgba(239,229,214,0.08)" stroke-width="1"/>`;
    axisL += `<text x="${padL-8}" y="${gy+4}" text-anchor="end" font-size="11" fill="#FD5A1E" opacity="0.85">${fmtRate(maxOBP*i/5)}</text>`;
    axisR += `<text x="${W-padR+8}" y="${gy+4}" text-anchor="start" font-size="11" fill="#6FBF73" opacity="0.85">${Math.round(maxHR*i/5)}</text>`;
  }

  // X 軸日期標籤（約 6 個）
  let xLabels = '';
  const step = Math.max(1, Math.round((n - 1) / 5));
  for (let i = 0; i < n; i += step){
    xLabels += `<text x="${x(i)}" y="${H-10}" text-anchor="middle" font-size="11" fill="#9A8F80">${pts[i].date.slice(5).replace('-','/')}</text>`;
  }
  if ((n - 1) % step !== 0){
    xLabels += `<text x="${x(n-1)}" y="${H-10}" text-anchor="middle" font-size="11" fill="#9A8F80">${pts[n-1].date.slice(5).replace('-','/')}</text>`;
  }

  const lineA  = pts.map((p,i) => `${x(i)},${yA(p.obp)}`).join(' ');
  const lineHR = pts.map((p,i) => `${x(i)},${yHR(p.hr)}`).join(' ');

  // 全壘打出現的場次標記點
  let hrDots = '';
  splits.forEach((g,i) => {
    if (((g.stat||{}).homeRuns|0) > 0){
      hrDots += `<circle cx="${x(i)}" cy="${yHR(pts[i].hr)}" r="3.5" fill="#6FBF73" stroke="#16130F" stroke-width="1.5"/>`;
    }
  });

  const last = pts[n-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="Archivo,sans-serif">
    ${grid}${axisL}${axisR}${xLabels}
    <polyline points="${lineA}" fill="none" stroke="#FD5A1E" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    <polyline points="${lineHR}" fill="none" stroke="#6FBF73" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${hrDots}
    <circle cx="${x(n-1)}" cy="${yA(last.obp)}" r="4" fill="#FD5A1E"/>
    <text x="${x(n-1)-8}" y="${yA(last.obp)-10}" text-anchor="end" font-size="13" font-weight="800" fill="#FD5A1E">${fmtRate(last.obp)}</text>
    <circle cx="${x(n-1)}" cy="${yHR(last.hr)}" r="4" fill="#6FBF73"/>
    <text x="${x(n-1)-8}" y="${yHR(last.hr)+18}" text-anchor="end" font-size="13" font-weight="800" fill="#6FBF73">${last.hr}HR</text>
  </svg>`;
}

function render(latest, yby, career, games, allGames){
  let html = '';

  // ===== 本季數據 =====
  if (latest){
    const s = latest.stat;
    html += `
    <section class="sec">
      <div class="sec-head">
        <h2>本季數據</h2><span class="en">SEASON STATS</span>
        <span class="season-pill num">${latest.season}</span>
      </div>
      <div class="stat-grid">
        <div class="stat-card hot"><div class="v">${fmt3(s.avg)}</div><div class="k">打擊率 AVG</div></div>
        <div class="stat-card"><div class="v">${n0(s.homeRuns)}</div><div class="k">全壘打 HR</div></div>
        <div class="stat-card"><div class="v">${n0(s.rbi)}</div><div class="k">打點 RBI</div></div>
        <div class="stat-card"><div class="v">${n0(s.hits)}</div><div class="k">安打 H</div></div>
        <div class="stat-card"><div class="v">${n0(s.runs)}</div><div class="k">得分 R</div></div>
        <div class="stat-card"><div class="v">${n0(s.stolenBases)}</div><div class="k">盜壘 SB</div></div>
        <div class="stat-card"><div class="v">${fmt3(s.obp)}</div><div class="k">上壘率 OBP</div></div>
        <div class="stat-card hot"><div class="v">${fmt3(s.ops)}</div><div class="k">攻擊指數 OPS</div></div>
      </div>
    </section>`;
  }

  // ===== 安打 / 全壘打走勢圖 =====
  if (allGames && allGames.length > 1){
    html += `
    <section class="sec">
      <div class="sec-head">
        <h2>上壘率・全壘打走勢</h2><span class="en">OBP / HR TREND</span>
        <span class="chart-legend">
          <span class="lg"><i style="background:var(--orange)"></i>賽季上壘率</span>
          <span class="lg"><i style="background:var(--green)"></i>累積全壘打</span>
        </span>
      </div>
      <div class="chart-card">${buildTrendChart(allGames)}</div>
    </section>`;
  }

  // ===== 最近比賽 =====
  if (games.length){
    html += `
    <section class="sec">
      <div class="sec-head"><h2>最近比賽</h2><span class="en">LAST ${games.length} GAMES</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>日期</th><th>對手</th><th>AB</th><th>H</th><th>2B</th><th>HR</th>
          <th>RBI</th><th>R</th><th>BB</th><th>SO</th><th>SB</th><th>AVG</th>
        </tr></thead><tbody>
        ${games.map(g => {
          const st = g.stat || {};
          const opp = g.opponent ? g.opponent.abbreviation || g.opponent.name : '—';
          const vs = g.isHome ? 'vs' : '@';
          const hitCls = (st.hits|0) >= 2 ? ' class="pos"' : '';
          return `<tr>
            <td>${(g.date || '').slice(5)}</td>
            <td class="team-cell" style="text-align:right">${vs} ${opp}</td>
            <td>${n0(st.atBats)}</td><td${hitCls}>${n0(st.hits)}</td>
            <td>${n0(st.doubles)}</td><td>${n0(st.homeRuns)}</td>
            <td>${n0(st.rbi)}</td><td>${n0(st.runs)}</td>
            <td>${n0(st.baseOnBalls)}</td><td>${n0(st.strikeOuts)}</td>
            <td>${n0(st.stolenBases)}</td><td>${fmt3(st.avg)}</td>
          </tr>`;
        }).join('')}
        </tbody></table></div>
    </section>`;
  }

  // ===== 逐年成績（可排序）=====
  if (yby.length){
    YBY_DATA = yby;      // 存到全域供排序使用
    YBY_CAREER = career;
    html += `
    <section class="sec">
      <div class="sec-head"><h2>逐年成績</h2><span class="en">YEAR BY YEAR · MLB</span>
        <span class="sort-hint">點欄位排序 ⇅</span></div>
      <div class="tbl-wrap"><table id="ybyTable">
        <thead><tr id="ybyHead"></tr></thead>
        <tbody id="ybyBody"></tbody>
      </table></div>
    </section>`;
  }

  if (!html){
    html = '<div class="err">目前查無數據，請稍後再試。</div>';
  }
  app.innerHTML = html;

  if (YBY_DATA.length) renderYbyTable();
}

// ── 逐年成績排序表 ──
let YBY_DATA = [], YBY_CAREER = null;
let ybySortKey = 'season', ybySortDir = -1; // 預設年度新到舊

const YBY_COLS = [
  {k:'season',      label:'年度', type:'season'},
  {k:'team',        label:'球隊', type:'team'},
  {k:'gamesPlayed', label:'G'},
  {k:'atBats',      label:'AB'},
  {k:'hits',        label:'H'},
  {k:'doubles',     label:'2B'},
  {k:'triples',     label:'3B'},
  {k:'homeRuns',    label:'HR'},
  {k:'rbi',         label:'RBI'},
  {k:'runs',        label:'R'},
  {k:'stolenBases', label:'SB'},
  {k:'baseOnBalls', label:'BB'},
  {k:'strikeOuts',  label:'SO'},
  {k:'avg', label:'AVG', fmt:true},
  {k:'obp', label:'OBP', fmt:true},
  {k:'slg', label:'SLG', fmt:true},
  {k:'ops', label:'OPS', fmt:true}
];

function ybyVal(row, col){
  if (col.type === 'season') return parseInt(row.season) || 0;
  if (col.type === 'team') return (row.team ? (row.team.abbreviation || row.team.name || '') : '');
  return parseFloat((row.stat || {})[col.k]) || 0;
}

function renderYbyTable(){
  const head = document.getElementById('ybyHead');
  const body = document.getElementById('ybyBody');
  if (!head || !body) return;

  head.innerHTML = YBY_COLS.map(c => {
    const active = c.k === ybySortKey;
    const arrow = active ? (ybySortDir === 1 ? ' ▲' : ' ▼') : '';
    return `<th class="sortable${active ? ' sorted' : ''}" data-key="${c.k}">${c.label}<span class="arr">${arrow}</span></th>`;
  }).join('');

  const rows = YBY_DATA.slice().sort((a, b) => {
    const col = YBY_COLS.find(c => c.k === ybySortKey);
    const va = ybyVal(a, col), vb = ybyVal(b, col);
    if (typeof va === 'string') return ybySortDir * va.localeCompare(vb);
    return ybySortDir * (va - vb);
  });

  body.innerHTML = rows.map(y => {
    const s = y.stat || {};
    return `<tr>
      <td class="num" style="font-weight:700">${y.season}</td>
      <td class="team-cell" style="text-align:right">${y.team ? y.team.abbreviation || y.team.name : '—'}</td>
      <td>${n0(s.gamesPlayed)}</td><td>${n0(s.atBats)}</td><td>${n0(s.hits)}</td>
      <td>${n0(s.doubles)}</td><td>${n0(s.triples)}</td><td>${n0(s.homeRuns)}</td>
      <td>${n0(s.rbi)}</td><td>${n0(s.runs)}</td><td>${n0(s.stolenBases)}</td>
      <td>${n0(s.baseOnBalls)}</td><td>${n0(s.strikeOuts)}</td>
      <td>${fmt3(s.avg)}</td><td>${fmt3(s.obp)}</td><td>${fmt3(s.slg)}</td><td>${fmt3(s.ops)}</td>
    </tr>`;
  }).join('') + (YBY_CAREER ? `<tr class="career-row">
      <td>生涯</td><td></td>
      <td>${n0(YBY_CAREER.gamesPlayed)}</td><td>${n0(YBY_CAREER.atBats)}</td><td>${n0(YBY_CAREER.hits)}</td>
      <td>${n0(YBY_CAREER.doubles)}</td><td>${n0(YBY_CAREER.triples)}</td><td>${n0(YBY_CAREER.homeRuns)}</td>
      <td>${n0(YBY_CAREER.rbi)}</td><td>${n0(YBY_CAREER.runs)}</td><td>${n0(YBY_CAREER.stolenBases)}</td>
      <td>${n0(YBY_CAREER.baseOnBalls)}</td><td>${n0(YBY_CAREER.strikeOuts)}</td>
      <td>${fmt3(YBY_CAREER.avg)}</td><td>${fmt3(YBY_CAREER.obp)}</td><td>${fmt3(YBY_CAREER.slg)}</td><td>${fmt3(YBY_CAREER.ops)}</td>
    </tr>` : '');

  head.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.key;
      if (k === ybySortKey){ ybySortDir *= -1; }
      else { ybySortKey = k; ybySortDir = (k === 'season' || k === 'team') ? 1 : -1; }
      renderYbyTable();
    });
  });
}

init();
</script>

  if(!dock||!trigger)return;
  var timer;
  trigger.addEventListener('mouseenter',function(){clearTimeout(timer);dock.classList.add('visible');});
  trigger.addEventListener('touchstart',function(){dock.classList.add('visible');},{passive:true});
  dock.addEventListener('mouseenter',function(){clearTimeout(timer);dock.classList.add('visible');});

})();
</script>
