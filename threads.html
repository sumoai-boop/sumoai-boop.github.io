<title>Threads — Sumoai's Reel</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  font-family:'Space Mono',monospace;
  overflow-x:hidden;
  position:relative;
  background:#F5EDD8;
}
.bg-shelf{
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
}
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  padding:16px 48px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(232,98,42,0.95);
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:300;
  color:#fff;text-decoration:none;letter-spacing:0.04em;
}
.logo em{font-style:italic;color:#FFD4A8;}
nav{display:flex;flex-wrap:wrap;gap:6px;}
nav a{
  padding:6px 14px;
  border:1px solid rgba(160,50,0,0.5);
  border-radius:99px;font-size:9px;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#fff;text-decoration:none;
  background:rgba(180,55,0,0.75);
  transition:background 0.2s;
}
nav a:hover,nav a.active{background:rgba(120,30,0,0.95);}
.page-content{
  position:relative;z-index:10;
  max-width:1100px;margin:0 auto;
  padding:110px 48px 80px;
}
.page-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(40px,7vw,72px);font-weight:300;
  color:#3D2010;line-height:1;margin-bottom:6px;
}
.page-title em{font-style:italic;color:#E8622A;}
.page-label{
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(80,40,10,0.55);margin-bottom:40px;display:block;
}
.threads-wrap{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:28px;
}
.thread-embed{width:100%;}
blockquote.text-post-media{
  background:#fff !important;
  border-color:rgba(120,70,20,0.15) !important;
  border-radius:16px !important;
  box-shadow:3px 5px 20px rgba(80,40,10,0.1) !important;
}
@media(max-width:700px){
  .topnav{padding:12px 20px;}
  .page-content{padding:90px 16px 60px;}
  nav a{padding:5px 10px;font-size:8px;}
  .threads-wrap{grid-template-columns:1fr;}
}

  /* ── 共用 Menubar ── */
  .global-menubar{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    height:28px;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    font-size:12px;color:rgba(255,255,255,0.92);
    letter-spacing:0.02em;
    font-family:'Space Mono',monospace;
  }
  .gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
  .gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
  .mb-menu{padding:0 6px;border-radius:4px;cursor:default;transition:background 0.15s;font-size:12px;}
  .mb-menu:hover{background:rgba(255,255,255,0.2);}

  /* ── 共用 Dock ── */
  .global-dock-wrap{
    position:fixed;bottom:0;left:50%;
    transform:translateX(-50%) translateY(calc(100% - 2px));
    z-index:1000;
    transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
    opacity:0;
    padding-bottom:0;
  }
  .global-dock-wrap.visible{
    transform:translateX(-50%) translateY(-12px);
    opacity:1;
  }
  .global-dock{
    display:flex;align-items:flex-end;gap:8px;
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px 20px 0 0;
    padding:10px 14px 14px;
    box-shadow:0 -4px 30px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .gd-item{
    display:flex;flex-direction:column;align-items:center;
    gap:3px;text-decoration:none;position:relative;cursor:pointer;
  }
  .gd-icon{
    width:52px;height:52px;border-radius:13px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 3px 12px rgba(0,0,0,0.28);
  }
  .gd-item:hover .gd-icon{transform:translateY(-10px) scale(1.22);}
  .gd-label{
    font-size:9px;letter-spacing:0.05em;color:rgba(255,255,255,0.8);
    text-transform:uppercase;opacity:0;transition:opacity 0.15s;
    white-space:nowrap;background:rgba(0,0,0,0.6);
    padding:2px 6px;border-radius:4px;
    position:absolute;bottom:-20px;
    font-family:'Space Mono',monospace;
  }
  .gd-item:hover .gd-label{opacity:1;}
  .gd-sep{width:1px;height:40px;background:rgba(255,255,255,0.2);margin:0 3px;align-self:center;}
  .gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
  .ic-about  {background:linear-gradient(135deg,#667eea,#764ba2);}
  .ic-photos {background:linear-gradient(135deg,#f093fb,#f5576c);}
  .ic-dramas {background:linear-gradient(135deg,#1a1a2e,#e8622a);}
  .ic-food   {background:linear-gradient(135deg,#f7971e,#ffd200);}
  .ic-travel {background:linear-gradient(135deg,#0f2027,#2c5364);}
  .ic-threads{background:linear-gradient(135deg,#111,#333);}
  /* 底部觸發區 */
  .dock-trigger-zone{
    position:fixed;bottom:0;left:0;right:0;height:8px;z-index:999;
  }

<script>
// 時鐘
(function(){
  function updateTime(){
    var el=document.getElementById('gmbTime');
    if(!el) return;
    var now=new Date();
    var d=['日','一','二','三','四','五','六'][now.getDay()];
    var h=String(now.getHours()).padStart(2,'0');
    var m=String(now.getMinutes()).padStart(2,'0');
    el.textContent='週'+d+' '+now.getMonth()+'/'+(now.getDate())+' '+h+':'+m;
  }
  updateTime();
  setInterval(updateTime,10000);
})();

// Dock 自動隱藏
(function(){
  var dock=document.getElementById('globalDock');
  var trigger=document.getElementById('dockTrigger');
  if(!dock||!trigger) return;
  var hideTimer;
  function showDock(){
    clearTimeout(hideTimer);
    dock.classList.add('visible');
  }
  function hideDock(){
    hideTimer=setTimeout(function(){dock.classList.remove('visible');},600);
  }
  trigger.addEventListener('mouseenter',showDock);
  dock.addEventListener('mouseenter',function(){clearTimeout(hideTimer);dock.classList.add('visible');});
  dock.addEventListener('mouseleave',hideDock);
})();
</script>
