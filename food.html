<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食記 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#F5EDE0;min-height:100vh;font-family:'Space Mono',monospace;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(232,98,42,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(200,130,50,0.06) 0%, transparent 50%);
    pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;}
  .bg-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .c1{width:500px;height:500px;background:radial-gradient(circle, rgba(200,150,50,0.07), transparent 70%);top:-100px;right:-80px;}
  .c2{width:350px;height:350px;background:radial-gradient(circle, rgba(150,80,20,0.06), transparent 70%);bottom:-80px;left:-60px;}

  /* ── 主內容 ── */
  .page-content{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:72px 32px 100px;}

  .page-header{margin-bottom:28px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,64px);font-weight:300;color:#2C1A0E;line-height:1;margin-bottom:4px;}
  .page-title em{font-style:italic;color:#7A4500;}
  .page-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(100,60,10,0.5);display:block;margin-bottom:20px;}

  /* ── 統計列 ── */
  .stats-row{display:flex;gap:24px;margin-bottom:28px;flex-wrap:wrap;}
  .stat-item{display:flex;flex-direction:column;gap:2px;}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#2C1A0E;line-height:1;}
  .stat-lbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(100,60,10,0.5);}
  .stat-sep{width:1px;background:rgba(180,100,30,0.2);align-self:stretch;margin:4px 0;}

  /* ── 工具列 ── */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
  .search-wrap{flex:1;min-width:180px;position:relative;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;}
  .search-input{width:100%;background:rgba(180,140,60,0.06);border:1px solid rgba(180,140,60,0.2);border-radius:99px;padding:8px 16px 8px 36px;color:#2C1A0E;font-family:'Space Mono',monospace;font-size:11px;outline:none;transition:border-color 0.2s;}
  .search-input::placeholder{color:rgba(100,60,10,0.3);}
  .search-input:focus{border-color:rgba(232,98,42,0.5);}
  .sort-select{background:rgba(180,140,60,0.06);border:1px solid rgba(180,140,60,0.2);border-radius:99px;padding:8px 14px;color:#2C1A0E;font-family:'Space Mono',monospace;font-size:10px;outline:none;cursor:pointer;}
  .sort-select option{background:#F5EDE0;}
  .count-badge{font-size:10px;color:rgba(100,60,10,0.4);letter-spacing:0.08em;white-space:nowrap;align-self:center;}

  /* ── 新增按鈕 ── */
  .add-btn{
    width:46px;height:46px;border-radius:50%;
    background:linear-gradient(135deg,#E8622A,#FFD200);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;color:#1a0800;font-weight:700;
    box-shadow:0 4px 20px rgba(232,98,42,0.45);
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s;
    flex-shrink:0;
  }
  .add-btn:hover{transform:scale(1.12);box-shadow:0 6px 28px rgba(232,98,42,0.6);}

  /* ── IG 照片牆 ── */
  .photo-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
  }
  .photo-card{
    position:relative;
    cursor:pointer;
    background:rgba(180,140,60,0.04);
    border:1px solid rgba(180,140,60,0.10);
    border-radius:10px;
    overflow:hidden;
    transition:box-shadow 0.2s, transform 0.2s;
  }
  .photo-card:hover{ box-shadow:0 6px 24px rgba(100,50,0,0.18); transform:translateY(-2px); }
  .photo-card-img{
    position:relative;
    aspect-ratio:1/1;
    overflow:hidden;
    background:rgba(180,140,60,0.06);
  }
  .photo-card-img img{
    width:100%;height:100%;
    object-fit:cover;
    transition:transform 0.4s ease;
    display:block;
  }
  .photo-card:hover .photo-card-img img{transform:scale(1.06);}
  .photo-card .overlay{
    position:absolute;inset:0;
    background:linear-gradient(to top, rgba(15,8,0,0.82) 0%, rgba(15,8,0,0.2) 55%, transparent 100%);
    opacity:0;
    transition:opacity 0.28s ease;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:12px;
    pointer-events:none;
  }
  .photo-card:hover .overlay{opacity:1;}
  .overlay-meta{display:flex;gap:8px;align-items:center;}
  .overlay-price{font-size:10px;color:#FFD200;}
  .overlay-stars{display:flex;gap:2px;}
  .overlay-stars span{font-size:11px;}
  /* 照片下方名稱條 */
  .photo-card-info{
    padding:8px 10px 9px;
    background:#F5EDE0;
  }
  .photo-card-name{
    font-size:12px;font-weight:700;color:#2C1A0E;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    margin-bottom:2px;
  }
  .photo-card-sub{
    display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  }
  .photo-card-type{
    font-size:9px;color:#C9A84C;letter-spacing:0.05em;
    background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.25);
    border-radius:99px;padding:1px 7px;white-space:nowrap;
  }
  .photo-card-score{
    font-size:10px;color:rgba(100,60,10,0.55);letter-spacing:0.03em;
  }

  /* 無照片佔位 */
  .photo-card.no-photo .photo-card-img{
    display:flex;align-items:center;justify-content:center;
  }
  .no-photo-icon{font-size:32px;opacity:0.18;}

  /* 空狀態 */
  .empty-state{
    grid-column:1/-1;
    padding:80px 0;
    display:flex;flex-direction:column;align-items:center;gap:12px;
  }
  .empty-icon{font-size:48px;opacity:0.2;}
  .empty-text{font-size:12px;color:rgba(100,60,10,0.3);letter-spacing:0.12em;text-transform:uppercase;}

  /* ── 詳情 Modal ── */
  .modal-mask{
    position:fixed;inset:0;z-index:9000;
    background:rgba(0,0,0,0.85);
    display:none;align-items:center;justify-content:center;
    padding:24px;
    backdrop-filter:blur(6px);
  }
  .modal-mask.open{display:flex;}
  .modal{
    background:#F5EDE0;
    border:1px solid rgba(232,98,42,0.3);
    border-radius:16px;
    max-width:520px;width:100%;
    overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(180,140,60,0.1);
    animation:modalIn 0.28s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:rgba(180,140,60,0.04);}
  .modal-img-placeholder{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:rgba(180,140,60,0.04);font-size:56px;opacity:0.15;}
  .modal-body{padding:20px 24px 24px;}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#2C1A0E;margin-bottom:4px;}
  .modal-addr{font-size:10px;color:rgba(100,60,10,0.5);letter-spacing:0.06em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .modal-addr svg{opacity:0.4;flex-shrink:0;}
  .modal-row{display:flex;gap:16px;margin-bottom:6px;align-items:center;}
  .modal-price{font-family:'Cormorant Garamond',serif;font-size:22px;color:#FFD200;font-weight:600;}
  .modal-price-lbl{font-size:9px;color:rgba(100,60,10,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-left:4px;align-self:flex-end;margin-bottom:3px;}
  .modal-stars{display:flex;gap:3px;margin-left:auto;}
  .modal-stars span{font-size:18px;}
  .modal-score-num{font-family:'Cormorant Garamond',serif;font-size:18px;color:rgba(200,170,100,0.7);margin-left:6px;align-self:center;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-btn{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.06em;transition:background 0.2s;}
  .modal-btn-edit{background:rgba(180,140,60,0.12);color:#C9A84C;border:1px solid rgba(180,140,60,0.25);}
  .modal-btn-edit:hover{background:rgba(180,140,60,0.22);}
  .modal-btn-del{background:rgba(200,50,30,0.1);color:#E87060;border:1px solid rgba(200,50,30,0.2);}
  .modal-btn-del:hover{background:rgba(200,50,30,0.2);}
  .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:1;}

  /* ── 新增/編輯 Modal ── */
  .form-modal{
    background:#F5EDE0;
    border:1px solid rgba(232,98,42,0.35);
    border-radius:16px;
    max-width:460px;width:100%;
    overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.7);
    animation:modalIn 0.28s cubic-bezier(0.34,1.2,0.64,1);
  }
  .form-header{
    padding:18px 24px;
    border-bottom:1px solid rgba(180,140,60,0.1);
    display:flex;align-items:center;justify-content:space-between;
  }
  .form-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:#2C1A0E;font-weight:600;}
  .form-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto;}

  /* 圖片上傳 */
  .img-upload-area{
    width:100%;aspect-ratio:4/3;border:2px dashed rgba(180,140,60,0.25);border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;position:relative;overflow:hidden;background:rgba(180,140,60,0.03);
    transition:border-color 0.2s;
  }
  .img-upload-area:hover{border-color:rgba(232,98,42,0.45);}
  .img-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .img-upload-label{font-size:11px;color:rgba(100,60,10,0.4);letter-spacing:0.08em;text-transform:uppercase;position:relative;z-index:1;}
  .img-upload-icon{font-size:28px;opacity:0.3;position:relative;z-index:1;}
  .img-upload-input{display:none;}
  .img-clear{position:absolute;top:8px;right:8px;z-index:2;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:26px;height:26px;color:#fff;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;}

  .field-group{display:flex;flex-direction:column;gap:5px;}
  .field-label{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(80,45,5,0.7);}
  .field-input{background:rgba(180,140,60,0.07);border:1px solid rgba(180,140,60,0.22);border-radius:8px;padding:10px 12px;color:#1a0e04;font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s;width:100%;}
  .field-input:focus{border-color:rgba(232,98,42,0.55);background:rgba(180,140,60,0.10);}
  .field-input::placeholder{color:rgba(120,75,20,0.38);}

  /* 星等選擇 */
  .stars-pick{display:flex;gap:6px;}
  .star-btn{font-size:22px;background:none;border:none;cursor:pointer;opacity:0.25;transition:opacity 0.15s,transform 0.15s;}
  .star-btn.active{opacity:1;}
  .star-btn:hover{transform:scale(1.2);}

  .form-footer{padding:0 24px 20px;display:flex;gap:10px;}
  .btn-cancel{flex:1;padding:11px;border-radius:8px;background:rgba(180,140,60,0.08);border:1px solid rgba(180,140,60,0.2);color:#C9A84C;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;}
  .btn-save{flex:2;padding:11px;border-radius:8px;background:linear-gradient(135deg,#E8622A,#c84a15);border:none;color:#fff;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:0.06em;transition:opacity 0.2s;}
  .btn-save:hover{opacity:0.88;}

/* ── Dock ── */
  .dock-wrap{
    position:fixed;bottom:20px;left:50%;
    transform:translateX(-50%);
    z-index:200;
    transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
  }
  .dock-wrap.hidden{
    transform:translateX(-50%) translateY(calc(100% + 20px));
    opacity:0;
  }
  /* 觸發區：底部感應條 */
  .dock-trigger{
    position:fixed;bottom:0;left:0;right:0;height:6px;z-index:199;
  }
  .dock{
    display:flex;align-items:flex-end;gap:10px;
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:22px;
    padding:10px 16px;
    box-shadow:0 8px 40px rgba(0,0,0,0.4),inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .dock-item{
    display:flex;flex-direction:column;align-items:center;
    gap:4px;text-decoration:none;
    position:relative;cursor:pointer;
  }
  .dock-icon{
    width:60px;height:60px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:30px;
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 4px 16px rgba(0,0,0,0.3);
  }
  .dock-item:hover .dock-icon{transform:translateY(-14px) scale(1.28);}
  .dock-label{
    font-size:9px;letter-spacing:0.06em;
    color:rgba(255,255,255,0.85);
    text-transform:uppercase;
    opacity:0;transition:opacity 0.15s;
    white-space:nowrap;
    background:rgba(0,0,0,0.6);
    padding:2px 7px;border-radius:4px;
    position:absolute;bottom:-22px;
  }
  .dock-item:hover .dock-label{opacity:1;}
  .dock-sep{
    width:1px;height:48px;
    background:rgba(255,255,255,0.22);
    margin:0 4px;align-self:center;
  }

    .ic-about  {background:linear-gradient(145deg,#4F8EF7,#1A5FD4);}
  .ic-photos {background:linear-gradient(145deg,#FF6B9D,#C8365A);}
  .ic-dramas {background:linear-gradient(145deg,#2D1B69,#7C3AED);}
  .ic-food   {background:linear-gradient(145deg,#0EA5E9,#0369A1);}
  .ic-travel {background:linear-gradient(145deg,#FF6B35,#D93A00);}
  .ic-threads{background:linear-gradient(145deg,#18181B,#3F3F46);border:1px solid rgba(255,255,255,0.15);}
  .ic-uber   {background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
  .ic-reminder{background:linear-gradient(145deg,#059669,#065F46);}

  @media(max-width:600px){
    .dock-icon{width:46px;height:46px;font-size:22px;border-radius:12px;}
    .dock{gap:7px;padding:8px 12px;}
  }

  /* ── Global Menubar ── */
  .global-menubar{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    height:28px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    font-size:12px;color:rgba(255,255,255,0.92);
    letter-spacing:0.02em;
    font-family:'Space Mono',monospace;
  }
  .gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
  .gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
  .mb-menu{padding:0 6px;border-radius:4px;cursor:default;transition:background 0.15s;font-size:12px;}
  .mb-menu:hover{background:rgba(255,255,255,0.2);}
</style>
</head>
<body>
<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<!-- Global Menubar -->
<div class="global-menubar">
  <div class="gm-left">
    <span style="font-size:16px">🗿</span>
    <a href="index.html" style="font-weight:700;color:rgba(255,255,255,0.92);text-decoration:none;cursor:pointer;position:relative;z-index:9999;">Sumoai's Reel</a>
    <span class="mb-menu">檔案</span>
    <span class="mb-menu">編輯</span>
    <span class="mb-menu">顯示方式</span>
    <span class="mb-menu">前往</span>
    <span class="mb-menu">視窗</span>
    <span class="mb-menu">輔助說明</span>
  </div>
  <div class="gm-right">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle"><path d="M1 9l2 2c5.07-5.07 13.27-5.05 18.36 0l2-2C16.93 2.37 7.1 2.35 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.77 7.27-2.76 10.03 0l2-2C15.14 9.14 8.87 9.13 5 13z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <img src="https://flagcdn.com/16x12/tw.png" width="16" height="12" style="vertical-align:middle;border-radius:1px" alt="TW">
    <span id="gmbTime" style="letter-spacing:0.03em"></span>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="rgba(255,255,255,0.85)" style="vertical-align:middle;cursor:default"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </div>
</div>


<!-- Main -->
<main class="page-content">
  <div class="page-header">
    <h1 class="page-title"><em>Food</em> Diary</h1>
    <span class="page-label">每一口都值得記憶</span>
    <div class="stats-row" id="statsRow">
      <div class="stat-item">
        <div class="stat-num" id="sTotal">0</div>
        <div class="stat-lbl">家餐廳</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sAvg">—</div>
        <div class="stat-lbl">平均評分</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sBest">—</div>
        <div class="stat-lbl">最高評分</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sAvgPrice">—</div>
        <div class="stat-lbl">平均消費</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" placeholder="搜尋餐廳名稱或地址…" type="text">
    </div>

<script>
/* ───── GitHub 同步設定 ───── */
const GH_OWNER='sumoai-boop', GH_REPO='sumoai-boop.github.io', GH_BRANCH='main', GH_TOKEN_KEY='gh_token_food';
const GH_DATA_PATH='food-data.json';
const STORE = 'sumoai_food_v2';

function showToast(msg,isErr){
  var t=document.getElementById('ghToast');
  if(!t){t=document.createElement('div');t.id='ghToast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:99px;font-size:13px;z-index:9999;font-family:monospace;pointer-events:none;transition:opacity 0.5s;';document.body.appendChild(t);}
  t.textContent=msg;t.style.background=isErr?'rgba(180,30,30,0.95)':'rgba(30,80,50,0.95)';t.style.color='#fff';t.style.opacity='1';
  clearTimeout(t._to);if(!isErr)t._to=setTimeout(()=>t.style.opacity='0',3000);
}
function getToken(){
  var tk=localStorage.getItem(GH_TOKEN_KEY);
  if(!tk){tk=prompt('請輸入 GitHub Personal Access Token（需有 repo 寫入權限）：');if(!tk)return null;localStorage.setItem(GH_TOKEN_KEY,tk.trim());}
  return tk.trim();
}
window.clearGHToken=function(){localStorage.removeItem(GH_TOKEN_KEY);alert('Token 已清除');};

function loadFromGitHub(){
  var token=localStorage.getItem(GH_TOKEN_KEY);
  if(!token){
    token=prompt('請輸入 GitHub Personal Access Token\n（需有 repo 寫入權限，僅儲存在本機）');
    if(!token){DATA=load();render();return;}
    localStorage.setItem(GH_TOKEN_KEY,token.trim());token=token.trim();
  }
  showToast('⏳ 載入食記資料...',false);
  var api='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_DATA_PATH;
  fetch(api+'?ref='+GH_BRANCH+'&t='+Date.now(),{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
    .then(r=>{
      if(!r.ok){
        if(r.status===401){localStorage.removeItem(GH_TOKEN_KEY);showToast('❌ Token 無效',true);}
        else if(r.status===404){showToast('（尚無雲端資料，使用本機）',false);}
        else showToast('❌ 載入失敗('+r.status+')',true);
        DATA=load();render();return null;
      }
      return r.json();
    })
    .then(fi=>{
      if(!fi||!fi.content) return;
      var raw=atob(fi.content.split('\n').join(''));
      var arr=JSON.parse(decodeURIComponent(escape(raw)));
      if(Array.isArray(arr)){
        DATA=arr;localStorage.setItem(STORE,JSON.stringify(DATA));
        if(fi.sha) localStorage.setItem('gh_food_sha',fi.sha);
        showToast('✦ 食記已同步',false);render();
      }
    }).catch(e=>{console.warn('載入失敗:',e);DATA=load();render();});
}

function load(){ try{ return JSON.parse(localStorage.getItem(STORE)||'[]'); }catch(e){return [];} }
function save(d){
  localStorage.setItem(STORE,JSON.stringify(d));
  pushToGitHub(d);
}

var _pushing=false;
async function pushToGitHub(data){
  if(_pushing){showToast('⏳ 推送中，請稍候...',false);return;}
  _pushing=true;
  try{
    var token=getToken();if(!token)return;
    var api='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_DATA_PATH;
    var hdrs={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
    showToast('⏳ 儲存至雲端...',false);
    var sha=localStorage.getItem('gh_food_sha');
    if(!sha){var r=await fetch(api+'?ref='+GH_BRANCH,{headers:hdrs});if(r.ok){var fi=await r.json();sha=fi.sha;if(sha)localStorage.setItem('gh_food_sha',sha);}}
    var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    var body={message:'更新食記',content:encoded,branch:GH_BRANCH};if(sha)body.sha=sha;
    var pr=await fetch(api,{method:'PUT',headers:hdrs,body:JSON.stringify(body)});
    if(!pr.ok){var e2=await pr.json();localStorage.removeItem('gh_food_sha');showToast('❌ 推送失敗：'+(e2.message||pr.status),true);}
    else{var prData=await pr.json();var ns=prData.content&&prData.content.sha;if(ns)localStorage.setItem('gh_food_sha',ns);else localStorage.removeItem('gh_food_sha');showToast('✦ 已儲存至 GitHub',false);}
  }finally{_pushing=false;}
}

/* ───── 圖片壓縮 ───── */
function compressImage(dataUrl,maxW,maxH,quality){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.src=dataUrl;
  });
}

let DATA=[], currentId=null, editMode=false, starVal=0, q='', sortKey='date-desc';
window.addEventListener('DOMContentLoaded', loadFromGitHub);

/* ───── 星等（點擊設整數，輸入框設小數） ───── */
function buildStarPick(){
  const sp = document.getElementById('starsPick');
  sp.innerHTML='';
  for(let i=1;i<=5;i++){
    const btn=document.createElement('button');
    btn.type='button';
    btn.dataset.v=i;
    btn.style.cssText='font-size:24px;background:none;border:none;cursor:pointer;opacity:0.2;transition:opacity 0.15s,transform 0.15s;padding:0;';
    btn.textContent='⭐';
    btn.addEventListener('mouseenter',()=>highlightStars(i));
    btn.addEventListener('mouseleave',()=>highlightStars(starVal));
    btn.addEventListener('click',()=>{
      starVal=i;
      document.getElementById('fScoreInput').value=i+'.0';
      highlightStars(i);
    });
    sp.appendChild(btn);
  }
}
function highlightStars(v){
  document.querySelectorAll('#starsPick button').forEach(b=>{
    b.style.opacity = parseInt(b.dataset.v)<=v ? '1' : '0.2';
    b.style.transform = parseInt(b.dataset.v)<=Math.ceil(v) ? 'scale(1.08)' : 'scale(1)';
  });
}
// 輸入框同步星等
document.addEventListener('DOMContentLoaded',()=>{
  buildStarPick();
  document.getElementById('fScoreInput').addEventListener('input', e=>{
    let v=parseFloat(e.target.value)||0;
    v=Math.min(5,Math.max(0,v));
    starVal=v;
    highlightStars(v);
  });
});

/* ───── 多張照片 + 裁切器 ───── */
let photosArr = [];        // [{dataUrl}] 已確認的照片
let pendingFiles = [];     // 待裁切的 File 陣列
let pendingIdx = 0;        // 目前裁切到第幾張

const imgInput     = document.getElementById('imgInput');
const cropContainer= document.getElementById('cropContainer');
const cropViewport = document.getElementById('cropViewport');
const cropImg      = document.getElementById('cropImg');
const cropZoom     = document.getElementById('cropZoom');
const cropLabel    = document.getElementById('cropLabel');
const cropConfirm  = document.getElementById('cropConfirm');
const cropSkip     = document.getElementById('cropSkip');

let cropState = {scale:1,x:0,y:0,dragging:false,lastX:0,lastY:0,naturalW:0,naturalH:0,vpW:0,vpH:0};

function clampCrop(){
  const s=cropState,iw=s.naturalW*s.scale,ih=s.naturalH*s.scale;
  s.x=Math.min(0,Math.max(s.vpW-iw,s.x));
  s.y=Math.min(0,Math.max(s.vpH-ih,s.y));
}
function applyCrop(){ cropImg.style.transform=`translate(${cropState.x}px,${cropState.y}px) scale(${cropState.scale})`; }

function loadCropFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    cropImg.onload=()=>{
      const s=cropState;
      s.naturalW=cropImg.naturalWidth; s.naturalH=cropImg.naturalHeight;
      s.vpW=cropViewport.offsetWidth;  s.vpH=cropViewport.offsetHeight;
      const scaleW=s.vpW/s.naturalW, scaleH=s.vpH/s.naturalH;
      s.scale=Math.max(scaleW,scaleH);
      cropZoom.min=Math.round(s.scale*100);
      cropZoom.max=Math.round(s.scale*100*3);
      cropZoom.value=Math.round(s.scale*100);
      s.x=(s.vpW-s.naturalW*s.scale)/2;
      s.y=(s.vpH-s.naturalH*s.scale)/2;
      clampCrop(); applyCrop();
      cropLabel.textContent=`裁切照片 ${pendingIdx+1} / ${pendingFiles.length}`;
      cropContainer.style.display='flex';
    };
    cropImg.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function getCroppedDataUrl(maxW,maxH,quality){
  const s=cropState;
  const canvas=document.createElement('canvas');
  canvas.width=s.vpW; canvas.height=s.vpH;
  canvas.getContext('2d').drawImage(cropImg,s.x,s.y,s.naturalW*s.scale,s.naturalH*s.scale);
  const ratio=Math.min(1,maxW/s.vpW,maxH/s.vpH);
  const out=document.createElement('canvas');
  out.width=Math.round(s.vpW*ratio); out.height=Math.round(s.vpH*ratio);
  out.getContext('2d').drawImage(canvas,0,0,out.width,out.height);
  return out.toDataURL('image/jpeg',quality);
}

function nextPending(){
  pendingIdx++;
  if(pendingIdx<pendingFiles.length){
    loadCropFile(pendingFiles[pendingIdx]);
  } else {
    cropContainer.style.display='none';
    pendingFiles=[]; pendingIdx=0;
    renderThumbs();
  }
}

cropConfirm.addEventListener('click',()=>{
  photosArr.push({dataUrl: getCroppedDataUrl(900,675,0.8)});
  nextPending();
});
cropSkip.addEventListener('click',()=>{ nextPending(); });

imgInput.addEventListener('change',e=>{

});

function renderThumbs(){

// crop drag mouse
cropViewport.addEventListener('mousedown',e=>{cropState.dragging=true;cropState.lastX=e.clientX;cropState.lastY=e.clientY;cropViewport.style.cursor='grabbing';e.preventDefault();});
window.addEventListener('mousemove',e=>{if(!cropState.dragging)return;cropState.x+=e.clientX-cropState.lastX;cropState.y+=e.clientY-cropState.lastY;cropState.lastX=e.clientX;cropState.lastY=e.clientY;clampCrop();applyCrop();});
window.addEventListener('mouseup',()=>{cropState.dragging=false;cropViewport.style.cursor='grab';});
// touch
cropViewport.addEventListener('touchstart',e=>{if(e.touches.length===1){cropState.dragging=true;cropState.lastX=e.touches[0].clientX;cropState.lastY=e.touches[0].clientY;}},{passive:true});
cropViewport.addEventListener('touchmove',e=>{if(!cropState.dragging||e.touches.length!==1)return;cropState.x+=e.touches[0].clientX-cropState.lastX;cropState.y+=e.touches[0].clientY-cropState.lastY;cropState.lastX=e.touches[0].clientX;cropState.lastY=e.touches[0].clientY;clampCrop();applyCrop();e.preventDefault();},{passive:false});
cropViewport.addEventListener('touchend',()=>{cropState.dragging=false;});
// wheel
cropViewport.addEventListener('wheel',e=>{
  e.preventDefault();
  const s=cropState,delta=e.deltaY>0?-0.05:0.05;
  const minS=parseInt(cropZoom.min)/100,maxS=parseInt(cropZoom.max)/100;
  const ns=Math.min(maxS,Math.max(minS,s.scale+delta*s.scale));
  const rect=cropViewport.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const ratio=ns/s.scale;
  s.x=cx-(cx-s.x)*ratio; s.y=cy-(cy-s.y)*ratio; s.scale=ns;
  cropZoom.value=Math.round(ns*100);clampCrop();applyCrop();
},{passive:false});
// zoom slider
cropZoom.addEventListener('input',()=>{
  const s=cropState,ns=parseInt(cropZoom.value)/100;
  const cx=s.vpW/2,cy=s.vpH/2,ratio=ns/s.scale;
  s.x=cx-(cx-s.x)*ratio; s.y=cy-(cy-s.y)*ratio; s.scale=ns;
  clampCrop();applyCrop();
});

function resetFormPhotos(imgs){
  // imgs: array of dataUrl strings (existing) or empty
  photosArr = (imgs||[]).map(d=>({dataUrl:d}));
  pendingFiles=[]; pendingIdx=0;
  cropContainer.style.display='none';
  renderThumbs();
}

/* ───── 表單 Modal ───── */
function openForm(item=null){
  editMode=!!item; currentId=item?item.id:null;
  document.getElementById('formTitle').textContent=item?'編輯食記':'新增食記';
  document.getElementById('fName').value=item?item.name:'';
  document.getElementById('fType').value=item?(item.type||''):'';
  document.getElementById('fDate').value=item&&item.date?item.date:new Date().toISOString().slice(0,10);
  document.getElementById('fPrice').value=item&&item.price?item.price:'';
  document.getElementById('fAddr').value=item?(item.addr||''):'';
  document.getElementById('fNote').value=item?(item.note||''):'';
  document.getElementById('fMaps').value=item?(item.maps||''):'';
  starVal=item?(item.score||0):0;
  buildStarPick(); highlightStars(starVal);
  document.getElementById('fScoreInput').value=starVal?starVal.toFixed(1):'';
  // 照片
  const existImgs = item ? (item.imgs || (item.img ? [item.img] : [])) : [];
  resetFormPhotos(existImgs);
  document.getElementById('formMask').classList.add('open');
}
function closeForm(){
  document.getElementById('formMask').classList.remove('open');
  cropContainer.style.display='none';
}

document.getElementById('addBtn').addEventListener('click',()=>openForm());
document.getElementById('formClose').addEventListener('click',closeForm);
document.getElementById('formCancel').addEventListener('click',closeForm);
document.getElementById('formMask').addEventListener('click',e=>{if(e.target===document.getElementById('formMask'))closeForm();});

document.getElementById('formSave').addEventListener('click',async()=>{
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('請輸入餐廳名稱');return;}
  const price=parseInt(document.getElementById('fPrice').value)||0;
  const addr=document.getElementById('fAddr').value.trim();
  const type=document.getElementById('fType').value.trim();
  const note=document.getElementById('fNote').value.trim();
  const maps=document.getElementById('fMaps').value.trim();
  const date=document.getElementById('fDate').value;
  let sv=parseFloat(document.getElementById('fScoreInput').value)||0;
  sv=Math.round(sv*10)/10;
  starVal=sv;

  const imgs=photosArr.map(p=>p.dataUrl);
  const img=imgs[0]||'';

  if(editMode&&currentId){
    const idx=DATA.findIndex(r=>r.id===currentId);
    if(idx>=0) DATA[idx]={...DATA[idx],name,type,price,addr,note,maps,date,score:starVal,imgs,img,updatedAt:Date.now()};
  } else {
    DATA.unshift({id:Date.now()+'',name,type,price,addr,note,maps,date,score:starVal,imgs,img,createdAt:Date.now()});
  }
  save(DATA); closeForm(); closeDetail(); render();
});

/* ───── 詳情 Modal ───── */
function starsHTMLDecimal(score){
  // render 5 stars with partial fill via clip
  let h='';
  for(let i=1;i<=5;i++){
    const fill=Math.min(1,Math.max(0,score-(i-1)));
    if(fill>=1) h+=`<span style="font-size:18px;">⭐</span>`;
    else if(fill>0) h+=`<span style="font-size:18px;opacity:0.5;">⭐</span>`;
    else h+=`<span style="font-size:18px;opacity:0.15;">⭐</span>`;
  }
  return h;
}

function openDetail(item){
  currentId=item.id;
  document.getElementById('dName').textContent=item.name;
  // 類型標籤
  const dNameEl=document.getElementById('dName');
  const existBadge=document.getElementById('dTypeBadge');
  if(existBadge) existBadge.remove();
  if(item.type){
    const badge=document.createElement('span');
    badge.id='dTypeBadge';
    badge.textContent=item.type;
    badge.style.cssText='display:inline-block;margin-left:8px;padding:2px 9px;background:rgba(232,98,42,0.12);color:#C9A84C;border:1px solid rgba(232,98,42,0.25);border-radius:99px;font-size:10px;letter-spacing:0.06em;vertical-align:middle;font-family:"Space Mono",monospace;';
    dNameEl.appendChild(badge);
  }
  document.getElementById('dAddrText').textContent=item.addr||'未填寫地址';
  document.getElementById('dDateText').textContent=item.date||'未填寫日期';
  document.getElementById('dPrice').textContent=item.price?'NT$'+item.price.toLocaleString():'—';
  // Google Maps
  const mapsRow=document.getElementById('dMapsRow'),mapsLink=document.getElementById('dMapsLink');
  if(item.maps){mapsLink.href=item.maps;mapsRow.style.display='flex';}else{mapsRow.style.display='none';}
  // 星星
  document.getElementById('dStars').innerHTML=starsHTMLDecimal(item.score||0);
  document.getElementById('dScoreNum').textContent=item.score?(+item.score).toFixed(1):'未評分';
  // 備註
  const noteRow=document.getElementById('dNoteRow');
  if(item.note){document.getElementById('dNoteText').textContent=item.note;noteRow.style.display='block';}
  else noteRow.style.display='none';
  // 照片輪播
  const wrap=document.getElementById('detailImgWrap');
  const imgs=item.imgs||(item.img?[item.img]:[]);
  if(imgs.length===0){
    wrap.innerHTML=`<div class="modal-img-placeholder">🍜</div>`;
  } else if(imgs.length===1){
    wrap.innerHTML=`<img class="modal-img" src="${imgs[0]}" alt="${item.name}">`;
  } else {
    let slideIdx=0;
    const render=()=>{
      wrap.innerHTML=`
        <img class="modal-img" src="${imgs[slideIdx]}" alt="${item.name}" style="display:block;">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 10px;pointer-events:none;">
          <button onclick="this.closest('[id=detailImgWrap]').__prev()" style="pointer-events:all;background:rgba(0,0,0,0.5);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">‹</button>
          <button onclick="this.closest('[id=detailImgWrap]').__next()" style="pointer-events:all;background:rgba(0,0,0,0.5);border:none;color:#fff;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">›</button>
        </div>
        <div style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;">
          ${imgs.map((_,i)=>`<div style="width:6px;height:6px;border-radius:50%;background:${i===slideIdx?'#fff':'rgba(255,255,255,0.4)'}"></div>`).join('')}
        </div>`;
    };
    wrap.__prev=()=>{ slideIdx=(slideIdx-1+imgs.length)%imgs.length; render(); };
    wrap.__next=()=>{ slideIdx=(slideIdx+1)%imgs.length; render(); };
    render();
  }
  document.getElementById('detailMask').classList.add('open');
}
function closeDetail(){ document.getElementById('detailMask').classList.remove('open'); }
document.getElementById('detailClose').addEventListener('click',closeDetail);
document.getElementById('detailMask').addEventListener('click',e=>{if(e.target===document.getElementById('detailMask'))closeDetail();});
document.getElementById('dEdit').addEventListener('click',()=>{const item=DATA.find(r=>r.id===currentId);if(!item)return;closeDetail();setTimeout(()=>openForm(item),120);});
document.getElementById('dDel').addEventListener('click',()=>{if(!confirm('確定要刪除這筆食記？'))return;DATA=DATA.filter(r=>r.id!==currentId);save(DATA);closeDetail();render();});

/* ───── 渲染照片牆 ───── */
function starsHTMLSmall(score){
  let h='';
  for(let i=1;i<=5;i++) h+=`<span style="opacity:${i<=Math.round(score)?1:0.2};font-size:11px">⭐</span>`;
  return h;
}

function render(){
  let d=DATA.filter(r=>{if(!q)return true;return r.name.includes(q)||(r.addr||'').includes(q)||(r.note||'').includes(q);});
  if(sortKey==='score-desc') d.sort((a,b)=>b.score-a.score);
  else if(sortKey==='score-asc') d.sort((a,b)=>a.score-b.score);
  else if(sortKey==='price-desc') d.sort((a,b)=>(b.price||0)-(a.price||0));
  else if(sortKey==='price-asc') d.sort((a,b)=>(a.price||99999)-(b.price||99999));
  else if(sortKey==='date-asc') d.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  else if(sortKey==='new') d.sort((a,b)=>b.createdAt-a.createdAt);
  else d.sort((a,b)=>(b.date||'').localeCompare(a.date||'')); // date-desc default

  document.getElementById('countBadge').textContent=d.length+' 家';
  const grid=document.getElementById('photoGrid');
  grid.innerHTML='';

  if(d.length===0){
    const empty=document.createElement('div');
    empty.className='empty-state';
    empty.innerHTML=`<div class="empty-icon">🍴</div><div class="empty-text">還沒有食記，點「＋」開始記錄第一家吧！</div>`;
    grid.appendChild(empty);
  } else {
    d.forEach(item=>{
      const coverImg=item.img||(item.imgs&&item.imgs[0])||'';
      const card=document.createElement('div');
      card.className='photo-card'+(coverImg?'':' no-photo');
      const photoCount=(item.imgs&&item.imgs.length>1)?`<span style="position:absolute;top:7px;right:7px;background:rgba(0,0,0,0.55);color:#fff;font-size:9px;border-radius:99px;padding:2px 7px;letter-spacing:0.04em;">⧉ ${item.imgs.length}</span>`:'';
      const typeTag=item.type?`<span class="photo-card-type">${item.type}</span>`:'';
      const scoreStr=item.score?`<span class="photo-card-score">⭐ ${(+item.score).toFixed(1)}</span>`:'';
      const priceStr=item.price?`<span class="photo-card-score">NT$${item.price.toLocaleString()}</span>`:'';

      if(coverImg){
        card.innerHTML=`
          <div class="photo-card-img">
            <img src="${coverImg}" alt="${item.name}" loading="lazy">
            ${photoCount}
            <div class="overlay">
              <div class="overlay-meta">
                <span class="overlay-price">${item.price?'NT$'+item.price.toLocaleString():''}</span>
                <div class="overlay-stars">${starsHTMLSmall(item.score)}</div>
                ${item.score?`<span style="font-size:10px;color:rgba(255,210,0,0.85);">${(+item.score).toFixed(1)}</span>`:''}
              </div>
            </div>
          </div>
          <div class="photo-card-info">
            <div class="photo-card-name">${item.name}</div>
            <div class="photo-card-sub">${typeTag}${scoreStr}${priceStr}</div>
          </div>`;
      } else {
        card.innerHTML=`
          <div class="photo-card-img">
            <div class="no-photo-icon">🍜</div>
            <div class="overlay">
              <div class="overlay-meta">
                <div class="overlay-stars">${starsHTMLSmall(item.score)}</div>
              </div>
            </div>
          </div>
          <div class="photo-card-info">
            <div class="photo-card-name">${item.name}</div>
            <div class="photo-card-sub">${typeTag}${scoreStr}${priceStr}</div>
          </div>`;
      }
      card.addEventListener('click',()=>openDetail(item));
      grid.appendChild(card);
    });
  }

  // 統計
  document.getElementById('sTotal').textContent=DATA.length;
  if(DATA.length){
    const rated=DATA.filter(r=>r.score>0);
    document.getElementById('sAvg').textContent=rated.length?(rated.reduce((s,r)=>s+r.score,0)/rated.length).toFixed(1):'—';
    const best=DATA.reduce((a,b)=>b.score>a.score?b:a,DATA[0]);
    document.getElementById('sBest').textContent=best.score?(+best.score).toFixed(1):'—';
    const priced=DATA.filter(r=>r.price>0);
    document.getElementById('sAvgPrice').textContent=priced.length?'NT$'+Math.round(priced.reduce((s,r)=>s+r.price,0)/priced.length).toLocaleString():'—';
  } else {
    document.getElementById('sAvg').textContent='—';
    document.getElementById('sBest').textContent='—';
    document.getElementById('sAvgPrice').textContent='—';
  }
}

document.getElementById('sortSelect').addEventListener('change', e=>{sortKey=e.target.value; render();});
