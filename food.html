<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食記 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0e0e0e;min-height:100vh;font-family:'Space Mono',monospace;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(232,98,42,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(200,130,50,0.04) 0%, transparent 50%);
    pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;}
  .bg-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .c1{width:500px;height:500px;background:radial-gradient(circle, rgba(232,98,42,0.06), transparent 70%);top:-100px;right:-80px;}
  .c2{width:350px;height:350px;background:radial-gradient(circle, rgba(150,80,20,0.05), transparent 70%);bottom:-80px;left:-60px;}

  /* ── 主內容 ── */
  .page-content{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:48px 12px 80px;}

  .page-header{margin-bottom:28px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,64px);font-weight:300;color:#f0e6d6;line-height:1;margin-bottom:4px;}
  .page-title em{font-style:italic;color:#E8622A;}
  .page-label{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,220,160,0.5);display:block;margin-bottom:20px;}

  /* ── 統計列 ── */
  .stats-row{display:flex;gap:24px;margin-bottom:28px;flex-wrap:wrap;}
  .stat-item{display:flex;flex-direction:column;gap:2px;}
  .stat-num{font-family:'Noto Sans TC',sans-serif;font-size:36px;font-weight:900;color:#ffffff;line-height:1;letter-spacing:-0.02em;}
  .stat-lbl{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,220,160,0.5);font-family:'Noto Sans TC',sans-serif;margin-top:4px;}
  .stat-sep{width:1px;background:rgba(255,180,80,0.15);align-self:stretch;margin:4px 0;}

  /* ── 工具列 ── */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
  .search-wrap{flex:1;min-width:180px;position:relative;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;}
  .search-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,180,80,0.2);border-radius:99px;padding:9px 16px 9px 36px;color:#ffffff;font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s;}
  .search-input::placeholder{color:rgba(255,220,160,0.3);}
  .search-input:focus{border-color:rgba(232,98,42,0.5);}
  .sort-select{background:rgba(255,255,255,0.06);border:1px solid rgba(255,180,80,0.2);border-radius:99px;padding:9px 14px;color:#ffffff;font-family:'Space Mono',monospace;font-size:11px;outline:none;cursor:pointer;}
  .sort-select option{background:#1a1a1a;color:#ffffff;}
  .count-badge{font-size:11px;color:rgba(255,220,160,0.45);letter-spacing:0.08em;white-space:nowrap;align-self:center;}

  /* ── 新增按鈕 ── */
  .add-btn{
    width:46px;height:46px;border-radius:50%;
    background:linear-gradient(135deg,#E8622A,#FFD200);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;color:#1a0800;font-weight:700;
    box-shadow:0 4px 20px rgba(232,98,42,0.45);
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s;
    flex-shrink:0;
  }
  .add-btn:hover{transform:scale(1.12);box-shadow:0 6px 28px rgba(232,98,42,0.6);}

  /* ── IG 照片牆 ── */
  .photo-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:4px;
  }
  .photo-card{
    position:relative;
    aspect-ratio:3/4;
    overflow:hidden;
    cursor:pointer;
    background:#1a1a1a;
    border:1px solid rgba(255,180,80,0.08);
    border-radius:8px;
    transition:transform 0.2s, box-shadow 0.2s;
  }
  .photo-card:hover{ transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,0.5); }
  .photo-card img{
    position:absolute;inset:0;
    width:100%;height:100%;
    object-fit:cover;
    transition:transform 0.4s ease;
    display:block;
  }
  .photo-card:hover img{transform:scale(1.05);}
  /* 常駐底部漸層 + 名稱 */
  .photo-card .card-bottom{
    position:absolute;bottom:0;left:0;right:0;
    background:linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    padding:40px 10px 10px;
    pointer-events:none;
  }
  .card-name{
    font-size:15px;font-weight:700;color:#fff;
    white-space:normal;overflow:hidden;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;
    text-shadow:0 1px 6px rgba(0,0,0,0.8);
    line-height:1.3;
  }
  /* hover 時顯示的額外資訊 */
  .photo-card .overlay{
    position:absolute;inset:0;
    opacity:0;
    transition:opacity 0.25s ease;
    display:flex;flex-direction:column;justify-content:flex-start;
    padding:10px;
    pointer-events:none;
  }
  .photo-card:hover .overlay{opacity:1;}
  .overlay-meta{display:flex;gap:6px;align-items:center;}
  .overlay-price{font-size:10px;color:#FFD200;}
  .overlay-stars{display:flex;gap:2px;}
  .overlay-stars span{font-size:11px;}

  /* 無照片佔位 */
  .photo-card.no-photo{
    background:#1a1a1a;
    display:flex;align-items:center;justify-content:center;
  }
  .no-photo-icon{font-size:32px;opacity:0.18;}

  /* 空狀態 */
  .empty-state{
    grid-column:1/-1;
    padding:80px 0;
    display:flex;flex-direction:column;align-items:center;gap:12px;
  }
  .empty-icon{font-size:48px;opacity:0.2;}
  .empty-text{font-size:12px;color:rgba(255,220,180,0.25);letter-spacing:0.12em;text-transform:uppercase;}

  /* ── 詳情 Modal ── */
  .modal-mask{
    position:fixed;inset:0;z-index:9000;
    background:rgba(0,0,0,0.92);
    display:none;align-items:center;justify-content:center;
    padding:24px;
    backdrop-filter:blur(6px);
  }
  .modal-mask.open{display:flex;}
  .modal{
    background:#1a1a1a;
    border:1px solid rgba(255,180,80,0.12);
    border-radius:16px;
    max-width:520px;width:100%;
    overflow:hidden;
    max-height:90vh;
    display:flex;flex-direction:column;
    box-shadow:0 24px 80px rgba(0,0,0,0.9);
    animation:modalIn 0.28s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:#111;flex-shrink:0;}
  .modal-img-placeholder{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#111;font-size:56px;opacity:0.15;flex-shrink:0;}
  .modal-body{padding:20px 24px 24px;overflow-y:auto;flex:1;}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;color:#ffffff;margin-bottom:4px;}
  .modal-addr{font-size:13px;color:rgba(255,220,160,0.7);letter-spacing:0.04em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  .modal-addr svg{opacity:0.6;flex-shrink:0;}
  .modal-row{display:flex;gap:16px;margin-bottom:6px;align-items:center;}
  .modal-price{font-family:'Noto Sans TC',sans-serif;color:#FFD200;font-weight:900;letter-spacing:-0.01em;}
  .modal-price .price-prefix{font-size:22px;font-weight:700;}
  .modal-price .price-num{font-size:40px;}
  .modal-price-lbl{font-size:12px;color:rgba(255,220,160,0.6);letter-spacing:0.1em;text-transform:uppercase;margin-left:4px;align-self:flex-end;margin-bottom:3px;}
  .modal-stars{display:flex;gap:3px;margin-left:0;}
  .modal-stars span{font-size:22px;}
  .modal-score-num{font-family:'Cormorant Garamond',serif;font-size:22px;color:rgba(255,210,100,0.9);margin-left:8px;align-self:center;font-weight:600;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-btn{flex:1;padding:12px;border-radius:8px;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.06em;transition:background 0.2s;}
  .modal-btn-edit{background:rgba(255,180,80,0.1);color:#FFD080;border:1px solid rgba(255,180,80,0.25);}
  .modal-btn-edit:hover{background:rgba(255,180,80,0.2);}
  .modal-btn-del{background:rgba(200,50,30,0.1);color:#ff8070;border:1px solid rgba(200,50,30,0.25);}
  .modal-btn-del:hover{background:rgba(200,50,30,0.22);}
  .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.12);border:none;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:1;}

  /* ── 新增/編輯 Modal ── */
  .form-modal{
    background:#1a1a1a;
    border:1px solid rgba(255,180,80,0.15);
    border-radius:16px;
    max-width:640px;width:100%;
    overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.9);
    animation:modalIn 0.28s cubic-bezier(0.34,1.2,0.64,1);
  }
  .form-header{
    padding:18px 24px;
    border-bottom:1px solid rgba(255,180,80,0.08);
    display:flex;align-items:center;justify-content:space-between;
  }
  .form-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:#ffffff;font-weight:600;}
  .form-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto;}

  /* 圖片上傳 */
  .img-upload-area{
    width:100%;aspect-ratio:4/3;border:2px dashed rgba(255,180,80,0.2);border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;position:relative;overflow:hidden;background:rgba(255,255,255,0.03);
    transition:border-color 0.2s;
  }
  .img-upload-area:hover{border-color:rgba(232,98,42,0.5);}
  .img-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .img-upload-label{font-size:11px;color:rgba(255,220,180,0.35);letter-spacing:0.08em;text-transform:uppercase;position:relative;z-index:1;}
  .img-upload-icon{font-size:28px;opacity:0.3;position:relative;z-index:1;}
  .img-upload-input{display:none;}
  .img-clear{position:absolute;top:8px;right:8px;z-index:2;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:26px;height:26px;color:#fff;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;}

  .field-group{display:flex;flex-direction:column;gap:6px;}
  .field-label{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,220,160,0.7);font-weight:700;}
  .field-input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,180,80,0.25);border-radius:8px;padding:12px 14px;color:#ffffff;font-family:'Space Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s;width:100%;}
  .field-input:focus{border-color:rgba(232,98,42,0.7);background:rgba(255,255,255,0.11);}
  .field-input::placeholder{color:rgba(255,220,160,0.35);}

  /* 星等選擇 */
  .stars-pick{display:flex;gap:6px;}
  .star-btn{font-size:22px;background:none;border:none;cursor:pointer;opacity:0.25;transition:opacity 0.15s,transform 0.15s;}
  .star-btn.active{opacity:1;}
  .star-btn:hover{transform:scale(1.2);}

  .form-footer{padding:0 24px 20px;display:flex;gap:10px;}
  .btn-cancel{flex:1;padding:11px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,180,80,0.15);color:#C9A84C;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;}
  .btn-save{flex:2;padding:11px;border-radius:8px;background:linear-gradient(135deg,#E8622A,#c84a15);border:none;color:#fff;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:0.06em;transition:opacity 0.2s;}
  .btn-save:hover{opacity:0.88;}


  
  
  /* 觸發區：底部感應條 */
  
  
  
  
  
  
  
  

    .ic-about  {background:linear-gradient(145deg,#4F8EF7,#1A5FD4);}
  .ic-photos{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
  .ic-dramas{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
  .ic-food{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
  
  .ic-uber{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-weight{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
  .ic-threads{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
  .ic-reminder{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
  .ic-netflix{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-mlb{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-chloe{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-trips{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}

  @media(max-width:600px){
    
    
  }

  /* ── Global Menubar ── */
  .global-menubar{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    height:28px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    font-size:12px;color:rgba(255,255,255,0.92);
    letter-spacing:0.02em;
    font-family:'Space Mono',monospace;
  }
  .gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
  .gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
  .mb-menu{padding:0 6px;border-radius:4px;cursor:default;transition:background 0.15s;font-size:12px;}
  .mb-menu:hover{background:rgba(255,255,255,0.2);}
.global-dock-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(calc(100% - 2px));z-index:9998;transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1),opacity 0.3s;opacity:0;}
.global-dock-wrap.visible{transform:translateX(-50%) translateY(-12px);opacity:1;}
.global-dock{display:flex;align-items:flex-end;gap:8px;background:rgba(255,255,255,0.16);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.25);border-radius:20px 20px 0 0;padding:10px 14px 14px;box-shadow:0 -4px 30px rgba(0,0,0,0.25);}
.gd-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;position:relative;}
.gd-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 3px 12px rgba(0,0,0,0.28);}
.gd-item:hover .gd-icon{transform:translateY(-10px) scale(1.22);}
.gd-label{font-size:9px;letter-spacing:0.05em;color:rgba(255,255,255,0.8);text-transform:uppercase;opacity:0;transition:opacity 0.15s;white-space:nowrap;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;position:absolute;bottom:-20px;font-family:'Space Mono',monospace;}
.gd-item:hover .gd-label{opacity:1;}
.gd-sep{width:1px;height:40px;background:rgba(255,255,255,0.2);margin:0 3px;align-self:center;}
.gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}









.dock-trigger-zone{position:fixed;bottom:0;left:0;right:0;height:8px;z-index:9997;}
</style>
</head>

<div class="bg-circle c2"></div>

<!-- Global Menubar -->
<div class="global-menubar">
  <div class="gm-left">
    <span style="font-size:16px">🗿</span>
    <a href="index.html" style="font-weight:700;color:rgba(255,255,255,0.92);text-decoration:none;cursor:pointer;position:relative;z-index:9999;">Sumoai's Reel</a>
    <span class="mb-menu">檔案</span>
    <span class="mb-menu">編輯</span>
    <span class="mb-menu">顯示方式</span>
    <span class="mb-menu">前往</span>
    <span class="mb-menu">視窗</span>
    <span class="mb-menu">輔助說明</span>
  </div>
  <div class="gm-right">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle"><path d="M1 9l2 2c5.07-5.07 13.27-5.05 18.36 0l2-2C16.93 2.37 7.1 2.35 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.77 7.27-2.76 10.03 0l2-2C15.14 9.14 8.87 9.13 5 13z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)" style="vertical-align:middle"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    <img src="https://flagcdn.com/16x12/tw.png" width="16" height="12" style="vertical-align:middle;border-radius:1px" alt="TW">
    <span id="gmbTime" style="letter-spacing:0.03em"></span>
    <svg width="13" height="13" viewBox="0 0 24 24" fill="rgba(255,255,255,0.85)" style="vertical-align:middle;cursor:default"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </div>
</div>


<!-- Main -->
<main class="page-content">
  <div class="page-header">
    <h1 class="page-title"><em>Food</em> Diary</h1>
    <span class="page-label">每一口都值得記憶</span>
    <div class="stats-row" id="statsRow">
      <div class="stat-item">
        <div class="stat-num" id="sTotal">0</div>
        <div class="stat-lbl">家餐廳</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sAvg">—</div>
        <div class="stat-lbl">平均評分</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sGAvg">—</div>
        <div class="stat-lbl">Google 均分</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sTotalVisits">—</div>
        <div class="stat-lbl">造訪次數</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sAvgPrice">—</div>
        <div class="stat-lbl">平均消費</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sTotalSpend">—</div>
        <div class="stat-lbl">總消費金額</div>
      </div>

<script>

const SUMOAI_TOKEN_KEY = 'sumoai_gh_token';
function getGHToken(){ return localStorage.getItem(SUMOAI_TOKEN_KEY)||null; }
function saveGHToken(t){ localStorage.setItem(SUMOAI_TOKEN_KEY, t.trim()); }
window.clearGHToken = function(){ localStorage.removeItem(SUMOAI_TOKEN_KEY); alert('Token 已清除，重新整理後重新輸入'); };
function showTokenModal(onSuccess){
  if(document.getElementById('_tokenModal')) return;
  var el=document.createElement('div');
  el.id='_tokenModal';
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);font-family:sans-serif;';
  el.innerHTML='<div style="background:#1a1a1a;border:1px solid rgba(255,255,255,0.15);border-radius:16px;padding:32px;width:420px;max-width:92vw;"><div style="font-size:28px;margin-bottom:10px;">&#128273;</div><div style="color:#f0f0f0;font-size:17px;font-weight:500;margin-bottom:6px;">輸入 GitHub Token</div><div style="color:#888;font-size:13px;margin-bottom:20px;line-height:1.6;">輸入一次後本站所有分頁都能使用。<br>Token 只存在你的瀏覽器，不會上傳。</div><input id=\"_tokenInput\" type=\"password\" placeholder=\"ghp_xxxxxxxxxxxxxxxx\" style=\"width:100%;padding:10px 14px;background:#242424;border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:#f0f0f0;font-size:13px;font-family:monospace;outline:none;box-sizing:border-box;margin-bottom:8px;\"><div id=\"_tokenErr\" style=\"color:#ff6b6b;font-size:12px;margin-bottom:12px;min-height:16px;\"></div><div style=\"display:flex;gap:10px;\"><button id=\"_tokenOk\" style=\"flex:1;padding:10px;background:#E50914;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-weight:500;\">確認</button><a href=\"https://github.com/settings/tokens\" target=\"_blank\" style=\"padding:10px 14px;background:transparent;color:#888;border:1px solid rgba(255,255,255,0.2);border-radius:8px;font-size:12px;text-decoration:none;display:flex;align-items:center;white-space:nowrap;\">產生 Token &#8599;</a></div></div>';
  document.body.appendChild(el);
  setTimeout(function(){ var i=document.getElementById('_tokenInput'); if(i) i.focus(); },100);
  function trySubmit(){
    var val=(document.getElementById('_tokenInput').value||'').trim();
    if(!val){ document.getElementById('_tokenErr').textContent='請輸入 Token'; return; }
    document.getElementById('_tokenOk').textContent='驗證中...';
    document.getElementById('_tokenOk').disabled=true;
    fetch('https://api.github.com/user',{headers:{'Authorization':'token '+val,'Accept':'application/vnd.github.v3+json'}})
      .then(function(r){
        if(r.ok){ saveGHToken(val); el.remove(); if(onSuccess) onSuccess(val); }
        else{ document.getElementById('_tokenErr').textContent='Token 無效，請確認並重試'; document.getElementById('_tokenOk').textContent='確認'; document.getElementById('_tokenOk').disabled=false; }
      }).catch(function(){ document.getElementById('_tokenErr').textContent='網路錯誤，請再試一次'; document.getElementById('_tokenOk').textContent='確認'; document.getElementById('_tokenOk').disabled=false; });
  }
  document.getElementById('_tokenOk').onclick=trySubmit;
  document.getElementById('_tokenInput').onkeydown=function(e){ if(e.key==='Enter') trySubmit(); };
}
function requireToken(cb){ var t=getGHToken(); if(t){ cb(t); return; } showTokenModal(cb); }

/* ───── GitHub 同步設定 ───── */
const GH_OWNER='sumoai-boop', GH_REPO='sumoai-boop.github.io', GH_BRANCH='main', GH_TOKEN_KEY='gh_token_food';
const GH_DATA_PATH='food-data.json';
const STORE = 'sumoai_food_v2';

function showToast(msg,isErr){
  var t=document.getElementById('ghToast');
  if(!t){t=document.createElement('div');t.id='ghToast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:99px;font-size:13px;z-index:9999;font-family:monospace;pointer-events:none;transition:opacity 0.5s;';document.body.appendChild(t);}
  t.textContent=msg;t.style.background=isErr?'rgba(180,30,30,0.95)':'rgba(30,80,50,0.95)';t.style.color='#fff';t.style.opacity='1';
  clearTimeout(t._to);if(!isErr)t._to=setTimeout(()=>t.style.opacity='0',3000);
}
function getToken(){ return getGHToken(); }
window.clearGHToken=function(){localStorage.removeItem(GH_TOKEN_KEY);alert('Token 已清除');};

function loadFromGitHub(){
  requireToken(function(token){
  // 先從 localStorage 顯示，GitHub 回來再更新
  DATA=load(); refreshTypeList(); render();
  showToast('⏳ 同步雲端資料...',false);
  var api='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_DATA_PATH;
  fetch(api+'?ref='+GH_BRANCH+'&t='+Date.now(),{headers:{'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json'}})
    .then(r=>{
      if(!r.ok){
        if(r.status===401){localStorage.removeItem(SUMOAI_TOKEN_KEY);showToast('❌ Token 無效，請重新整理',true);}
        else if(r.status===404){showToast('（尚無雲端資料）',false);}
        else showToast('❌ 載入失敗('+r.status+')，使用本機資料',true);
        return null;
      }
      return r.json();
    })
    .then(fi=>{
      if(!fi||!fi.content){return;}
      try{
        var raw=atob(fi.content.split('\n').join(''));
        var arr=JSON.parse(decodeURIComponent(escape(raw)));
        if(Array.isArray(arr)&&arr.length>0){
          DATA=arr;localStorage.setItem(STORE,JSON.stringify(DATA));
          if(fi.sha) localStorage.setItem('gh_food_sha',fi.sha);
          showToast('✦ 食記已同步',false);refreshTypeList();render();
        }
      }catch(e){console.warn('解析失敗:',e);}
    }).catch(e=>{console.warn('載入失敗:',e);showToast('❌ 網路錯誤，使用本機資料',true);});
  }); // end requireToken
}

function load(){ try{ return JSON.parse(localStorage.getItem(STORE)||'[]'); }catch(e){return [];} }
function save(d){
  localStorage.setItem(STORE,JSON.stringify(d));
  pushToGitHub(d);
}

var _pushing=false;
async function pushToGitHub(data){
  if(_pushing){showToast('⏳ 推送中，請稍候...',false);return;}
  _pushing=true;
  try{
    var token=getToken();if(!token)return;
    var api='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_DATA_PATH;
    var hdrs={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
    showToast('⏳ 儲存至雲端...',false);
    var sha=localStorage.getItem('gh_food_sha')||null;
    if(!sha){
      var r=await fetch(api+'?ref='+GH_BRANCH,{headers:hdrs});
      if(r.status===404){ sha=null; }
      else if(r.ok){ var fi=await r.json(); sha=fi.sha||null; if(sha)localStorage.setItem('gh_food_sha',sha); }
    }
    var jsonStr=JSON.stringify(data,null,2);
    // 檢查大小
    var sizeKB=Math.round(new Blob([jsonStr]).size/1024);
    var encoded=btoa(unescape(encodeURIComponent(jsonStr)));
    var body={message:'更新食記 ('+sizeKB+'KB)',content:encoded,branch:GH_BRANCH};if(sha)body.sha=sha;
    var pr=await fetch(api,{method:'PUT',headers:hdrs,body:JSON.stringify(body)});
    if(!pr.ok){
      var e2=await pr.json();
      localStorage.removeItem('gh_food_sha');
      var msg=e2.message||pr.status;
      if(pr.status===422) msg='資料太大無法上傳（'+sizeKB+'KB），請減少照片';
      showToast('❌ 推送失敗：'+msg,true);
    } else {
      var prData=await pr.json();
      var ns=prData.content&&prData.content.sha;
      if(ns)localStorage.setItem('gh_food_sha',ns);else localStorage.removeItem('gh_food_sha');
      showToast('✦ 已同步至雲端（'+sizeKB+'KB）',false);
    }
  }catch(err){
    showToast('❌ 同步錯誤：'+err.message,true);
  }finally{_pushing=false;}
}

/* ───── 圖片壓縮 ───── */
function compressImage(dataUrl,maxW,maxH,quality){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
      if(h>maxH){w=Math.round(w*maxH/h);h=maxH;}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.src=dataUrl;
  });
}

/* ───── 統計頁：區域分析 ───── */
function extractDistrict(addr){
  if(!addr) return null;
  // 移除郵遞區號（3-6位數字開頭）
  const clean = addr.replace(/^\d+/, '');
  // 抓縣市後面的區/鄉/鎮
  const m = clean.match(/[縣市]([^\s縣市]+?[區鄉鎮])/);
  if(m) return m[1];
  // 沒有縣市前綴，直接抓 XX區
  const m2 = clean.match(/([^\s\d]{2,4}[區鄉鎮])/);
  return m2 ? m2[1] : null;
}

function renderStatsPage(){
  const container = document.getElementById('statsPage');

  // 區域統計
  const distMap={};
  DATA.forEach(r=>{
    const dist = extractDistrict(r.addr);
    if(!dist) return;
    if(!distMap[dist]) distMap[dist]={count:0,totalScore:0,scoredCount:0,totalSpend:0,spendCount:0,names:[]};
    distMap[dist].count++;
    distMap[dist].names.push(r.name1||r.name||'');
    if(r.score>0){ distMap[dist].totalScore+=r.score; distMap[dist].scoredCount++; }
    // 金額從 visitLog 加總
    if(r.visitLog&&r.visitLog.length>0){
      r.visitLog.forEach(v=>{ if(v.price!=null&&v.price!==''){distMap[dist].totalSpend+=Number(v.price);distMap[dist].spendCount++;} });
    } else if(r.price!=null&&r.price!==''){
      distMap[dist].totalSpend+=Number(r.price); distMap[dist].spendCount++;
    }
  });

  const dists = Object.entries(distMap).sort((a,b)=>b[1].count-a[1].count);
  const maxCount = dists[0]?.[1].count||1;

  let html=`<div style="margin-bottom:24px;">
    <div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,220,160,0.4);margin-bottom:16px;">區域分布　${dists.length} 個區域</div>
    <div style="display:flex;flex-direction:column;gap:10px;">`;

  dists.forEach(([dist,d])=>{
    const pct = Math.round(d.count/maxCount*100);
    const avgSpend = d.spendCount ? '$'+Math.round(d.totalSpend/d.spendCount).toLocaleString() : '—';
    html+=`
      <div style="display:grid;grid-template-columns:80px 1fr 60px 120px;gap:16px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);">

        <div style="position:relative;height:28px;background:rgba(255,255,255,0.05);border-radius:6px;overflow:hidden;">
          <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:linear-gradient(90deg,rgba(232,98,42,0.7),rgba(232,98,42,0.25));border-radius:6px;"></div>
          <div style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;color:rgba(255,255,255,0.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 20px);">
            ${d.names.slice(0,3).join('、')}${d.names.length>3?'…':''}
          </div>
        </div>
        <div style="font-size:20px;font-weight:900;color:#fff;font-family:'Noto Sans TC',sans-serif;text-align:right;white-space:nowrap;">${d.count}<span style="font-size:11px;color:rgba(255,220,160,0.4);font-weight:400;margin-left:2px;">間</span></div>
        <div style="font-size:18px;font-weight:900;color:rgba(255,220,160,0.85);text-align:right;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;">${avgSpend}</div>
      </div>`;
  });

  html+=`</div></div>`;

  if(dists.length===0){
    html=`<div style="padding:60px 0;text-align:center;color:rgba(255,220,160,0.3);font-size:12px;letter-spacing:0.12em;">尚無地址資料可供統計</div>`;
  }

  html+=`</div></div>`;
  container.innerHTML=html;
}

const DEFAULT_TYPES=[];

function getCustomTypes(){

}
function addCustomType(t){
  if(!t) return;
  const all=[...new Set([...DEFAULT_TYPES, ...getCustomTypes()])];
  if(all.includes(t)) return;
  const custom=[...new Set([...getCustomTypes(), t])];
  localStorage.setItem('sumoai_food_types', JSON.stringify(custom));
  refreshTypeList();
}
function refreshTypeList(){
  const dl=document.getElementById('typeList');
  if(!dl) return;
  const fromData=[...new Set(DATA.map(r=>r.type).filter(Boolean))];

function updateTypeFilterUI(){

/* ───── 星等（點擊設整數，輸入框設小數，支援半星顯示） ───── */
function buildStarPick(){
  const sp = document.getElementById('starsPick');
  sp.innerHTML='';
  for(let i=1;i<=5;i++){
    const wrap=document.createElement('div');
    wrap.style.cssText='position:relative;width:30px;height:30px;cursor:pointer;';
    // 暗底星
    const base=document.createElement('span');
    base.textContent='⭐';
    base.style.cssText='position:absolute;inset:0;font-size:26px;opacity:0.2;line-height:30px;';
    // 亮星（用 clip-path 控制填充比例）
    const fill=document.createElement('span');
    fill.className='star-fill';
    fill.dataset.v=i;
    fill.textContent='⭐';
    fill.style.cssText='position:absolute;inset:0;font-size:26px;opacity:1;line-height:30px;clip-path:inset(0 100% 0 0);transition:clip-path 0.1s;';
    // 左半點擊 → i-0.5，右半 → i
    wrap.addEventListener('click', e=>{
      const rect=wrap.getBoundingClientRect();
      const isLeft = (e.clientX - rect.left) < rect.width/2;
      const val = isLeft ? i-0.5 : i;
      starVal=val;
      document.getElementById('fScoreInput').value=val.toFixed(1);
      highlightStars(val);
    });
    wrap.addEventListener('mouseenter', e=>{
      const rect=wrap.getBoundingClientRect();
      const isLeft=(e.clientX-rect.left)<rect.width/2;
      highlightStars(isLeft?i-0.5:i);
    });
    wrap.addEventListener('mousemove', e=>{
      const rect=wrap.getBoundingClientRect();
      const isLeft=(e.clientX-rect.left)<rect.width/2;
      highlightStars(isLeft?i-0.5:i);
    });
    wrap.addEventListener('mouseleave',()=>highlightStars(starVal));
    wrap.appendChild(base); wrap.appendChild(fill);
    sp.appendChild(wrap);
  }
}
function highlightStars(v){
  document.querySelectorAll('#starsPick .star-fill').forEach(el=>{
    const i=parseInt(el.dataset.v);
    const fill=Math.min(1,Math.max(0, v-(i-1)));
    const pct=Math.round(fill*100);
    el.style.clipPath=`inset(0 ${100-pct}% 0 0)`;
    el.style.opacity=fill>0?'1':'0';
  });
}
// 輸入框同步星等
document.addEventListener('DOMContentLoaded',()=>{
  buildStarPick();
  document.getElementById('fScoreInput').addEventListener('input', e=>{
    let v=parseFloat(e.target.value)||0;
    v=Math.min(5,Math.max(0,v));
    starVal=v;
    highlightStars(v);
  });
});

/* ───── 多張照片 + 裁切器 ───── */
let photosArr = [];       // [{dataUrl}]
let cropStates = [];      // 每張的裁切狀態
let currentCropIdx = -1;

const imgInput     = document.getElementById('imgInput');
const cropContainer= document.getElementById('cropContainer');
const cropViewport = document.getElementById('cropViewport');
const cropImg      = document.getElementById('cropImg');
const cropZoom     = document.getElementById('cropZoom');
const cropClearBtn = document.getElementById('cropClearBtn');

let cropState = {scale:1,x:0,y:0,dragging:false,lastX:0,lastY:0,naturalW:0,naturalH:0,vpW:0,vpH:0};

function clampCrop(){
  const s=cropState,iw=s.naturalW*s.scale,ih=s.naturalH*s.scale;
  if(iw>=s.vpW){ s.x=Math.min(0,Math.max(s.vpW-iw,s.x)); }
  else { s.x=(s.vpW-iw)/2; }
  if(ih>=s.vpH){ s.y=Math.min(0,Math.max(s.vpH-ih,s.y)); }
  else { s.y=(s.vpH-ih)/2; }
}
function applyCrop(){ cropImg.style.transform=`translate(${cropState.x}px,${cropState.y}px) scale(${cropState.scale})`; }

function saveCropState(idx){
  if(idx>=0&&idx<photosArr.length)
    cropStates[idx]={scale:cropState.scale,x:cropState.x,y:cropState.y};
}

function loadCropForIdx(idx){
  if(idx<0||idx>=photosArr.length){ cropContainer.style.display='none'; currentCropIdx=-1; return; }
  saveCropState(currentCropIdx);
  currentCropIdx=idx;
  cropContainer.style.display='flex';
  cropImg.style.transform='none';
  cropImg.onload=()=>{
    requestAnimationFrame(()=>{
      const s=cropState;
      s.naturalW=cropImg.naturalWidth; s.naturalH=cropImg.naturalHeight;
      s.vpW=cropViewport.offsetWidth;  s.vpH=cropViewport.offsetHeight;
      const init=()=>{
        if(cropStates[idx]){
          const sv=cropStates[idx]; s.scale=sv.scale; s.x=sv.x; s.y=sv.y;
        } else {
          // 預設：以實際像素1:1顯示，最大不超過 viewport
          const fitScale=Math.min(1, s.vpW/s.naturalW, s.vpH/s.naturalH);
          s.scale=fitScale;
          s.x=(s.vpW-s.naturalW*s.scale)/2;
          s.y=(s.vpH-s.naturalH*s.scale)/2;
        }
        const minScale=Math.min(s.vpW/s.naturalW, s.vpH/s.naturalH);
        cropZoom.min=Math.round(minScale*50);
        cropZoom.max=Math.round(minScale*300);
        cropZoom.value=Math.round(s.scale*100);
        clampCrop(); applyCrop();
      };
      if(!s.vpW||!s.vpH){ requestAnimationFrame(()=>{ s.vpW=cropViewport.offsetWidth; s.vpH=cropViewport.offsetHeight; init(); }); }
      else { init(); }
    });
  };
  cropImg.src=photosArr[idx].dataUrl;
}

function getCroppedDataUrl(maxW,maxH,quality){
  const s=cropState;
  if(!s.vpW||!s.vpH){ s.vpW=cropViewport.offsetWidth; s.vpH=cropViewport.offsetHeight; }
  const targetRatio=3/4;
  let srcW=s.naturalW, srcH=s.naturalH;
  if(srcW/srcH>targetRatio){ srcW=Math.round(srcH*targetRatio); }
  else { srcH=Math.round(srcW/targetRatio); }
  const centerX=(s.vpW/2-s.x)/s.scale;
  const centerY=(s.vpH/2-s.y)/s.scale;
  const srcX=Math.max(0,Math.min(s.naturalW-srcW,centerX-srcW/2));
  const srcY=Math.max(0,Math.min(s.naturalH-srcH,centerY-srcH/2));
  const outW=Math.min(srcW,maxW), outH=Math.min(srcH,maxH);
  const out=document.createElement('canvas');
  out.width=outW; out.height=outH;
  out.getContext('2d').drawImage(cropImg,srcX,srcY,srcW,srcH,0,0,outW,outH);
  return out.toDataURL('image/jpeg',quality);
}

const IMGBB_KEY = '16a2f30e62f60a1a802412b56c208cb0';

async function uploadToImgBB(dataUrl){
  const base64 = dataUrl.split(',')[1];
  const form = new FormData();
  form.append('key', IMGBB_KEY);
  form.append('image', base64);
  const res = await fetch('https://api.imgbb.com/1/upload', {method:'POST', body:form});
  const json = await res.json();
  if(json.success) return json.data.url;
  throw new Error(json.error?.message || '上傳失敗');
}

// crop drag mouse
cropViewport.addEventListener('mousedown',e=>{cropState.dragging=true;cropState.lastX=e.clientX;cropState.lastY=e.clientY;cropViewport.style.cursor='grabbing';e.preventDefault();});
window.addEventListener('mousemove',e=>{if(!cropState.dragging)return;cropState.x+=e.clientX-cropState.lastX;cropState.y+=e.clientY-cropState.lastY;cropState.lastX=e.clientX;cropState.lastY=e.clientY;clampCrop();applyCrop();});
window.addEventListener('mouseup',()=>{cropState.dragging=false;cropViewport.style.cursor='grab';});
// touch
cropViewport.addEventListener('touchstart',e=>{if(e.touches.length===1){cropState.dragging=true;cropState.lastX=e.touches[0].clientX;cropState.lastY=e.touches[0].clientY;}},{passive:true});
cropViewport.addEventListener('touchmove',e=>{if(!cropState.dragging||e.touches.length!==1)return;cropState.x+=e.touches[0].clientX-cropState.lastX;cropState.y+=e.touches[0].clientY-cropState.lastY;cropState.lastX=e.touches[0].clientX;cropState.lastY=e.touches[0].clientY;clampCrop();applyCrop();e.preventDefault();},{passive:false});
cropViewport.addEventListener('touchend',()=>{cropState.dragging=false;});
// wheel
cropViewport.addEventListener('wheel',e=>{
  e.preventDefault();
  const s=cropState,delta=e.deltaY>0?-0.05:0.05;
  const minS=parseInt(cropZoom.min)/100,maxS=parseInt(cropZoom.max)/100;
  const ns=Math.min(maxS,Math.max(minS,s.scale+delta*s.scale));
  const rect=cropViewport.getBoundingClientRect();
  const cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  const ratio=ns/s.scale;
  s.x=cx-(cx-s.x)*ratio; s.y=cy-(cy-s.y)*ratio; s.scale=ns;
  cropZoom.value=Math.round(ns*100);clampCrop();applyCrop();
},{passive:false});
// zoom slider
cropZoom.addEventListener('input',()=>{
  const s=cropState,ns=parseInt(cropZoom.value)/100;
  const cx=s.vpW/2,cy=s.vpH/2,ratio=ns/s.scale;
  s.x=cx-(cx-s.x)*ratio; s.y=cy-(cy-s.y)*ratio; s.scale=ns;
  clampCrop();applyCrop();
});

function resetFormPhotos(imgs){
  // imgs 可能是 URL 陣列（ImgBB）或 base64 陣列（舊資料）
  photosArr=(imgs||[]).map(d=>({
    dataUrl: d.startsWith('http') ? d : d, // 預覽用
    url: d.startsWith('http') ? d : null    // 已上傳的直接用 URL
  }));
  cropStates=photosArr.map(()=>null);
  currentCropIdx=-1;
  renderThumbs();
}

function getVisitsFromForm(){
  const rows=document.querySelectorAll('#visitsList > div');
  const result=[];
  rows.forEach(row=>{
    const date=row.querySelector('.visit-date')?.value||'';
    const meal=row.querySelector('.visit-meal')?.value||'';
    const price=parseInt(row.querySelector('.visit-price')?.value)||0;
    const menu=row.querySelector('.visit-menu')?.value.trim()||'';
    if(date) result.push({date,meal,price,menu});
  });
  return result.length ? result : [{date:new Date().toISOString().slice(0,10),meal:'',price:0,menu:''}];
}

document.getElementById('formSave').addEventListener('click',async()=>{
  const name1=document.getElementById('fName1').value.trim();
  const name2=document.getElementById('fName2').value.trim();
  const name=name1+(name2?' '+name2:'');
  if(!name1){alert('請輸入餐廳名稱');return;}
  const gscore=parseFloat(document.getElementById('fGscore').value)||0;
  const addr=document.getElementById('fAddr').value.trim();
  const type=document.getElementById('fType').value.trim();
  const meal='';
  const note=document.getElementById('fNote').value.trim();
  const maps=document.getElementById('fMaps').value.trim();
  // 讀取多筆用餐記錄
  const visitLog=getVisitsFromForm();
  // 排序取最新日期和最新金額
  const sortedLog=[...visitLog].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const date=sortedLog[0]?.date||new Date().toISOString().slice(0,10);
  const price=sortedLog[0]?.price||0;
  // 平均消費
  const pricedLog=visitLog.filter(v=>v.price>0);
  const avgPrice=pricedLog.length?Math.round(pricedLog.reduce((s,v)=>s+v.price,0)/pricedLog.length):price;
  const visits=visitLog.length;
  let sv=parseFloat(document.getElementById('fScoreInput').value)||0;
  sv=Math.round(sv*10)/10;
  starVal=sv;

  // 上傳新照片到 ImgBB，已有 URL 的直接用
  saveCropState(currentCropIdx);
  const snapshotPhotos=[...photosArr];
  showToast('⏳ 上傳照片中...', false);
  const imgs=[];
  for(let i=0;i<snapshotPhotos.length;i++){
    const p=snapshotPhotos[i];
    if(p.url){
      // 已上傳過，直接用舊 URL
      imgs.push(p.url);
    } else {
      // 新照片，壓縮後上傳 ImgBB
      try{
        const compressed = await compressImage(p.dataUrl, 1200, 1600, 0.82);
        const url = await uploadToImgBB(compressed);
        imgs.push(url);
        // 更新 photosArr 裡的 url 避免重複上傳
        if(photosArr[i]) photosArr[i].url = url;
      } catch(err){
        showToast('❌ 照片上傳失敗：'+err.message, true);
        return;
      }
    }
  }
  const img=imgs[0]||'';

  // 重新從 localStorage 確認資料沒被清空
  if(DATA.length===0) DATA=load();

  if(editMode&&currentId){
    const idx=DATA.findIndex(r=>r.id===currentId);
    if(idx>=0) DATA[idx]={...DATA[idx],name,name1,name2,type,meal,price:avgPrice,visits,gscore,addr,note,maps,date,score:starVal,visitLog,imgs,img,updatedAt:Date.now()};
  } else {
    DATA.unshift({id:Date.now()+'',name,name1,name2,type,meal,price:avgPrice,visits,gscore,addr,note,maps,date,score:starVal,visitLog,imgs,img,createdAt:Date.now()});
  }
  if(type) addCustomType(type);
  save(DATA); closeForm(); closeDetail(); render();
});

function starsHTMLDecimal(score){
  let h='';
  for(let i=1;i<=5;i++){
    const fill=Math.min(1,Math.max(0,score-(i-1)));
    const pct=Math.round(fill*100);
    h+=`<span style="position:relative;display:inline-block;font-size:18px;width:20px;">
      <span style="opacity:0.2;">⭐</span>
      <span style="position:absolute;left:0;top:0;clip-path:inset(0 ${100-pct}% 0 0);">⭐</span>
    </span>`;
  }
  return h;
}

function render(){
  let d=DATA.filter(r=>{
    if(typeFilterSet.size>0 && !typeFilterSet.has(r.type)) return false;
    if(!q) return true;
    return r.name.includes(q)||(r.name1||'').includes(q)||(r.name2||'').includes(q)||(r.addr||'').includes(q)||(r.note||'').includes(q);

  if(sortKey==='score-desc') d.sort((a,b)=>b.score-a.score);
  else if(sortKey==='score-asc') d.sort((a,b)=>a.score-b.score);
  else if(sortKey==='price-desc') d.sort((a,b)=>(b.price||0)-(a.price||0));
  else if(sortKey==='price-asc') d.sort((a,b)=>(a.price||99999)-(b.price||99999));
  else if(sortKey==='date-asc') d.sort((a,b)=>(a.date||'').localeCompare(b.date||''));

        bottom.innerHTML = `
          <div class="card-name">${line1}</div>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:2px;">
            <div class="card-name" style="font-size:12px;opacity:0.85;">${line2}</div>
            <div style="font-size:12px;font-weight:700;color:#FFD200;text-shadow:0 1px 6px rgba(0,0,0,0.8);white-space:nowrap;">${priceStr}</div>
          </div>`;
        card.appendChild(bottom);
      } else {
        const line1 = item.name1 || item.name || '';
        const line2 = item.name2 || '';
        const priceStr = (item.price != null && item.price !== '') ? 'NT$'+Number(item.price).toLocaleString() : '';
        card.innerHTML=`
          <div class="no-photo-icon">🍜</div>
          <div class="card-bottom">
            <div class="card-name">${line1}</div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:2px;">
              <div class="card-name" style="font-size:12px;opacity:0.85;">${line2}</div>
              <div style="font-size:12px;font-weight:700;color:#FFD200;text-shadow:0 1px 6px rgba(0,0,0,0.8);white-space:nowrap;">${priceStr}</div>
            </div>
          </div>`;
        card.appendChild(visitBadge);
        if(item.score>0) card.appendChild(scoreBadge);
      }
      card.addEventListener('click',()=>openDetail(item));
      grid.appendChild(card);
    });
  }

  // 統計（依篩選結果）
  document.getElementById('sTotal').textContent=d.length;
  if(d.length){
    const rated=d.filter(r=>r.score>0);
    document.getElementById('sAvg').textContent=rated.length?(rated.reduce((s,r)=>s+r.score,0)/rated.length).toFixed(1):'—';
    const grated=d.filter(r=>r.gscore>0);
    document.getElementById('sGAvg').textContent=grated.length?(grated.reduce((s,r)=>s+r.gscore,0)/grated.length).toFixed(1):'—';
    const totalVisits=d.reduce((s,r)=>s+(r.visits||1),0);
    document.getElementById('sTotalVisits').textContent=totalVisits;
    // 總消費：所有造訪記錄的金額加總
    let totalSpend=0, totalVisitCount=0;
    d.forEach(r=>{
      if(r.visitLog&&r.visitLog.length>0){
        r.visitLog.forEach(v=>{ if(v.price!=null && v.price!=='') { totalSpend+=Number(v.price); totalVisitCount++; } });
      } else if(r.price!=null && r.price!==''){
        totalSpend+=Number(r.price); totalVisitCount++;
      }
    });
    document.getElementById('sTotalSpend').textContent=totalSpend?'NT$'+totalSpend.toLocaleString():'—';
    document.getElementById('sAvgPrice').textContent=totalVisitCount?'NT$'+Math.round(totalSpend/totalVisitCount).toLocaleString():'—';
  } else {
    document.getElementById('sAvg').textContent='—';
    document.getElementById('sGAvg').textContent='—';
    document.getElementById('sTotalVisits').textContent='—';
    document.getElementById('sAvgPrice').textContent='—';
    document.getElementById('sTotalSpend').textContent='—';
  }
}

document.getElementById('searchInput').addEventListener('input', e=>{q=e.target.value; render();});
document.getElementById('sortSelect').addEventListener('change', e=>{sortKey=e.target.value; render();});
// 多選下拉開關
document.addEventListener('DOMContentLoaded',()=>{
  const btn=document.getElementById('typeFilterBtn');
  const dd=document.getElementById('typeFilterDropdown');
  if(btn&&dd){
    btn.addEventListener('click',e=>{ e.stopPropagation(); dd.style.display=dd.style.display==='none'?'block':'none'; });
    document.addEventListener('click',()=>{ dd.style.display='none'; });
    dd.addEventListener('click',e=>e.stopPropagation());
  }
});

}
