<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食記 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{color:#1A0A2E;background:#D4C8ED;min-height:100vh;font-family:'Space Mono',monospace;overflow-x:hidden;position:relative;}
  body::before{content:'';position:fixed;inset:0;
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(180,120,40,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(120,60,20,0.1) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 100%, rgba(80,30,10,0.15) 0%, transparent 40%);
    pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(180,140,60,0.015) 60px, rgba(180,140,60,0.015) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(180,140,60,0.015) 60px, rgba(180,140,60,0.015) 61px);
    pointer-events:none;z-index:0;}
  .bg-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .c1{width:500px;height:500px;background:radial-gradient(circle, rgba(200,150,50,0.07), transparent 70%);top:-100px;right:-80px;}
  .c2{width:350px;height:350px;background:radial-gradient(circle, rgba(150,80,20,0.06), transparent 70%);bottom:-80px;left:-60px;}
  .topnav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 48px;display:flex;justify-content:space-between;align-items:center;background:rgba(232,98,42,0.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1);}
  .logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#1A0A2E;text-decoration:none;letter-spacing:0.04em;}
  .logo em{font-style:italic;color:#2C1050;}
  nav{display:flex;flex-wrap:wrap;gap:8px;}
  nav a{padding:7px 16px;border:1px solid rgba(255,245,230,0.3);border-radius:99px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#1A0A2E;text-decoration:none;background:rgba(255,255,255,0.08);transition:background 0.2s;}
  nav a:hover,nav a.active{background:rgba(120,30,0,0.95);border-color:rgba(100,20,0,0.8);color:#ffffff;}
  .page-content{position:relative;z-index:10;max-width:1060px;margin:0 auto;padding:100px 48px 80px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,7vw,72px);font-weight:300;color:#1A0A2E;line-height:1;margin-bottom:6px;}
  .page-title em{font-style:italic;color:#2C1050;}
  .page-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(80,20,140,0.75);margin-bottom:32px;display:block;}

  /* 統計卡片 */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:36px;}
  .stat-card{background:rgba(180,140,60,0.07);border:1px solid rgba(180,140,60,0.12);border-radius:10px;padding:14px 16px;}
  .stat-label{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(80,20,140,0.7);margin-bottom:6px;}
  .stat-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#1A0A2E;}
  .stat-val em{font-style:italic;color:#5A1E8C;font-size:16px;}

  /* 篩選 */
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center;}
  .filter-input{flex:1;min-width:180px;background:rgba(180,140,60,0.06);border:1px solid rgba(180,140,60,0.2);border-radius:99px;padding:8px 16px;color:#1A0A2E;font-family:'Space Mono',monospace;font-size:11px;outline:none;}
  .filter-input::placeholder{color:rgba(80,20,140,0.6);}
  .filter-select{background:rgba(255,255,255,0.6);border:1px solid rgba(120,60,200,0.3);border-radius:99px;padding:8px 14px;color:#3A0870;font-family:'Space Mono',monospace;font-size:10px;outline:none;cursor:pointer;}
  .filter-select option{background:#EDE8F5;color:#2C1050;}
  .result-count{font-size:10px;color:rgba(80,20,140,0.65);letter-spacing:0.1em;margin-bottom:12px;}

  /* 表格 */
  .table-wrap{background:rgba(255,210,160,0.03);border:1px solid rgba(120,60,200,0.35);border-radius:12px;overflow:hidden;box-shadow:0 0 20px rgba(232,98,42,0.12),0 0 40px rgba(232,98,42,0.05);}
  .food-table{width:100%;border-collapse:collapse;}
  .food-table th{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(90,20,150,0.9);padding:12px 12px;border-bottom:1px solid rgba(120,60,200,0.3);text-align:left;background:rgba(232,98,42,0.07);white-space:nowrap;cursor:pointer;user-select:none;}
  .food-table th:hover{color:#5A1E8C;}
  .food-table td{padding:11px 12px;border-bottom:1px solid rgba(120,60,200,0.12);font-size:12px;color:#2A1040;vertical-align:middle;}
  .food-table tr:last-child td{border-bottom:none;}
  .food-table tr:hover td{background:rgba(232,98,42,0.09);}
  .name-cell{color:#1A0A2E;font-size:14px;font-weight:500;}
  .branch-cell{color:rgba(70,15,120,0.7);font-size:10px;margin-top:2px;}
  .type-badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;background:rgba(180,140,60,0.12);color:#5A1E8C;border:1px solid rgba(180,140,60,0.2);white-space:nowrap;}
  .score-badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:15px;font-weight:700;}
  .s-high{background:#E8622A;color:#1A0A2E;font-weight:800;}
  .s-plain{background:rgba(180,140,60,0.12);color:#4A1A7A;border:1px solid rgba(180,140,60,0.25);}
  .revisit-dot{display:inline-block;width:8px;height:8px;background:#E8622A;border-radius:50%;}
  .sub-scores{font-size:10px;color:rgba(70,15,120,0.75);display:flex;gap:6px;margin-top:2px;}
  .sub-score{white-space:nowrap;}
  .no-result{text-align:center;padding:48px 0;color:rgba(80,20,140,0.6);font-size:13px;letter-spacing:0.1em;}

  @media(max-width:700px){
    .topnav{padding:12px 20px;}
    .page-content{padding:88px 16px 60px;}
    nav a{padding:6px 10px;font-size:9px;}
    .stats{grid-template-columns:repeat(2,1fr);}
    .food-table th:nth-child(n+6),.food-table td:nth-child(n+6){display:none;}
  }

  /* ── 共用 Menubar ── */
  .global-menubar{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    height:28px;
    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;
    font-size:12px;color:rgba(255,255,255,0.92);
    letter-spacing:0.02em;
    font-family:'Space Mono',monospace;
  }
  .gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
  .gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
  .mb-menu{padding:0 6px;border-radius:4px;cursor:default;transition:background 0.15s;font-size:12px;}
  .mb-menu:hover{background:rgba(255,255,255,0.2);}

  /* ── 共用 Dock ── */
  .global-dock-wrap{
    position:fixed;bottom:0;left:50%;
    transform:translateX(-50%) translateY(calc(100% - 2px));
    z-index:9998;
    transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;
    opacity:0;
    padding-bottom:0;
  }
  .global-dock-wrap.visible{
    transform:translateX(-50%) translateY(-12px);
    opacity:1;
  }
  .global-dock{
    display:flex;align-items:flex-end;gap:8px;
    background:rgba(255,255,255,0.16);
    backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px 20px 0 0;
    padding:10px 14px 14px;
    box-shadow:0 -4px 30px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .gd-item{
    display:flex;flex-direction:column;align-items:center;
    gap:3px;text-decoration:none;position:relative;cursor:pointer;
  }
  .gd-icon{
    width:52px;height:52px;border-radius:13px;
    display:flex;align-items:center;justify-content:center;
    font-size:26px;
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 3px 12px rgba(0,0,0,0.28);
  }
  .gd-item:hover .gd-icon{transform:translateY(-10px) scale(1.22);}
  .gd-label{
    font-size:9px;letter-spacing:0.05em;color:rgba(255,255,255,0.8);
    text-transform:uppercase;opacity:0;transition:opacity 0.15s;
    white-space:nowrap;background:rgba(0,0,0,0.6);
    padding:2px 6px;border-radius:4px;
    position:absolute;bottom:-20px;
    font-family:'Space Mono',monospace;
  }
  .gd-item:hover .gd-label{opacity:1;}
  .gd-sep{width:1px;height:40px;background:rgba(255,255,255,0.2);margin:0 3px;align-self:center;}
  .gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
  .ic-about  {background:linear-gradient(135deg,#667eea,#764ba2);}
  .ic-photos {background:linear-gradient(135deg,#f093fb,#f5576c);}
  .ic-dramas {background:linear-gradient(135deg,#1a1a2e,#e8622a);}
  .ic-food   {background:linear-gradient(135deg,#f7971e,#ffd200);}
  .ic-travel {background:linear-gradient(135deg,#0f2027,#2c5364);}
  .ic-threads{background:linear-gradient(135deg,#111,#333);}
  /* 底部觸發區 */
  .dock-trigger-zone{
    position:fixed;bottom:0;left:0;right:0;height:8px;z-index:999;
  }

</style>
  /* ── 全域 Menubar ── */

function sc(s){
  if(s>=4.5) return 's-high';
  return 's-plain';
}
function fmt(v){return v>0?v.toFixed(1):'—';}

let q='', fType='', fCity='', fYear='', sort='score-desc';

function render(){
  let data=DATA.filter(r=>{
    if(q&&!r.name.includes(q)&&!r.display.includes(q)&&!r.addr.includes(q)) return false;
    if(fType&&r.type!==fType) return false;
    if(fCity&&r.city!==fCity) return false;
    if(fYear&&String(r.year)!==fYear) return false;
    return true;
  });
  data.sort((a,b)=>{
    if(sort==='score-desc') return b.score-a.score;
    if(sort==='score-asc') return a.score-b.score;
    if(sort==='price-desc') return b.price-a.price;
    if(sort==='price-asc') return (a.price||99999)-(b.price||99999);
    if(sort==='year-desc') return b.year-a.year;
    return 0;
  });

  const tbody=document.getElementById('foodBody');
  tbody.innerHTML='';
  document.getElementById('noResult').style.display=data.length===0?'block':'none';

  data.forEach(r=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>
        <div class="name-cell">${r.name}</div>
        ${r.branch?`<div class="branch-cell">${r.branch}</div>`:''}
      </td>
      <td><span class="type-badge">${r.type}</span></td>
      <td style="font-size:11px;color:#3A0870;font-weight:600;white-space:nowrap">${r.city}${r.district?'・'+r.district:''}</td>
      <td><span class="score-badge ${sc(r.score)}">${r.score>0?r.score.toFixed(2):'—'}</span></td>
      <td style="color:#1565C0;font-size:15px;text-align:center;font-weight:700;letter-spacing:0.02em">${r.google>0?r.google.toFixed(1):'—'}</td>
      <td style="color:#2C1050;font-size:12px;text-align:center;font-weight:600">${fmt(r.taste)}</td>
      <td style="color:#2C1050;font-size:12px;text-align:center;font-weight:600">${fmt(r.env)}</td>
      <td style="color:#2C1050;font-size:12px;text-align:center;font-weight:600">${fmt(r.service)}</td>
      <td style="color:#1A0A2E;font-size:11px;text-align:center;font-weight:700">${r.price>0?'NT$'+r.price.toLocaleString():'—'}</td>
      <td style="color:#2C1050;font-size:11px;font-weight:600">${r.year>0?r.year:'—'}</td>
      <td style="text-align:center">${r.revisit>0?`<span class="revisit-dot" title="已再訪${r.revisit}次"></span>`:''}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('resultCount').textContent=`顯示 ${data.length} / ${DATA.length} 筆`;

  // 統計
  const total=DATA.length;
  const avg=(DATA.reduce((s,r)=>s+r.score,0)/total).toFixed(2);
  const best=DATA.reduce((a,b)=>b.score>a.score?b:a,DATA[0]);
  const revisit=DATA.filter(r=>r.revisit>0).length;
  document.getElementById('sTotal').textContent=total+' 家';
  document.getElementById('sAvg').textContent=avg;
  document.getElementById('sBest').innerHTML=best.score.toFixed(2)+'<em> '+best.name+'</em>';
  document.getElementById('sRevisit').textContent=revisit+' 家';
}

document.getElementById('searchInput').addEventListener('input',e=>{q=e.target.value;render();});
document.getElementById('typeSelect').addEventListener('change',e=>{fType=e.target.value;render();});
document.getElementById('citySelect').addEventListener('change',e=>{fCity=e.target.value;render();});
document.getElementById('yearSelect').addEventListener('change',e=>{fYear=e.target.value;render();});
document.getElementById('sortSelect').addEventListener('change',e=>{sort=e.target.value;render();});

render();
</script>

<script>
// 時鐘
(function(){
  function updateTime(){
    var el=document.getElementById('gmbTime');
    if(!el) return;
    var now=new Date();
    var d=['日','一','二','三','四','五','六'][now.getDay()];
    var h=String(now.getHours()).padStart(2,'0');
    var m=String(now.getMinutes()).padStart(2,'0');
    el.textContent='週'+d+' '+now.getMonth()+'/'+(now.getDate())+' '+h+':'+m;
  }
  updateTime();
  setInterval(updateTime,10000);
})();

// Dock 自動隱藏
(function(){
  var dock=document.getElementById('globalDock');
  var trigger=document.getElementById('dockTrigger');
  if(!dock||!trigger) return;
  var hideTimer;
  function showDock(){
    clearTimeout(hideTimer);
    dock.classList.add('visible');
  }
  function hideDock(){
    hideTimer=setTimeout(function(){dock.classList.remove('visible');},600);
  }
  trigger.addEventListener('mouseenter',showDock);
  dock.addEventListener('mouseenter',function(){clearTimeout(hideTimer);dock.classList.add('visible');});
  dock.addEventListener('mouseleave',hideDock);
})();
</script>
