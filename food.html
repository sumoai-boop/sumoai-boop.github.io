<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食記 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#1a1008;min-height:100vh;font-family:'Space Mono',monospace;overflow-x:hidden;position:relative;}
  body::before{content:'';position:fixed;inset:0;
    background-image:
      radial-gradient(ellipse at 20% 30%, rgba(180,120,40,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(120,60,20,0.1) 0%, transparent 45%),
      radial-gradient(ellipse at 50% 100%, rgba(80,30,10,0.15) 0%, transparent 40%);
    pointer-events:none;z-index:0;}
  body::after{content:'';position:fixed;inset:0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(180,140,60,0.015) 60px, rgba(180,140,60,0.015) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(180,140,60,0.015) 60px, rgba(180,140,60,0.015) 61px);
    pointer-events:none;z-index:0;}
  .bg-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .c1{width:500px;height:500px;background:radial-gradient(circle, rgba(200,150,50,0.07), transparent 70%);top:-100px;right:-80px;}
  .c2{width:350px;height:350px;background:radial-gradient(circle, rgba(150,80,20,0.06), transparent 70%);bottom:-80px;left:-60px;}

  /* ── 頂部導覽 ── */
  .topnav{position:fixed;top:28px;left:0;right:0;z-index:100;padding:16px 48px;display:flex;justify-content:space-between;align-items:center;background:rgba(232,98,42,0.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1);}
  .logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#FFF5E6;text-decoration:none;letter-spacing:0.04em;}
  .logo em{font-style:italic;color:#FFD4A8;}
  nav{display:flex;flex-wrap:wrap;gap:8px;}
  nav a{padding:7px 16px;border:1px solid rgba(255,245,230,0.3);border-radius:99px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#FFF5E6;text-decoration:none;background:rgba(255,255,255,0.08);transition:background 0.2s;}
  nav a:hover,nav a.active{background:rgba(120,30,0,0.95);border-color:rgba(100,20,0,0.8);color:#fff;}

  /* ── 主內容 ── */
  .page-content{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:108px 32px 100px;}

  .page-header{margin-bottom:28px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,64px);font-weight:300;color:#F5E6C0;line-height:1;margin-bottom:4px;}
  .page-title em{font-style:italic;color:#FFD4A8;}
  .page-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(200,170,100,0.5);display:block;margin-bottom:20px;}

  /* ── 統計列 ── */
  .stats-row{display:flex;gap:24px;margin-bottom:28px;flex-wrap:wrap;}
  .stat-item{display:flex;flex-direction:column;gap:2px;}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:#F5E6C0;line-height:1;}
  .stat-lbl{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(200,170,100,0.45);}
  .stat-sep{width:1px;background:rgba(200,170,100,0.15);align-self:stretch;margin:4px 0;}

  /* ── 工具列 ── */
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:20px;flex-wrap:wrap;}
  .search-wrap{flex:1;min-width:180px;position:relative;}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:0.4;pointer-events:none;}
  .search-input{width:100%;background:rgba(180,140,60,0.06);border:1px solid rgba(180,140,60,0.2);border-radius:99px;padding:8px 16px 8px 36px;color:#F5E6C0;font-family:'Space Mono',monospace;font-size:11px;outline:none;transition:border-color 0.2s;}
  .search-input::placeholder{color:rgba(200,170,100,0.3);}
  .search-input:focus{border-color:rgba(232,98,42,0.5);}
  .sort-select{background:rgba(180,140,60,0.06);border:1px solid rgba(180,140,60,0.2);border-radius:99px;padding:8px 14px;color:#F5E6C0;font-family:'Space Mono',monospace;font-size:10px;outline:none;cursor:pointer;}
  .sort-select option{background:#1a1008;}
  .count-badge{font-size:10px;color:rgba(200,170,100,0.4);letter-spacing:0.08em;white-space:nowrap;align-self:center;}

  /* ── 新增按鈕 ── */
  .add-btn{
    width:46px;height:46px;border-radius:50%;
    background:linear-gradient(135deg,#E8622A,#FFD200);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    font-size:22px;color:#1a0800;font-weight:700;
    box-shadow:0 4px 20px rgba(232,98,42,0.45);
    transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s;
    flex-shrink:0;
  }
  .add-btn:hover{transform:scale(1.12);box-shadow:0 6px 28px rgba(232,98,42,0.6);}

  /* ── IG 照片牆 ── */
  .photo-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:3px;
  }
  .photo-card{
    position:relative;
    aspect-ratio:1/1;
    overflow:hidden;
    cursor:pointer;
    background:rgba(180,140,60,0.06);
    border:1px solid rgba(180,140,60,0.08);
  }
  .photo-card img{
    width:100%;height:100%;
    object-fit:cover;
    transition:transform 0.4s ease;
    display:block;
  }
  .photo-card:hover img{transform:scale(1.06);}
  .photo-card .overlay{
    position:absolute;inset:0;
    background:linear-gradient(to top, rgba(15,8,0,0.9) 0%, rgba(15,8,0,0.3) 50%, transparent 100%);
    opacity:0;
    transition:opacity 0.3s ease;
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:14px;
  }
  .photo-card:hover .overlay{opacity:1;}
  .overlay-name{font-size:13px;font-weight:700;color:#FFF5E6;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .overlay-meta{display:flex;gap:10px;align-items:center;}
  .overlay-price{font-size:10px;color:#FFD200;}
  .overlay-stars{display:flex;gap:2px;}
  .overlay-stars span{font-size:11px;}

  /* 無照片佔位 */
  .photo-card.no-photo{
    background:rgba(180,140,60,0.04);
    display:flex;align-items:center;justify-content:center;
  }
  .no-photo-icon{font-size:32px;opacity:0.18;}

  /* 空狀態 */
  .empty-state{
    grid-column:1/-1;
    padding:80px 0;
    display:flex;flex-direction:column;align-items:center;gap:12px;
  }
  .empty-icon{font-size:48px;opacity:0.2;}
  .empty-text{font-size:12px;color:rgba(200,170,100,0.3);letter-spacing:0.12em;text-transform:uppercase;}

  /* ── 詳情 Modal ── */
  .modal-mask{
    position:fixed;inset:0;z-index:9000;
    background:rgba(0,0,0,0.85);
    display:none;align-items:center;justify-content:center;
    padding:24px;
    backdrop-filter:blur(6px);
  }
  .modal-mask.open{display:flex;}
  .modal{
    background:#1e1205;
    border:1px solid rgba(232,98,42,0.3);
    border-radius:16px;
    max-width:520px;width:100%;
    overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.7),0 0 0 1px rgba(180,140,60,0.1);
    animation:modalIn 0.28s cubic-bezier(0.34,1.2,0.64,1);
  }
  @keyframes modalIn{from{opacity:0;transform:scale(0.92) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:rgba(180,140,60,0.04);}
  .modal-img-placeholder{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:rgba(180,140,60,0.04);font-size:56px;opacity:0.15;}
  .modal-body{padding:20px 24px 24px;}
  .modal-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:#F5E6C0;margin-bottom:4px;}
  .modal-addr{font-size:10px;color:rgba(200,170,100,0.5);letter-spacing:0.06em;margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .modal-addr svg{opacity:0.4;flex-shrink:0;}
  .modal-row{display:flex;gap:16px;margin-bottom:6px;align-items:center;}
  .modal-price{font-family:'Cormorant Garamond',serif;font-size:22px;color:#FFD200;font-weight:600;}
  .modal-price-lbl{font-size:9px;color:rgba(200,170,100,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-left:4px;align-self:flex-end;margin-bottom:3px;}
  .modal-stars{display:flex;gap:3px;margin-left:auto;}
  .modal-stars span{font-size:18px;}
  .modal-score-num{font-family:'Cormorant Garamond',serif;font-size:18px;color:rgba(200,170,100,0.7);margin-left:6px;align-self:center;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-btn{flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.06em;transition:background 0.2s;}
  .modal-btn-edit{background:rgba(180,140,60,0.12);color:#C9A84C;border:1px solid rgba(180,140,60,0.25);}
  .modal-btn-edit:hover{background:rgba(180,140,60,0.22);}
  .modal-btn-del{background:rgba(200,50,30,0.1);color:#E87060;border:1px solid rgba(200,50,30,0.2);}
  .modal-btn-del:hover{background:rgba(200,50,30,0.2);}
  .modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.5);border:none;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;z-index:1;}

  /* ── 新增/編輯 Modal ── */
  .form-modal{
    background:#1e1205;
    border:1px solid rgba(232,98,42,0.35);
    border-radius:16px;
    max-width:460px;width:100%;
    overflow:hidden;
    box-shadow:0 24px 80px rgba(0,0,0,0.7);
    animation:modalIn 0.28s cubic-bezier(0.34,1.2,0.64,1);
  }
  .form-header{
    padding:18px 24px;
    border-bottom:1px solid rgba(180,140,60,0.1);
    display:flex;align-items:center;justify-content:space-between;
  }
  .form-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:#F5E6C0;font-weight:600;}
  .form-body{padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px;max-height:70vh;overflow-y:auto;}

  /* 圖片上傳 */
  .img-upload-area{
    width:100%;aspect-ratio:4/3;border:2px dashed rgba(180,140,60,0.25);border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;position:relative;overflow:hidden;background:rgba(180,140,60,0.03);
    transition:border-color 0.2s;
  }
  .img-upload-area:hover{border-color:rgba(232,98,42,0.45);}
  .img-upload-area img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .img-upload-label{font-size:11px;color:rgba(200,170,100,0.4);letter-spacing:0.08em;text-transform:uppercase;position:relative;z-index:1;}
  .img-upload-icon{font-size:28px;opacity:0.3;position:relative;z-index:1;}
  .img-upload-input{display:none;}
  .img-clear{position:absolute;top:8px;right:8px;z-index:2;background:rgba(0,0,0,0.6);border:none;border-radius:50%;width:26px;height:26px;color:#fff;cursor:pointer;font-size:14px;display:none;align-items:center;justify-content:center;}

  .field-group{display:flex;flex-direction:column;gap:5px;}
  .field-label{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(200,170,100,0.45);}
  .field-input{background:rgba(180,140,60,0.06);border:1px solid rgba(180,140,60,0.18);border-radius:8px;padding:10px 12px;color:#F5E6C0;font-family:'Space Mono',monospace;font-size:12px;outline:none;transition:border-color 0.2s;width:100%;}
  .field-input:focus{border-color:rgba(232,98,42,0.5);}
  .field-input::placeholder{color:rgba(200,170,100,0.25);}

  /* 星等選擇 */
  .stars-pick{display:flex;gap:6px;}
  .star-btn{font-size:22px;background:none;border:none;cursor:pointer;opacity:0.25;transition:opacity 0.15s,transform 0.15s;}
  .star-btn.active{opacity:1;}
  .star-btn:hover{transform:scale(1.2);}

  .form-footer{padding:0 24px 20px;display:flex;gap:10px;}
  .btn-cancel{flex:1;padding:11px;border-radius:8px;background:rgba(180,140,60,0.08);border:1px solid rgba(180,140,60,0.2);color:#C9A84C;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;}
  .btn-save{flex:2;padding:11px;border-radius:8px;background:linear-gradient(135deg,#E8622A,#c84a15);border:none;color:#fff;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;font-weight:700;letter-spacing:0.06em;transition:opacity 0.2s;}
  .btn-save:hover{opacity:0.88;}

  /* ── 共用 Menubar ── */
  .global-menubar{
    position:fixed;top:0;left:0;right:0;z-index:9999;height:28px;
    background:rgba(0,0,0,0.55);backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;font-size:12px;color:rgba(255,255,255,0.92);letter-spacing:0.02em;
    font-family:'Space Mono',monospace;
  }
  .gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
  .gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
  .mb-menu{padding:0 6px;border-radius:4px;cursor:default;transition:background 0.15s;font-size:12px;}
  .mb-menu:hover{background:rgba(255,255,255,0.2);}

  /* ── 共用 Dock ── */
  .global-dock-wrap{
    position:fixed;bottom:0;left:50%;
    transform:translateX(-50%) translateY(calc(100% - 2px));
    z-index:9998;transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1), opacity 0.3s;opacity:0;
  }
  .global-dock-wrap.visible{transform:translateX(-50%) translateY(-12px);opacity:1;}
  .global-dock{
    display:flex;align-items:flex-end;gap:8px;
    background:rgba(255,255,255,0.16);backdrop-filter:blur(28px) saturate(180%);
    -webkit-backdrop-filter:blur(28px) saturate(180%);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:20px 20px 0 0;padding:10px 14px 14px;
    box-shadow:0 -4px 30px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .gd-item{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;position:relative;cursor:pointer;}
  .gd-icon{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:26px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 3px 12px rgba(0,0,0,0.28);}
  .gd-item:hover .gd-icon{transform:translateY(-10px) scale(1.22);}
  .gd-label{font-size:9px;letter-spacing:0.05em;color:rgba(255,255,255,0.8);text-transform:uppercase;opacity:0;transition:opacity 0.15s;white-space:nowrap;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;position:absolute;bottom:-20px;font-family:'Space Mono',monospace;}
  .gd-item:hover .gd-label{opacity:1;}
  .gd-sep{width:1px;height:40px;background:rgba(255,255,255,0.2);margin:0 3px;align-self:center;}
  .gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
  .ic-about{background:linear-gradient(135deg,#667eea,#764ba2);}
  .ic-photos{background:linear-gradient(135deg,#f093fb,#f5576c);}
  .ic-dramas{background:linear-gradient(135deg,#1a1a2e,#e8622a);}
  .ic-food{background:linear-gradient(135deg,#f7971e,#ffd200);}
  .ic-travel{background:linear-gradient(135deg,#0f2027,#2c5364);}
  .ic-threads{background:linear-gradient(135deg,#111,#333);}
  .dock-trigger-zone{position:fixed;bottom:0;left:0;right:0;height:8px;z-index:999;}

  @media(max-width:700px){
    .topnav{padding:12px 20px;}
    .page-content{padding:96px 12px 80px;}
    nav a{padding:6px 10px;font-size:9px;}
    .photo-grid{grid-template-columns:repeat(3,1fr);gap:2px;}
  }
  @media(max-width:480px){
    .photo-grid{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>
<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<!-- Global Menubar -->
<div class="global-menubar">
  <div class="gm-left">
    <span class="mb-menu" style="font-size:14px;">🍜</span>
    <span class="mb-menu">食記</span>
    <span class="mb-menu">檔案</span>
    <span class="mb-menu">編輯</span>
    <span class="mb-menu">顯示</span>
    <span class="mb-menu">說明</span>
  </div>
  <div class="gm-right">
    <span id="gmbTime">--</span>
  </div>
</div>

<!-- Topnav -->
<header class="topnav">
  <a class="logo" href="about.html">Sumoai's <em>Reel</em></a>
  <nav>
    <a href="about.html">關於</a>
    <a href="photos.html">照片</a>
    <a href="dramas.html">追劇</a>
    <a href="food.html" class="active">食記</a>
    <a href="travel.html">旅遊</a>
  </nav>
</header>

<!-- Main -->
<main class="page-content">
  <div class="page-header">
    <h1 class="page-title"><em>Food</em> Diary</h1>
    <span class="page-label">每一口都值得記憶</span>
    <div class="stats-row" id="statsRow">
      <div class="stat-item">
        <div class="stat-num" id="sTotal">0</div>
        <div class="stat-lbl">家餐廳</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sAvg">—</div>
        <div class="stat-lbl">平均評分</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sBest">—</div>
        <div class="stat-lbl">最高評分</div>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <div class="stat-num" id="sAvgPrice">—</div>
        <div class="stat-lbl">平均消費</div>
      </div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" placeholder="搜尋餐廳名稱或地址…" type="text">
    </div>
    <select class="sort-select" id="sortSelect">
      <option value="new">最新新增</option>
      <option value="score-desc">評分最高</option>
      <option value="score-asc">評分最低</option>
      <option value="price-desc">消費最高</option>
      <option value="price-asc">消費最低</option>
    </select>
    <span class="count-badge" id="countBadge">0 家</span>
    <button class="add-btn" id="addBtn" title="新增食記">＋</button>
  </div>

  <!-- Photo Grid -->
  <div class="photo-grid" id="photoGrid"></div>
</main>

<!-- 詳情 Modal -->
<div class="modal-mask" id="detailMask">
  <div class="modal" style="position:relative;" id="detailModal">
    <button class="modal-close" id="detailClose">✕</button>
    <div id="detailImgWrap"></div>
    <div class="modal-body">
      <div class="modal-title" id="dName"></div>
      <div class="modal-addr" id="dAddr">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="dAddrText"></span>
      </div>
      <div class="modal-row">
        <span class="modal-price" id="dPrice"></span>
        <span class="modal-price-lbl">元</span>
        <div class="modal-stars" id="dStars"></div>
        <span class="modal-score-num" id="dScoreNum"></span>
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-edit" id="dEdit">✏️ 編輯</button>
        <button class="modal-btn modal-btn-del" id="dDel">🗑 刪除</button>
      </div>
    </div>
  </div>
</div>

<!-- 新增/編輯 Modal -->
<div class="modal-mask" id="formMask">
  <div class="form-modal">
    <div class="form-header">
      <span class="form-title" id="formTitle">新增食記</span>
      <button class="modal-close" style="position:static;background:rgba(180,140,60,0.1);color:#C9A84C;" id="formClose">✕</button>
    </div>
    <div class="form-body">
      <!-- 圖片 -->
      <div class="img-upload-area" id="uploadArea">
        <span class="img-upload-icon">📷</span>
        <span class="img-upload-label">點擊上傳照片</span>
        <img id="previewImg" src="" alt="" style="display:none;">
        <button class="img-clear" id="imgClear">✕</button>
        <input class="img-upload-input" type="file" accept="image/*" id="imgInput">
      </div>
      <!-- 名稱 -->
      <div class="field-group">
        <label class="field-label">餐廳名稱 *</label>
        <input class="field-input" id="fName" placeholder="輸入餐廳名稱">
      </div>
      <!-- 金額 -->
      <div class="field-group">
        <label class="field-label">平均消費（元）</label>
        <input class="field-input" id="fPrice" type="number" min="0" placeholder="例：350">
      </div>
      <!-- 地址 -->
      <div class="field-group">
        <label class="field-label">地址</label>
        <input class="field-input" id="fAddr" placeholder="例：台北市大安區忠孝東路四段">
      </div>
      <!-- 評分 -->
      <div class="field-group">
        <label class="field-label">評分</label>
        <div class="stars-pick" id="starsPick">
          <button class="star-btn" data-v="1">⭐</button>
          <button class="star-btn" data-v="2">⭐</button>
          <button class="star-btn" data-v="3">⭐</button>
          <button class="star-btn" data-v="4">⭐</button>
          <button class="star-btn" data-v="5">⭐</button>
        </div>
      </div>
    </div>
    <div class="form-footer">
      <button class="btn-cancel" id="formCancel">取消</button>
      <button class="btn-save" id="formSave">儲存食記</button>
    </div>
  </div>
</div>

<!-- Dock Trigger -->
<div class="dock-trigger-zone" id="dockTrigger"></div>

<!-- Global Dock -->
<div class="global-dock-wrap" id="globalDock">
  <div class="global-dock">
    <a href="about.html" class="gd-item"><div class="gd-icon ic-about">👤</div><span class="gd-label">關於</span></a>
    <a href="photos.html" class="gd-item"><div class="gd-icon ic-photos">📷</div><span class="gd-label">照片</span></a>
    <a href="dramas.html" class="gd-item"><div class="gd-icon ic-dramas">🎬</div><span class="gd-label">追劇</span></a>
    <a href="food.html" class="gd-item"><div class="gd-icon ic-food">🍜</div><span class="gd-label">食記</span><div class="gd-dot"></div></a>
    <div class="gd-sep"></div>
    <a href="travel.html" class="gd-item"><div class="gd-icon ic-travel">✈️</div><span class="gd-label">旅遊足跡</span></a>
    <a href="threads.html" class="gd-item"><div class="gd-icon ic-threads">🧵</div><span class="gd-label">Threads</span></a>
    <a href="uber.html" class="gd-item"><div class="gd-icon" style="background:linear-gradient(135deg,#222,#000)">🚗</div><span class="gd-label">Uber</span></a>
  </div>
</div>

<script>
/* ───── localStorage key ───── */
const STORE = 'sumoai_food_v2';

function load(){ try{ return JSON.parse(localStorage.getItem(STORE)||'[]'); }catch(e){return [];} }
function save(d){ localStorage.setItem(STORE, JSON.stringify(d)); }

let DATA = load();
let currentId = null;  // 正在查看/編輯的項目 id
let editMode = false;
let starVal = 0;
let q = '', sortKey = 'new';

/* ───── 星等 ───── */
function renderStarPick(v){
  document.querySelectorAll('#starsPick .star-btn').forEach(btn=>{
    btn.classList.toggle('active', parseInt(btn.dataset.v) <= v);
  });
}
document.querySelectorAll('#starsPick .star-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    starVal = parseInt(btn.dataset.v);
    renderStarPick(starVal);
  });
});

/* ───── 圖片上傳 ───── */
const uploadArea = document.getElementById('uploadArea');
const imgInput   = document.getElementById('imgInput');
const previewImg = document.getElementById('previewImg');
const imgClear   = document.getElementById('imgClear');

uploadArea.addEventListener('click', e=>{
  if(e.target === imgClear) return;
  imgInput.click();
});
imgInput.addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    previewImg.src = ev.target.result;
    previewImg.style.display = 'block';
    imgClear.style.display = 'flex';
    uploadArea.querySelector('.img-upload-icon').style.display='none';
    uploadArea.querySelector('.img-upload-label').style.display='none';
  };
  reader.readAsDataURL(file);
});
imgClear.addEventListener('click', e=>{
  e.stopPropagation();
  previewImg.src=''; previewImg.style.display='none';
  imgClear.style.display='none';
  uploadArea.querySelector('.img-upload-icon').style.display='';
  uploadArea.querySelector('.img-upload-label').style.display='';
  imgInput.value='';
});

/* ───── 表單 Modal ───── */
function openForm(item=null){
  editMode = !!item;
  currentId = item ? item.id : null;
  document.getElementById('formTitle').textContent = item ? '編輯食記' : '新增食記';
  document.getElementById('fName').value = item ? item.name : '';
  document.getElementById('fPrice').value = item && item.price ? item.price : '';
  document.getElementById('fAddr').value = item ? item.addr : '';
  starVal = item ? item.score : 0;
  renderStarPick(starVal);
  // 圖片
  if(item && item.img){
    previewImg.src = item.img;
    previewImg.style.display='block';
    imgClear.style.display='flex';
    uploadArea.querySelector('.img-upload-icon').style.display='none';
    uploadArea.querySelector('.img-upload-label').style.display='none';
  } else {
    previewImg.src=''; previewImg.style.display='none';
    imgClear.style.display='none';
    uploadArea.querySelector('.img-upload-icon').style.display='';
    uploadArea.querySelector('.img-upload-label').style.display='';
  }
  imgInput.value='';
  document.getElementById('formMask').classList.add('open');
}
function closeForm(){
  document.getElementById('formMask').classList.remove('open');
}
document.getElementById('addBtn').addEventListener('click', ()=>openForm());
document.getElementById('formClose').addEventListener('click', closeForm);
document.getElementById('formCancel').addEventListener('click', closeForm);
document.getElementById('formMask').addEventListener('click', e=>{
  if(e.target===document.getElementById('formMask')) closeForm();
});

document.getElementById('formSave').addEventListener('click', ()=>{
  const name = document.getElementById('fName').value.trim();
  if(!name){ alert('請輸入餐廳名稱'); return; }
  const price = parseInt(document.getElementById('fPrice').value)||0;
  const addr  = document.getElementById('fAddr').value.trim();
  const img   = previewImg.style.display!=='none' ? previewImg.src : '';

  if(editMode && currentId){
    const idx = DATA.findIndex(r=>r.id===currentId);
    if(idx>=0){
      DATA[idx] = {...DATA[idx], name, price, addr, score:starVal, img, updatedAt:Date.now()};
    }
  } else {
    DATA.unshift({id:Date.now()+'', name, price, addr, score:starVal, img, createdAt:Date.now()});
  }
  save(DATA);
  closeForm();
  closeDetail();
  render();
});

/* ───── 詳情 Modal ───── */
function openDetail(item){
  currentId = item.id;
  document.getElementById('dName').textContent = item.name;
  document.getElementById('dAddrText').textContent = item.addr || '未填寫地址';
  document.getElementById('dPrice').textContent = item.price ? 'NT$'+item.price.toLocaleString() : '—';
  // 星星
  const starsEl = document.getElementById('dStars');
  starsEl.innerHTML = '';
  for(let i=1;i<=5;i++){
    const s = document.createElement('span');
    s.textContent='⭐';
    s.style.opacity = i<=item.score ? '1' : '0.15';
    starsEl.appendChild(s);
  }
  document.getElementById('dScoreNum').textContent = item.score ? item.score+'.0' : '未評分';
  // 圖片
  const wrap = document.getElementById('detailImgWrap');
  if(item.img){
    wrap.innerHTML = `<img class="modal-img" src="${item.img}" alt="${item.name}">`;
  } else {
    wrap.innerHTML = `<div class="modal-img-placeholder">🍜</div>`;
  }
  document.getElementById('detailMask').classList.add('open');
}
function closeDetail(){
  document.getElementById('detailMask').classList.remove('open');
}
document.getElementById('detailClose').addEventListener('click', closeDetail);
document.getElementById('detailMask').addEventListener('click', e=>{
  if(e.target===document.getElementById('detailMask')) closeDetail();
});
document.getElementById('dEdit').addEventListener('click', ()=>{
  const item = DATA.find(r=>r.id===currentId);
  if(!item) return;
  closeDetail();
  setTimeout(()=>openForm(item), 120);
});
document.getElementById('dDel').addEventListener('click', ()=>{
  if(!confirm('確定要刪除這筆食記？')) return;
  DATA = DATA.filter(r=>r.id!==currentId);
  save(DATA);
  closeDetail();
  render();
});

/* ───── 渲染照片牆 ───── */
function starsHTML(score){
  let h='';
  for(let i=1;i<=5;i++) h+=`<span style="opacity:${i<=score?1:0.2};font-size:11px">⭐</span>`;
  return h;
}

function render(){
  let d = DATA.filter(r=>{
    if(!q) return true;
    return r.name.includes(q)||(r.addr||'').includes(q);
  });
  if(sortKey==='score-desc') d.sort((a,b)=>b.score-a.score);
  else if(sortKey==='score-asc') d.sort((a,b)=>a.score-b.score);
  else if(sortKey==='price-desc') d.sort((a,b)=>(b.price||0)-(a.price||0));
  else if(sortKey==='price-asc') d.sort((a,b)=>(a.price||99999)-(b.price||99999));
  else d.sort((a,b)=>b.createdAt-a.createdAt);

  document.getElementById('countBadge').textContent = d.length + ' 家';

  const grid = document.getElementById('photoGrid');
  grid.innerHTML='';

  if(d.length===0){
    const empty = document.createElement('div');
    empty.className='empty-state';
    empty.innerHTML=`<div class="empty-icon">🍴</div><div class="empty-text">還沒有食記，點「＋」開始記錄第一家吧！</div>`;
    grid.appendChild(empty);
  } else {
    d.forEach(item=>{
      const card = document.createElement('div');
      card.className = 'photo-card' + (item.img ? '' : ' no-photo');
      if(item.img){
        card.innerHTML=`
          <img src="${item.img}" alt="${item.name}" loading="lazy">
          <div class="overlay">
            <div class="overlay-name">${item.name}</div>
            <div class="overlay-meta">
              <span class="overlay-price">${item.price?'NT$'+item.price.toLocaleString():'—'}</span>
              <div class="overlay-stars">${starsHTML(item.score)}</div>
            </div>
          </div>`;
      } else {
        card.innerHTML=`
          <div class="no-photo-icon">🍜</div>
          <div class="overlay">
            <div class="overlay-name">${item.name}</div>
            <div class="overlay-meta">
              <span class="overlay-price">${item.price?'NT$'+item.price.toLocaleString():'—'}</span>
              <div class="overlay-stars">${starsHTML(item.score)}</div>
            </div>
          </div>`;
      }
      card.addEventListener('click', ()=>openDetail(item));
      grid.appendChild(card);
    });
  }

  // 統計
  const all = DATA;
  document.getElementById('sTotal').textContent = all.length;
  if(all.length){
    const rated = all.filter(r=>r.score>0);
    document.getElementById('sAvg').textContent = rated.length ? (rated.reduce((s,r)=>s+r.score,0)/rated.length).toFixed(1) : '—';
    const best = all.reduce((a,b)=>b.score>a.score?b:a, all[0]);
    document.getElementById('sBest').textContent = best.score ? best.score+'.0' : '—';
    const priced = all.filter(r=>r.price>0);
    document.getElementById('sAvgPrice').textContent = priced.length ? 'NT$'+Math.round(priced.reduce((s,r)=>s+r.price,0)/priced.length).toLocaleString() : '—';
  } else {
    document.getElementById('sAvg').textContent='—';
    document.getElementById('sBest').textContent='—';
    document.getElementById('sAvgPrice').textContent='—';
  }
}

document.getElementById('searchInput').addEventListener('input', e=>{q=e.target.value; render();});
document.getElementById('sortSelect').addEventListener('change', e=>{sortKey=e.target.value; render();});

render();

/* ───── 時鐘 ───── */
(function(){
  function updateTime(){
    var el=document.getElementById('gmbTime');
    if(!el) return;
    var now=new Date();
    var d=['日','一','二','三','四','五','六'][now.getDay()];
    var h=String(now.getHours()).padStart(2,'0');
    var m=String(now.getMinutes()).padStart(2,'0');
    el.textContent='週'+d+' '+now.getMonth()+'/'+(now.getDate())+' '+h+':'+m;
  }
  updateTime(); setInterval(updateTime,10000);
})();

/* ───── Dock ───── */
(function(){
  var dock=document.getElementById('globalDock');
  var trigger=document.getElementById('dockTrigger');
  if(!dock||!trigger) return;
  var hideTimer;
  function showDock(){clearTimeout(hideTimer);dock.classList.add('visible');}
  function hideDock(){hideTimer=setTimeout(function(){dock.classList.remove('visible');},600);}
  trigger.addEventListener('mouseenter',showDock);
  dock.addEventListener('mouseenter',function(){clearTimeout(hideTimer);dock.classList.add('visible');});
  dock.addEventListener('mouseleave',hideDock);
})();
</script>
</body>
</html>
