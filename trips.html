<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊行程記帳｜Sumoai's Reel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
:root{
  --bg:#FDF6EE;
  --panel:#FFFDF9;
  --card:#FFFFFF;
  --line:#E8D9C5;
  --line-soft:#F0E5D6;
  --ink:#3B2F2A;
  --ink-soft:#5C4A3D;
  --hint:#B49A82;
  --orange:#FF6B35;
  --orange-dk:#8A3A12;
  --orange-bg:#FFE8DC;
  --red:#E24B4A;
  --red-dk:#A32D2D;
  --red-deep:#791F1F;
  --red-bg:#FCEBEB;
  --green:#639922;
  --green-dk:#3B6D11;
  --green-deep:#27500A;
  --green-bg:#EAF3DE;
  --amber:#BA7517;
  --amber-bg:#FAEEDA;
}
body{
  font-family:'Noto Sans TC','Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* 全域 Menubar（全站共用） */
.global-menubar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  height:28px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  font-size:12px;color:rgba(255,255,255,0.92);
  font-family:'Inter','Noto Sans TC',monospace;
}
.gm-left{display:flex;align-items:center;gap:14px;font-weight:600;}
.gm-right{display:flex;align-items:center;gap:10px;font-size:11px;opacity:0.85;}
.mb-menu{padding:0 6px;border-radius:4px;cursor:default;font-size:12px;color:rgba(255,255,255,0.95);}
.mb-menu:hover{background:rgba(255,255,255,0.2);}

/* Dock（全站共用，不變） */
.global-dock-wrap{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%) translateY(calc(100% - 2px));
  z-index:9998;
  transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1),opacity 0.3s;
  opacity:0;
}
.global-dock-wrap.visible{transform:translateX(-50%) translateY(-12px);opacity:1;}
.global-dock{
  display:flex;align-items:flex-end;gap:10px;
  background:rgba(30,33,48,0.82);
  backdrop-filter:blur(28px) saturate(180%);
  -webkit-backdrop-filter:blur(28px) saturate(180%);
  border:1px solid rgba(255,255,255,0.25);
  border-radius:22px;
  padding:10px 16px;
  box-shadow:0 8px 40px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.18);
}
.gd-item{display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none;position:relative;}
.gd-icon{width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:30px;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.gd-item:hover .gd-icon{transform:translateY(-14px) scale(1.28);}
.gd-label{font-size:9px;letter-spacing:0.06em;color:rgba(255,255,255,0.85);text-transform:uppercase;opacity:0;transition:opacity 0.15s;white-space:nowrap;background:rgba(0,0,0,0.6);padding:2px 7px;border-radius:4px;position:absolute;bottom:-22px;font-family:'Inter',monospace;}
.gd-item:hover .gd-label{opacity:1;}
.gd-sep{width:1px;height:48px;background:rgba(255,255,255,0.22);margin:0 4px;align-self:center;}
.gd-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.7);margin-top:2px;}
.ic-photos,.ic-dramas,.ic-food,.ic-travel,.ic-threads,.ic-uber,.ic-weight,.ic-reminder,.ic-netflix,.ic-mlb,.ic-chloe{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.ic-trips{background:linear-gradient(145deg,#111,#1a1a1a);border:1px solid rgba(255,255,255,0.15);}
.dock-trigger-zone{position:fixed;bottom:0;left:0;right:0;height:8px;z-index:9997;}

/* ── 版面：左側欄 + 右側內容 ── */
.app{display:flex;min-height:100vh;padding-top:28px;}
.sidebar{
  position:fixed;top:28px;left:0;bottom:0;
  width:240px;
  background:var(--panel);
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;
  z-index:200;
  transition:transform 0.28s ease;
}
.sb-scroll{flex:1;overflow-y:auto;padding:14px 12px 8px;}
.btn-newtrip{
  width:100%;
  background:var(--orange);color:#FFF3EC;
  border:none;border-radius:10px;
  padding:10px 0;font-size:14px;font-weight:700;
  font-family:inherit;cursor:pointer;
  transition:filter 0.15s;
}
.btn-newtrip:hover{filter:brightness(1.06);}
.sb-year{font-size:11px;font-weight:700;color:var(--hint);letter-spacing:0.08em;margin:14px 4px 4px;font-family:'Space Mono',monospace;}
.trip-item{
  display:block;padding:9px 11px;margin:2px 0;
  border-radius:8px;border-left:3px solid transparent;
  cursor:pointer;
}
.trip-item:hover{background-color:rgba(255,107,53,0.08);}
.trip-item.active{background-color:var(--orange-bg);border-left-color:var(--orange);border-radius:0 8px 8px 0;}
.trip-city{font-size:14px;font-weight:700;color:var(--ink);text-shadow:0 0 3px rgba(255,253,249,1),0 0 6px rgba(255,253,249,0.9),0 1px 2px rgba(255,253,249,1);}
.trip-item.active .trip-city{color:var(--orange-dk);}
.trip-dates{font-size:11px;color:var(--ink);font-weight:700;font-family:'Space Mono',monospace;margin-top:1px;text-shadow:0 0 3px rgba(255,253,249,1),0 1px 2px rgba(255,253,249,1);}
.trip-item.active .trip-dates{color:#C0653D;}
.sb-fn{border-top:1px solid var(--line);padding:10px 12px;}
.fn-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;margin:1px 0;border-radius:8px;
  font-size:13px;font-weight:500;color:var(--ink-soft);
  cursor:pointer;user-select:none;
}
.fn-item:hover{background:rgba(255,107,53,0.08);}
.fn-item.active{background:var(--orange-bg);color:var(--orange-dk);font-weight:700;}
.fn-item svg{flex-shrink:0;}
.sb-sync{
  border-top:1px solid var(--line);
  padding:11px 14px;
  font-size:12px;
  display:flex;align-items:center;gap:8px;
}
.sync-state{flex:1;font-weight:500;}
.sync-state.ok{color:var(--green-dk);}
.sync-state.dirty{color:var(--orange-dk);}
.btn-sync{
  background:transparent;border:1px solid var(--line);
  border-radius:8px;padding:5px 10px;
  font-size:12px;font-weight:700;font-family:inherit;
  color:var(--ink-soft);cursor:pointer;
}
.btn-sync:hover{border-color:var(--orange);color:var(--orange-dk);}

/* 主內容 */
.main{flex:1;margin-left:240px;padding:22px 28px 150px;max-width:1100px;}
.main-empty{margin-left:240px;flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--hint);padding:60px 20px 150px;text-align:center;}
.trip-header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
.th-title{font-size:24px;font-weight:900;color:var(--ink);}
.th-meta{font-size:12px;color:var(--hint);font-family:'Space Mono',monospace;}
.th-total{margin-left:auto;font-size:19px;font-weight:900;color:var(--red-dk);font-family:'Space Mono',monospace;}
.hamburger{
  display:none;
  background:var(--card);border:1px solid var(--line);border-radius:8px;
  width:36px;height:36px;cursor:pointer;
  align-items:center;justify-content:center;flex-shrink:0;
}
.sb-overlay{display:none;position:fixed;inset:28px 0 0 0;background:rgba(59,47,42,0.35);z-index:199;}

/* 統計卡 */
.stat-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:120px;border-radius:10px;padding:10px 14px;}
.stat-card .sc-label{font-size:11px;font-weight:700;letter-spacing:0.03em;}
.stat-card .sc-value{font-size:19px;font-weight:900;font-family:'Space Mono',monospace;margin-top:2px;white-space:nowrap;}
.stat-card.red{background:var(--red-bg);}
.stat-card.red .sc-label{color:var(--red-dk);}
.stat-card.red .sc-value{color:var(--red-deep);}
.stat-card.orange{background:var(--orange-bg);}
.stat-card.orange .sc-label{color:#C0653D;}
.stat-card.orange .sc-value{color:var(--orange-dk);}
.stat-card.green{background:var(--green-bg);}
.stat-card.green .sc-label{color:var(--green-dk);}
.stat-card.green .sc-value{color:var(--green-deep);}
.stat-card.green .sc-value.over{color:var(--red-dk);}

/* 表單 */
.form-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.form-row input,.form-row select{
  background:var(--card);border:1px solid var(--line);
  border-radius:9px;padding:9px 11px;
  font-size:14px;font-family:inherit;color:var(--ink);
  outline:none;min-width:0;
}
.form-row input:focus,.form-row select:focus{border-color:var(--orange);}
.form-row input::placeholder{color:var(--hint);}
.btn-add{
  background:var(--orange);color:#FFF3EC;
  border:none;border-radius:9px;padding:9px 18px;
  font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
}
.btn-add:hover{filter:brightness(1.06);}

/* 日期分頁（行程用） */
.day-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.day-tab{
  border:1.5px solid var(--line);background:var(--card);
  border-radius:12px;padding:9px 18px;
  font-size:15px;font-weight:700;color:var(--ink-soft);cursor:pointer;
  font-family:'Space Mono',monospace;transition:transform 0.12s,box-shadow 0.12s;
}
.day-tab:hover{transform:translateY(-1px);}
.day-tab.active{background:var(--orange);border-color:var(--orange);color:#FFF3EC;box-shadow:0 3px 10px rgba(255,107,53,0.35);}

/* 行程時間軸 */
.timeline{border-left:2px solid var(--line);margin-left:8px;padding-left:18px;}
.tl-item{position:relative;padding:8px 0 14px;}
.tl-item::before{
  content:'';position:absolute;left:-24.5px;top:15px;
  width:11px;height:11px;border-radius:50%;
  background:var(--orange);border:2.5px solid var(--bg);
}
.tl-time{font-size:12px;font-weight:700;color:var(--orange-dk);font-family:'Space Mono',monospace;}
.tl-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 13px;margin-top:4px;display:flex;align-items:center;gap:9px;}
.tl-title{font-size:14px;font-weight:700;color:var(--ink);}
.tl-note{font-size:12px;color:var(--hint);margin-top:2px;}
.tl-cost{margin-left:auto;font-size:13px;font-weight:700;color:var(--red-dk);font-family:'Space Mono',monospace;white-space:nowrap;text-align:right;}
.tl-cost.cur-twd{color:var(--green-dk);}
.tl-twd{display:block;font-size:10px;font-weight:400;color:var(--hint);}
.day-subtotal{display:flex;align-items:baseline;gap:10px;margin:2px 0 12px;font-family:'Space Mono',monospace;}
.day-subtotal .ds-day{font-size:14px;font-weight:900;color:var(--ink-soft);}
.day-subtotal .ds-sum{margin-left:auto;font-size:13px;font-weight:700;color:var(--red-dk);}

/* Google 日曆式日視圖 */
.cal-untimed{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.cal-chip{display:inline-flex;align-items:center;gap:4px;font-size:12px;border:1px solid;border-radius:8px;padding:4px 9px;color:var(--ink);background:var(--card);}
.cal-chip b{font-weight:700;color:var(--red-dk);}
.cal-chip b.cur-twd{color:var(--green-dk);}
.cal-scroll{height:60vh;min-height:360px;max-height:760px;overflow-y:auto;overflow-x:hidden;border:1px solid var(--line);border-radius:12px;background:var(--card);-webkit-overflow-scrolling:touch;}
.cal{position:relative;background:var(--card);}
.cal-grid{position:absolute;inset:0;}
.cal-hline{position:absolute;left:46px;right:0;border-top:1px solid var(--line-soft);}
.cal-hlabel{position:absolute;left:0;width:40px;text-align:right;font-size:11px;color:var(--hint);font-family:'Space Mono',monospace;}
.cal-body{position:absolute;left:46px;right:6px;top:0;bottom:0;}
.cal-ev{position:absolute;border-radius:8px;border-left:5px solid;padding:3px 7px 3px 8px;overflow:hidden;box-sizing:border-box;}
.cev-row{display:flex;align-items:baseline;gap:6px;padding-right:15px;}
.cev-title{flex:1;min-width:0;font-size:15px;font-weight:700;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cev-time{font-size:10px;color:var(--ink-soft);font-family:'Space Mono',monospace;line-height:1.3;}
.cev-cost{flex-shrink:0;font-size:13px;font-weight:700;color:var(--red-dk);font-family:'Space Mono',monospace;line-height:1.25;white-space:nowrap;}
.cev-cost.cur-twd{color:var(--green-dk);}
.cev-del{position:absolute;top:1px;right:2px;background:none;border:none;cursor:pointer;color:var(--hint);font-size:11px;line-height:1;padding:1px 3px;}
.cev-del:hover{color:var(--red);}

/* 類別 badge */
.badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:99px;white-space:nowrap;}

/* 記帳列表 */
.exp-group{margin-bottom:18px;}
.exp-date{
  display:flex;align-items:baseline;gap:10px;
  font-size:13px;font-weight:900;color:var(--ink-soft);
  margin-bottom:6px;font-family:'Space Mono',monospace;
}
.exp-date .ed-sub{margin-left:auto;font-size:12px;color:var(--red-dk);font-weight:700;}
.exp-list{background:var(--card);border:1px solid var(--line);border-radius:11px;overflow:hidden;}
.exp-row{display:flex;align-items:center;gap:9px;padding:9px 13px;border-bottom:1px solid var(--line-soft);font-size:14px;}
.exp-row:last-child{border-bottom:none;}
.exp-item-name{color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.exp-pay{font-size:11px;color:var(--hint);}
.exp-amt{margin-left:auto;font-weight:700;color:var(--red-deep);font-family:'Space Mono',monospace;white-space:nowrap;}
.exp-twd{font-size:11px;color:var(--hint);font-family:'Space Mono',monospace;white-space:nowrap;}
.exp-del{
  background:none;border:none;cursor:pointer;color:var(--hint);
  font-size:15px;padding:2px 4px;line-height:1;flex-shrink:0;
}
.exp-del:hover{color:var(--red);}

/* 統計圖 */
.chart-box{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:16px;margin-bottom:16px;}
.chart-title{font-size:14px;font-weight:900;margin-bottom:10px;color:var(--ink);}
.legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:10px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);}
.legend-swatch{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.cat-table{width:100%;border-collapse:collapse;font-size:13px;}
.cat-table td{padding:7px 4px;border-bottom:1px solid var(--line-soft);}
.cat-table tr:last-child td{border-bottom:none;}
.cat-table .num{text-align:right;font-family:'Space Mono',monospace;font-weight:700;}

/* 設定 */
.set-grid{display:grid;grid-template-columns:110px 1fr;gap:10px 14px;align-items:center;max-width:460px;}
.set-grid label{font-size:13px;font-weight:700;color:var(--ink-soft);}
.set-grid input,.set-grid select,.set-grid textarea{
  background:var(--card);border:1px solid var(--line);border-radius:9px;
  padding:9px 11px;font-size:14px;font-family:inherit;color:var(--ink);outline:none;
}
.set-grid input:focus,.set-grid select:focus,.set-grid textarea:focus{border-color:var(--orange);}
.set-grid textarea{width:100%;resize:vertical;line-height:1.4;}
.btn-danger{
  background:transparent;border:1px solid var(--red);color:var(--red-dk);
  border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;
  font-family:inherit;cursor:pointer;margin-top:18px;
}
.btn-danger:hover{background:var(--red-bg);}
.btn-save{
  background:var(--green);color:#F4FBEA;border:none;
  border-radius:9px;padding:9px 20px;font-size:14px;font-weight:700;
  font-family:inherit;cursor:pointer;margin-top:18px;margin-right:10px;
}
.btn-save:hover{filter:brightness(1.06);}

/* 新增旅程 Modal */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(59,47,42,0.45);z-index:500;align-items:center;justify-content:center;padding:16px;}
.modal-mask.open{display:flex;}
.cal-ev,.cal-chip{cursor:pointer;}
#detailCard{max-width:400px;}
.dt-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
.dt-badge{font-size:13px;font-weight:700;padding:3px 12px;border-radius:99px;}
.dt-title{font-size:19px;font-weight:900;color:var(--ink);line-height:1.25;}
.dt-row{display:flex;gap:10px;padding:9px 0;border-top:1px solid var(--line-soft);font-size:14px;}
.dt-row .dt-key{width:60px;flex-shrink:0;color:var(--hint);font-weight:700;}
.dt-row .dt-val{flex:1;color:var(--ink);word-break:break-word;white-space:pre-wrap;}
.dt-amt{font-family:'Space Mono',monospace;font-weight:700;color:var(--red-dk);}
.dt-amt.cur-twd{color:var(--green-dk);}
.dt-amt .dt-twd{color:var(--hint);font-weight:400;font-size:12px;margin-left:6px;}
.modal{background:var(--panel);border-radius:14px;padding:22px 24px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(59,47,42,0.3);}
.modal h3{font-size:17px;font-weight:900;margin-bottom:16px;color:var(--ink);}
.modal .set-grid{max-width:none;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}
.btn-cancel{background:transparent;border:1px solid var(--line);border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;font-family:inherit;color:var(--ink-soft);cursor:pointer;}

/* 手機 */
@media (max-width:768px){
  .sidebar{transform:translateX(-100%);box-shadow:none;}
  .sidebar.open{transform:translateX(0);box-shadow:0 0 40px rgba(59,47,42,0.25);}
  .sb-overlay.show{display:block;}
  .main,.main-empty{margin-left:0;padding:16px 14px 150px;}
  .hamburger{display:flex;}
  .th-title{font-size:20px;}
  .th-total{width:100%;margin-left:0;}
  .stat-card .sc-value{font-size:16px;}
  .form-row input,.form-row select{font-size:16px;}
  .set-grid{grid-template-columns:1fr;gap:4px 0;}
  .set-grid label{margin-top:8px;}
}
</style>
</head>
<body>

<div class="global-menubar">
  <div class="gm-left">
    <span style="font-size:16px">🗿</span>
    <a href="index.html" style="font-weight:700;color:rgba(255,255,255,0.92);text-decoration:none;">Sumoai's Reel</a>
    <span class="mb-menu">檔案</span><span class="mb-menu">編輯</span>
    <span class="mb-menu">顯示方式</span><span class="mb-menu">前往</span>
    <span class="mb-menu">視窗</span><span class="mb-menu">輔助說明</span>
  </div>
  <div class="gm-right">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)"><path d="M17.71 7.71L12 2h-1v7.59L6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 11 14.41V22h1l5.71-5.71-4.3-4.29 4.3-4.29zM13 5.83l1.88 1.88L13 9.59V5.83zm1.88 10.46L13 18.17v-3.76l1.88 1.88z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)"><path d="M1 9l2 2c5.07-5.07 13.27-5.05 18.36 0l2-2C16.93 2.37 7.1 2.35 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.77 7.27-2.76 10.03 0l2-2C15.14 9.14 8.87 9.13 5 13z"/></svg>
    <svg width="16" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

<script>
// Dock 顯示邏輯
(function(){
  var dock=document.getElementById('globalDock');
  var zone=document.querySelector('.dock-trigger-zone');
  function show(){dock.classList.add('visible');}
  function hide(){dock.classList.remove('visible');}
  zone.addEventListener('mouseenter',show);
  dock.addEventListener('mouseenter',show);
  dock.addEventListener('mouseleave',hide);
  setTimeout(show,600);
  setTimeout(function(){if(!dock.matches(':hover'))hide();},2600);
})();

// 全域 Menubar 時鐘
(function(){
  function t(){
    var el=document.getElementById('gmbTime');if(!el)return;
    var now=new Date(),d=['日','一','二','三','四','五','六'][now.getDay()];
    var h=String(now.getHours()).padStart(2,'0'),m=String(now.getMinutes()).padStart(2,'0');
    el.textContent='週'+d+' '+(now.getMonth()+1)+'/'+(now.getDate())+' '+h+':'+m;
  }t();setInterval(t,10000);
})();

// ── GitHub 設定 ──
const GH_OWNER='sumoai-boop', GH_REPO='sumoai-boop.github.io', GH_BRANCH='main';
const GH_DATA_PATH='trips-data.json';
const GH_TOKEN_KEY='sumoai_gh_token';
const SHA_KEY='gh_json_sha_trips';
const LOCAL_KEY='trips_local_data';
const DIRTY_KEY='trips_dirty_count';

// ── 統一標籤（行程類型＋支出類別合一，紅橘綠暖色譜） ──
const TAG={
  '景點':{c:'#A11E1E',bg:'#F9CFCF',pie:'#E23B3B'},
  '餐飲':{c:'#9A4A0A',bg:'#FBDCBE',pie:'#F5731A'},
  '交通':{c:'#8A6E06',bg:'#FBEFA6',pie:'#EBC208'},
  '機票':{c:'#3C6E12',bg:'#D3EAB2',pie:'#5CA82E'},
  '購物':{c:'#1F5A8A',bg:'#CBE0F6',pie:'#3B86D6'},
  '住宿':{c:'#324A9A',bg:'#D2D8F4',pie:'#4A5AC8'},
  '門票':{c:'#6B2E9A',bg:'#E6D2F4',pie:'#9A4AD0'},
  '其他':{c:'#4A4A4A',bg:'#DEDEDE',pie:'#8A8A8A'}
};

// ── 狀態 ──
let DB={trips:[]};
let currentTripId=null;
let currentView='log';
let itSelectedDate=null;

// ── 工具 ──
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function fmtDateLocal(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function parseDate(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function dateRange(start,end){
  var out=[],d=parseDate(start),e=parseDate(end);
  while(d<=e){out.push(fmtDateLocal(d));d.setDate(d.getDate()+1);}
  return out;
}
function fmtMD(s){var p=s.split('-');return (+p[1])+'/'+(+p[2]);}
function weekdayZh(s){return '週'+['日','一','二','三','四','五','六'][parseDate(s).getDay()];}
function num(n){return Math.round(n).toLocaleString('en-US');}
function curTrip(){return DB.trips.find(t=>t.id===currentTripId)||null;}
function entryTWD(e,t){var a=+e.amount||0;return (e.cur==='TWD')?a:a*(+t.rate||1);}
function tripTotalTWD(t){return (t.entries||[]).reduce((s,e)=>s+entryTWD(e,t),0);}
function sumByType(t,type){return (t.entries||[]).filter(e=>e.type===type).reduce((s,e)=>s+entryTWD(e,t),0);}
function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── 本地儲存 / 髒資料標記 ──
function saveLocal(){localStorage.setItem(LOCAL_KEY,JSON.stringify(DB));}
function markDirty(){
  var n=(+localStorage.getItem(DIRTY_KEY)||0)+1;
  localStorage.setItem(DIRTY_KEY,String(n));
  saveLocal();renderSync();
}
function clearDirty(){localStorage.setItem(DIRTY_KEY,'0');renderSync();}
function dirtyCount(){return +localStorage.getItem(DIRTY_KEY)||0;}
function renderSync(){
  var el=document.getElementById('syncState'),n=dirtyCount();
  if(n>0){el.className='sync-state dirty';el.textContent='未同步 '+n+' 筆變更';}
  else{el.className='sync-state ok';el.textContent='已同步';}
}
function countRecords(db){
  return (db.trips||[]).reduce((s,t)=>s+1+(t.entries||[]).length+(t.itinerary||[]).length+(t.expenses||[]).length,0);
}
// 舊資料（分開的 itinerary + expenses）遷移成單一 entries[]
function migrateTrip(t){
  if(t.entries){t.entries.forEach(e=>{if(e.amount==null)e.amount=0;if(!e.cur)e.cur=t.currency||'TWD';delete e.pay;});return;}
  var TYPEMAP={'餐廳':'餐飲'},out=[];
  (t.itinerary||[]).forEach(it=>{
    var linked=(t.expenses||[]).filter(e=>e.linkId===it.id);
    out.push({id:it.id||uid(),date:it.date,time:it.time||'',type:TYPEMAP[it.type]||it.type||'其他',
      title:it.title||'',note:it.note||'',amount:linked.reduce((s,e)=>s+(+e.amount||0),0),cur:t.currency||'TWD'});
  });
  (t.expenses||[]).forEach(e=>{
    if(e.linkId)return;
    out.push({id:e.id||uid(),date:e.date,time:'',type:TYPEMAP[e.category]||e.category||'其他',
      title:e.item||'',note:'',amount:+e.amount||0,cur:t.currency||'TWD'});
  });
  t.entries=out;delete t.itinerary;delete t.expenses;
}

// ── 載入：raw 讀取 + 防止舊快取覆蓋本地新資料 ──
function loadData(){
  var local=null;
  try{local=JSON.parse(localStorage.getItem(LOCAL_KEY)||'null');}catch(e){}
  fetch('https://raw.githubusercontent.com/'+GH_OWNER+'/'+GH_REPO+'/'+GH_BRANCH+'/'+GH_DATA_PATH+'?t='+Date.now())
    .then(r=>r.ok?r.json():null)
    .then(remote=>{
      if(remote&&remote.trips){
        if(local&&dirtyCount()>0&&countRecords(local)>=countRecords(remote)){
          DB=local; // 本地有未同步的新資料，不被 CDN 舊快取蓋掉
        }else{
          DB=remote;saveLocal();clearDirty();
        }
      }else if(local){
        DB=local;
      }
      init();
    })
    .catch(function(){if(local)DB=local;init();});
}

function init(){
  if(!DB.trips)DB.trips=[];
  DB.trips.forEach(migrateTrip);
  if(!currentTripId&&DB.trips.length){
    var sorted=[...DB.trips].sort((a,b)=>b.start.localeCompare(a.start));
    currentTripId=sorted[0].id;
  }
  fillSelect('logType',Object.keys(TAG));
  fillTimeSelects();
  renderAll();
}
function fillSelect(id,opts){
  var el=document.getElementById(id);
  el.innerHTML=opts.map(o=>'<option>'+o+'</option>').join('');
}
function fillTimeSelects(){
  var opts='<option value="">--:--</option>';
  for(var m=0;m<24*60;m+=15){
    var v=String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');
    opts+='<option value="'+v+'">'+v+'</option>';
  }

function toMin(hhmm){var p=(hhmm||'').split(':');return (p.length===2&&p[0]!=='')?(+p[0])*60+(+p[1]):null;}
function minHHMM(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}
function layoutColumns(evs){
  // 依開始時間排序，同開始時間則「時段較長」的優先 → 長區塊佔左欄，
  // 其餘較短且互不重疊的行程盡量共用同一欄（上下對齊）
  evs.sort(function(a,b){return a.s-b.s||b.e-a.e;});
  var i=0;
  while(i<evs.length){
    var clusterEnd=evs[i].e,cluster=[evs[i]],j=i+1;
    while(j<evs.length&&evs[j].s<clusterEnd){cluster.push(evs[j]);if(evs[j].e>clusterEnd)clusterEnd=evs[j].e;j++;}
    var colsEnd=[];
    cluster.forEach(function(ev){
      var placed=false;
      for(var c=0;c<colsEnd.length;c++){if(colsEnd[c]<=ev.s){ev.col=c;colsEnd[c]=ev.e;placed=true;break;}}
      if(!placed){ev.col=colsEnd.length;colsEnd.push(ev.e);}
    });
    cluster.forEach(function(ev){ev.cols=colsEnd.length;});
    i=j;
  }
}
function chipHTML(t,x){
  var ty=TAG[x.type]||TAG['其他'];
  var cost=(+x.amount>0)?' <b class="'+(x.cur==='TWD'?'cur-twd':'')+'" style="font-family:\'Space Mono\',monospace;">'+(x.cur==='TWD'?'NT$'+num(x.amount):num(x.amount)+esc(x.cur||''))+'</b>':'';
  return '<span class="cal-chip" onclick="openEntryDetail(\''+x.id+'\')" style="background:'+ty.bg+';border-color:'+ty.pie+';">'
    +'<span style="color:'+ty.c+';font-weight:700;">'+esc(x.type)+'</span> '+esc(x.title)+cost
    +'<button class="cev-del" style="position:static;margin-left:4px;color:inherit;" onclick="event.stopPropagation();delEntry(\''+x.id+'\')" aria-label="刪除">✕</button></span>';
}
function prevDateStr(day){var d=parseDate(day);d.setDate(d.getDate()-1);return fmtDateLocal(d);}
function renderDayCalendar(t,day){
  var timed=[],untimed=[];
  (t.entries||[]).filter(function(e){return e.date===day;}).forEach(function(x){
    var sm=toMin(x.time);
    if(sm==null){untimed.push(x);return;}
    var em=toMin(x.end);if(em==null)em=sm+60;else if(em<=sm)em+=1440;
    timed.push({x:x,s:sm,e:em,cont:false});
  });
  // 前一天跨過午夜、延續到今天的行程 → 今天從 00:00 畫到結束
  var pd=prevDateStr(day);
  (t.entries||[]).filter(function(e){return e.date===pd;}).forEach(function(x){
    var sm=toMin(x.time),em=toMin(x.end);
    if(sm==null||em==null||em>sm)return; // 未跨夜
    timed.push({x:x,s:0,e:em,cont:true});
  });
  var chips=untimed.length?'<div class="cal-untimed">'+untimed.map(function(x){return chipHTML(t,x);}).join('')+'</div>':'';
  var startH=0,endH=24;
  var HP=66,pm=HP/60,top0=startH*60,bodyH=(endH-startH)*HP;
  var grid='';
  for(var h=startH;h<=endH;h++){
    var y=(h-startH)*HP;
    grid+='<div class="cal-hline" style="top:'+y+'px;"></div>'
      +'<div class="cal-hlabel" style="top:'+(y-6)+'px;">'+String(h%24).padStart(2,'0')+':00</div>';
  }
  layoutColumns(timed);
  var evs=timed.map(function(o){
    var x=o.x,ty=TAG[x.type]||TAG['其他'];
    var drawE=Math.min(o.e,endH*60),top=(o.s-top0)*pm,hgt=Math.max((drawE-o.s)*pm,26);
    var w=100/o.cols,left=o.col*w;
    var cost=(!o.cont&&+x.amount>0)?'<div class="cev-cost'+(x.cur==='TWD'?' cur-twd':'')+'">'+(x.cur==='TWD'?'NT$'+num(x.amount):num(x.amount)+' '+esc(x.cur||''))+'</div>':'';
    var title=(o.cont?'↳ ':'')+esc(x.title);
    return '<div class="cal-ev" onclick="openEntryDetail(\''+x.id+'\')" style="top:'+top.toFixed(1)+'px;height:'+hgt.toFixed(1)+'px;left:calc('+left+'% + 1px);width:calc('+w+'% - 3px);background:'+ty.bg+';border-left-color:'+ty.pie+';'+(o.cont?'opacity:0.88;':'')+'">'
      +'<button class="cev-del" onclick="event.stopPropagation();delEntry(\''+x.id+'\')" aria-label="刪除">✕</button>'
      +'<div class="cev-row"><div class="cev-title" style="color:'+ty.c+';">'+title+'</div>'+cost+'</div>'
      +'</div>';
  }).join('');
  return chips+'<div class="cal-scroll"><div class="cal" style="height:'+bodyH+'px;"><div class="cal-grid">'+grid+'</div><div class="cal-body">'+evs+'</div></div></div>';
}

// ── 統計 ──
function renderStats(){
  var t=curTrip(),rate=+t.rate||1;
  var byCat={};
  t.entries.forEach(e=>{if(+e.amount>0)byCat[e.type]=(byCat[e.type]||0)+entryTWD(e,t);});
  var entries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  var total=entries.reduce((s,x)=>s+x[1],0);
  // 圓餅
  var svg='',a0=-Math.PI/2,cx=85,cy=85,r=78;
  if(total<=0){
    svg='<circle cx="85" cy="85" r="78" fill="#F0E5D6"/>';
  }else if(entries.length===1){
    svg='<circle cx="85" cy="85" r="78" fill="'+(TAG[entries[0][0]]||TAG['其他']).pie+'"/>';
  }else{
    entries.forEach(en=>{
      var frac=en[1]/total,a1=a0+frac*2*Math.PI;
      var x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0);
      var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
      var large=frac>0.5?1:0;
      svg+='<path d="M'+cx+' '+cy+' L'+x0.toFixed(1)+' '+y0.toFixed(1)
        +' A'+r+' '+r+' 0 '+large+' 1 '+x1.toFixed(1)+' '+y1.toFixed(1)
        +' Z" fill="'+(TAG[en[0]]||TAG['其他']).pie+'" stroke="#FDF6EE" stroke-width="1.5"/>';
      a0=a1;
    });
  }
  document.getElementById('pieChart').innerHTML=svg;
  document.getElementById('catTable').innerHTML=entries.map(en=>{
    var c=TAG[en[0]]||TAG['其他'];
    return '<tr><td><span class="legend-item"><span class="legend-swatch" style="background:'+c.pie+';"></span>'+esc(en[0])+'</span></td>'
      +'<td class="num">NT$ '+num(en[1])+'</td>'
      +'<td class="num" style="color:'+c.c+';">'+(total?Math.round(en[1]/total*100):0)+'%</td></tr>';
  }).join('')||'<tr><td style="color:var(--hint);">還沒有資料</td></tr>';
  // 每日長條
  var days=dateRange(t.start,t.end);
  var vals=days.map(d=>t.entries.filter(e=>e.date===d).reduce((s,e)=>s+entryTWD(e,t),0));
  var max=Math.max(...vals,1);
  var W=600,H=180,pad=6,bw=(W-pad*2)/days.length;
  var bars='';
  days.forEach((d,i)=>{
    var h=Math.round(vals[i]/max*130);
    var x=pad+i*bw,y=160-h;
    bars+='<rect x="'+(x+bw*0.12).toFixed(1)+'" y="'+y+'" width="'+(bw*0.76).toFixed(1)+'" height="'+h+'" rx="4" fill="#FF6B35"/>'
      +(vals[i]>0?'<text x="'+(x+bw/2).toFixed(1)+'" y="'+(y-5)+'" text-anchor="middle" font-size="11" font-family="Space Mono,monospace" fill="#8A3A12">'+num(vals[i])+'</text>':'')
      +'<text x="'+(x+bw/2).toFixed(1)+'" y="176" text-anchor="middle" font-size="11" font-family="Space Mono,monospace" fill="#B49A82">'+fmtMD(d)+'</text>';
  });
  var bc=document.getElementById('barChart');
  bc.setAttribute('viewBox','0 0 '+W+' '+H);
  bc.innerHTML=bars;
}

// ── 設定 ──
function renderSettings(){
  var t=curTrip();
  document.getElementById('setCity').value=t.city||'';
  document.getElementById('setCityEn').value=t.cityEn||'';
  document.getElementById('setStart').value=t.start||'';
  document.getElementById('setEnd').value=t.end||'';
  document.getElementById('setCurrency').value=t.currency||'TWD';
  document.getElementById('setRate').value=t.rate||1;
  document.getElementById('setBudget').value=t.budget||'';
}
function saveTripSettings(){
  var t=curTrip();if(!t)return;
  var s=document.getElementById('setStart').value,e=document.getElementById('setEnd').value;
  if(!s||!e||s>e){showToast('日期範圍不正確',true);return;}
  t.city=document.getElementById('setCity').value.trim()||t.city;
  t.cityEn=document.getElementById('setCityEn').value.trim();
  t.start=s;t.end=e;
  t.currency=(document.getElementById('setCurrency').value.trim()||'TWD').toUpperCase();
  t.rate=parseFloat(document.getElementById('setRate').value)||1;
  t.budget=parseFloat(document.getElementById('setBudget').value)||0;
  markDirty();renderAll();
  showToast('✅ 設定已更新（記得同步）',false);
}
function deleteTrip(){
  var t=curTrip();if(!t)return;
  if(!confirm('確定刪除「'+t.city+' '+t.start+'」整個旅程？行程和記帳都會一起刪除。'))return;
  DB.trips=DB.trips.filter(x=>x.id!==t.id);
  currentTripId=DB.trips.length?[...DB.trips].sort((a,b)=>b.start.localeCompare(a.start))[0].id:null;
  currentView='log';switchView('log');
  markDirty();renderAll();
}

// ── 新增旅程 ──
function openTripModal(){document.getElementById('tripModal').classList.add('open');}
function closeTripModal(){document.getElementById('tripModal').classList.remove('open');}
function createTrip(){
  var city=document.getElementById('nmCity').value.trim();
  var s=document.getElementById('nmStart').value,e=document.getElementById('nmEnd').value;
  if(!city){showToast('請輸入城市',true);return;}
  if(!s||!e||s>e){showToast('日期範圍不正確',true);return;}
  var t={
    id:uid(),city:city,
    cityEn:document.getElementById('nmCityEn').value.trim(),
    start:s,end:e,
    currency:(document.getElementById('nmCurrency').value.trim()||'TWD').toUpperCase(),
    rate:parseFloat(document.getElementById('nmRate').value)||1,
    budget:0,
    entries:[]
  };
  DB.trips.push(t);
  currentTripId=t.id;itSelectedDate=null;
  closeTripModal();
  ['nmCity','nmCityEn','nmStart','nmEnd'].forEach(id=>document.getElementById(id).value='');
  markDirty();switchView('log');
}

// ── 側欄（手機抽屜） ──
function toggleSidebar(open){
  if(window.innerWidth>768)return;
  document.getElementById('sidebar').classList.toggle('open',open);
  document.getElementById('sbOverlay').classList.toggle('show',open);
}

// ── Toast ──
function showToast(msg,isErr){
  var t=document.getElementById('ghToast');
  if(!t){t=document.createElement('div');t.id='ghToast';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:99px;font-size:13px;z-index:9999;font-family:inherit;font-weight:700;pointer-events:none;transition:opacity 0.3s;max-width:90vw;';document.body.appendChild(t);}
  t.textContent=msg;t.style.background=isErr?'#A32D2D':'#FF6B35';t.style.color='#fff';t.style.opacity='1';
  clearTimeout(t._to);if(!isErr)t._to=setTimeout(()=>t.style.opacity='0',3000);
  else t._to=setTimeout(()=>t.style.opacity='0',4000);
}

// ── GitHub 同步（TextEncoder/TextDecoder，SHA 快取 + 推送鎖） ──
function b64EncodeUtf8(str){
  var bytes=new TextEncoder().encode(str),bin='';
  bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin);
}
function getToken(){
  var tk=localStorage.getItem(GH_TOKEN_KEY);
  if(!tk){tk=prompt('請輸入 GitHub Personal Access Token（需有 repo 寫入權限）：\n\n此 Token 僅儲存在你的瀏覽器本地。');if(!tk)return null;localStorage.setItem(GH_TOKEN_KEY,tk.trim());}
  return tk.trim();
}
window.clearGHToken=function(){localStorage.removeItem(GH_TOKEN_KEY);alert('Token 已清除');};

var _pushing=false;
async function pushToGitHub(){
  if(_pushing){showToast('⏳ 推送中，請稍候...',false);return;}
  _pushing=true;
  try{
    var token=getToken();if(!token)return;
    var api='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_DATA_PATH;
    var hdrs={'Authorization':'token '+token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
    showToast('⏳ 連線 GitHub...',false);
    var sha=localStorage.getItem(SHA_KEY);
    if(!sha){
      var r=await fetch(api+'?ref='+GH_BRANCH+'&t='+Date.now(),{headers:hdrs});
      if(r.ok){var fi=await r.json();sha=fi.sha;}
      else if(r.status===401){localStorage.removeItem(GH_TOKEN_KEY);showToast('❌ Token 無效',true);return;}
      else if(r.status===404){sha=null;}
      else{showToast('❌ 連線失敗('+r.status+')',true);return;}
    }
    var encoded=b64EncodeUtf8(JSON.stringify(DB,null,2));
    showToast('⏳ 推送中...',false);
    var body={message:'更新旅遊行程記帳',content:encoded,branch:GH_BRANCH};
    if(sha)body.sha=sha;
    var pr=await fetch(api,{method:'PUT',headers:hdrs,body:JSON.stringify(body)});
    if(!pr.ok){
      var e2=await pr.json().catch(()=>({}));
      localStorage.removeItem(SHA_KEY);
      showToast('❌ 推送失敗：'+(e2.message||pr.status)+'，請再按一次同步',true);
    }else{
      var prData=await pr.json();
      var newSha=prData.content&&prData.content.sha;
      if(newSha)localStorage.setItem(SHA_KEY,newSha);
      else localStorage.removeItem(SHA_KEY);
      clearDirty();
      showToast('✅ 已同步到 GitHub',false);
    }
  }catch(err){
    showToast('❌ '+(err.message||'同步失敗'),true);
  }finally{
    _pushing=false;
  }
}
