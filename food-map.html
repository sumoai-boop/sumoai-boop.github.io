const TYPE_COLORS = {"Buffet": "#D4AC0D", "Pasta": "#95A5A6", "中式": "#229954", "便當": "#A9DFBF", "冰品": "#80DEEA", "台式": "#27AE60", "吃到飽": "#B7950B", "咖哩": "#FF9800", "咖啡廳": "#6F4E37", "壽司": "#1ABC9C", "壽喜燒": "#16A085", "小餐館": "#607D8B", "拉麵": "#F39C12", "日式": "#2980B9", "早午餐": "#A67C52", "景觀餐廳": "#00BCD4", "歐式": "#ABB2B9", "法式": "#BDC3C7", "泰式": "#E91E8C", "海南雞飯": "#F06292", "涮涮鍋": "#E74C3C", "涼麵": "#B2EBF2", "港式": "#FF5722", "漢堡": "#34495E", "火鍋": "#C0392B", "烏龍麵": "#F0B27A", "烤鴨": "#196F3D", "熱炒": "#52BE80", "燒烤": "#E67E22", "燒臘": "#D35400", "牛排": "#A93226", "牛肉麵": "#E59866", "羊肉爐": "#E55039", "美式": "#2C3E50", "義式": "#7F8C8D", "自助餐": "#82E0AA", "茶餐廳": "#795548", "薑母鴨": "#FF8A65", "西班牙": "#99A3A4", "豬排": "#B03A2E", "越式": "#C0392B", "鐵板燒": "#148F77", "韓式": "#8E44AD", "魯肉飯": "#1E8449", "麵食": "#F5CBA7"};

// 台灣中心
const map = L.map('map', {zoomControl:true, attributionControl:false})
  .setView([25.0, 121.5], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, opacity:0.55}).addTo(map);

// 地址 → 座標快取（用台灣常見地址規則估算）
// 使用 Nominatim geocoding
const GEO_CACHE = {};
const markers = [];
const markersByType = {};
let activeTypes = new Set(Object.keys(TYPE_COLORS));
let currentFiltered = [...DATA];
let activeMarker = null;

function makeIcon(type, score) {
  const color = TYPE_COLORS[type] || '#95A5A6';
  const size = score >= 4.0 ? 14 : score >= 3.0 ? 11 : 9;
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid rgba(255,255,255,0.7);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2], popupAnchor: [0, -size/2]
  });
}

function popupHTML(r) {
  const color = TYPE_COLORS[r.type] || '#95A5A6';
  const branch = r.branch ? ` ${r.branch}` : '';
  return `
    <div class="popup-name">${r.name}${branch}</div>
    <span class="popup-type" style="background:${color}">${r.type}</span>
    <div class="popup-row"><span>總分</span><span class="popup-val">${r.score > 0 ? r.score.toFixed(2) : '—'}</span></div>
    <div class="popup-row"><span>人均</span><span class="popup-val">${r.price > 0 ? 'NT$' + r.price.toLocaleString() : '—'}</span></div>
    <div class="popup-row"><span>造訪</span><span class="popup-val">${r.year > 0 ? r.year : '—'}</span></div>
    ${r.revisit > 0 ? '<div class="popup-row"><span>再訪</span><span class="popup-val">✓</span></div>' : ''}
    <div class="popup-addr">${r.addr}</div>
  `;
}

// 批次 geocode（Nominatim，限速 1 req/s）
let geoQueue = [];
let geoRunning = false;

function geocodeNext() {
  if(geoQueue.length === 0) { geoRunning = false; return; }
  geoRunning = true;
  const {addr, cb} = geoQueue.shift();
  if(GEO_CACHE[addr]) { cb(GEO_CACHE[addr]); setTimeout(geocodeNext, 50); return; }
  fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1&countrycodes=tw`,
    {headers:{'User-Agent':'sumoai-food-map/1.0'}})
    .then(r=>r.json())
    .then(data=>{
      if(data && data[0]) {
        const coord = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        GEO_CACHE[addr] = coord;
        cb(coord);
      }
    })
    .catch(()=>{})
    .finally(()=>setTimeout(geocodeNext, 1100));
}

function geocode(addr, cb) {
  if(GEO_CACHE[addr]) { cb(GEO_CACHE[addr]); return; }
  geoQueue.push({addr, cb});
  if(!geoRunning) geocodeNext();
}

// 建立所有 marker
let loadedCount = 0;
function buildMarkers() {
  DATA.forEach((r, i) => {
    geocode(r.full_addr, (coord) => {
      r._lat = coord[0]; r._lng = coord[1];
      const m = L.marker(coord, {icon: makeIcon(r.type, r.score)})
        .addTo(map)
        .bindPopup(popupHTML(r), {maxWidth: 240});
      m._data = r;
      markers[i] = m;
      if(!markersByType[r.type]) markersByType[r.type] = [];
      markersByType[r.type].push(m);
      loadedCount++;
      document.getElementById('sideCount').textContent = `已載入 ${loadedCount} / ${DATA.length} 家`;
    });
  });
}

// 圖例
function buildLegend() {
  const grid = document.getElementById('legendGrid');
  const types = Object.keys(TYPE_COLORS).sort();
  types.forEach(t => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.dataset.type = t;
    div.innerHTML = `<div class="legend-dot" style="background:${TYPE_COLORS[t]}"></div><div class="legend-label">${t}</div>`;
    div.onclick = () => toggleType(t, div);
    grid.appendChild(div);
  });
}

function toggleType(type, el) {
  if(activeTypes.has(type)) {
    activeTypes.delete(type);
    el.classList.add('inactive');
    (markersByType[type]||[]).forEach(m => map.removeLayer(m));
  } else {
    activeTypes.add(type);
    el.classList.remove('inactive');
    (markersByType[type]||[]).forEach(m => m.addTo(map));
  }
}

// 側欄列表
let q='', fCity='', fScore='';
function renderList() {
  currentFiltered = DATA.filter(r => {
    if(q && !r.name.includes(q) && !(r.branch||'').includes(q)) return false;
    if(fCity && r.city !== fCity) return false;
    if(fScore && r.score < parseFloat(fScore)) return false;
    return true;
  }).sort((a,b) => b.score - a.score);

  document.getElementById('sideCount').textContent = `${currentFiltered.length} / ${DATA.length} 家`;

  const list = document.getElementById('restList');
  list.innerHTML = '';
  currentFiltered.slice(0, 100).forEach(r => {
    const color = TYPE_COLORS[r.type] || '#95A5A6';
    const div = document.createElement('div');
    div.className = 'rest-item';
    div.innerHTML = `
      <div class="rest-name">${r.name}${r.branch?' '+r.branch:''}</div>
      <div class="rest-meta">
        <span class="rest-type" style="background:${color}">${r.type}</span>
        <span class="rest-score">${r.score>0?r.score.toFixed(2):''}</span>
        <span class="rest-city">${r.city}</span>
      </div>`;
    div.onclick = () => {
      if(r._lat) {
        map.flyTo([r._lat, r._lng], 16, {duration:0.8});
        const idx = DATA.indexOf(r);
        if(markers[idx]) markers[idx].openPopup();
      }
    };
    list.appendChild(div);
  });

  // 更新 marker 顯示/隱藏
  markers.forEach((m,i) => {
    if(!m) return;
    const r = DATA[i];
    const show = currentFiltered.includes(r) && activeTypes.has(r.type);
    if(show) { if(!map.hasLayer(m)) m.addTo(map); }
    else { if(map.hasLayer(m)) map.removeLayer(m); }
  });
}

document.getElementById('searchInput').addEventListener('input', e=>{q=e.target.value;renderList();});
document.getElementById('citySelect').addEventListener('change', e=>{fCity=e.target.value;renderList();});
document.getElementById('scoreSelect').addEventListener('change', e=>{fScore=e.target.value;renderList();});

buildLegend();
buildMarkers();
renderList();
</script>
