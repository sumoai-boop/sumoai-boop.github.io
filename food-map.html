L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, opacity:0.5}).addTo(map);

// 建立所有 marker（直接用座標）
function makeIcon(type, score) {
  const color = TYPE_COLORS[type] || '#95A5A6';
  const s = score >= 4.0 ? 13 : score >= 3.0 ? 10 : 8;
  return L.divIcon({
    className:'',
    html:`<div style="width:${s}px;height:${s}px;background:${color};border:2px solid rgba(255,255,255,0.65);border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.5);"></div>`,
    iconSize:[s,s], iconAnchor:[s/2,s/2], popupAnchor:[0,-s/2]
  });
}

function popupHTML(r) {
  const color = TYPE_COLORS[r.type] || '#95A5A6';
  const b = r.branch ? ` ${r.branch}` : '';
  return `<div class="pu-name">${r.name}${b}</div>
<span class="pu-type" style="background:${color}">${r.type}</span>
<div class="pu-row"><span>總分</span><span class="pu-val">${r.score>0?r.score.toFixed(2):'—'}</span></div>
<div class="pu-row"><span>人均</span><span class="pu-val">${r.price>0?'NT$'+r.price.toLocaleString():'—'}</span></div>
<div class="pu-row"><span>造訪</span><span class="pu-val">${r.year>0?r.year:'—'}</span></div>
${r.revisit>0?'<div class="pu-row"><span>再訪</span><span class="pu-val">✓</span></div>':''}
<div class="pu-addr">${r.addr}</div>
<div class="pu-note">📍 座標以行政區為準</div>`;
}

const markers = DATA.map((r, i) => {
  const m = L.marker([r.lat, r.lng], {icon: makeIcon(r.type, r.score)})
    .addTo(map)
    .bindPopup(popupHTML(r), {maxWidth:230});
  m._idx = i;
  return m;
});

// 類型圖例
const activeTypes = new Set(ALL_TYPES);
const legendGrid = document.getElementById('legendGrid');
ALL_TYPES.forEach(t => {
  const div = document.createElement('div');
  div.className = 'lg-item';
  div.innerHTML = `<div class="lg-dot" style="background:${TYPE_COLORS[t]||'#95A5A6'}"></div><div class="lg-label">${t}</div>`;
  div.onclick = () => {
    if(activeTypes.has(t)) { activeTypes.delete(t); div.classList.add('off'); }
    else { activeTypes.add(t); div.classList.remove('off'); }
    applyFilters();
  };
  legendGrid.appendChild(div);
});

let q='', fCity='', fScore='';
let filtered = DATA.map((_,i)=>i);

function applyFilters() {
  const minScore = fScore ? parseFloat(fScore) : 0;
  filtered = DATA.reduce((acc, r, i) => {
    if(q && !r.name.includes(q) && !(r.branch||'').includes(q)) return acc;
    if(fCity && r.city !== fCity) return acc;
    if(minScore && r.score < minScore) return acc;
    if(!activeTypes.has(r.type)) return acc;
    acc.push(i);
    return acc;
  }, []);

  document.getElementById('sbCount').textContent = `${filtered.length} / ${DATA.length} 家`;

  // 更新 marker 顯示
  markers.forEach((m, i) => {
    const show = filtered.includes(i);
    if(show) { if(!map.hasLayer(m)) m.addTo(map); }
    else { if(map.hasLayer(m)) map.removeLayer(m); }
  });

  // 更新側欄列表
  const list = document.getElementById('restList');
  list.innerHTML = '';
  const top = filtered.slice(0, 80).sort((a,b) => DATA[b].score - DATA[a].score);
  top.forEach(i => {
    const r = DATA[i];
    const color = TYPE_COLORS[r.type] || '#95A5A6';
    const div = document.createElement('div');
    div.className = 'ri';
    div.innerHTML = `<div class="ri-name">${r.name}${r.branch?' '+r.branch:''}</div>
<div class="ri-meta">
  <span class="ri-type" style="background:${color}">${r.type}</span>
  <span class="ri-score">${r.score>0?r.score.toFixed(2):''}</span>
  <span class="ri-city">${r.city}${r.district?'·'+r.district:''}</span>
</div>`;
    div.onclick = () => {
      map.flyTo([r.lat, r.lng], 16, {duration:0.7});
      markers[i].openPopup();
      document.querySelectorAll('.ri').forEach(d=>d.classList.remove('on'));
      div.classList.add('on');
    };
    list.appendChild(div);
  });
}

document.getElementById('searchInput').addEventListener('input', e=>{q=e.target.value;applyFilters();});
document.getElementById('citySelect').addEventListener('change', e=>{fCity=e.target.value;applyFilters();});
document.getElementById('scoreSelect').addEventListener('change', e=>{fScore=e.target.value;applyFilters();});

applyFilters();
</script>
</body>
</html>
