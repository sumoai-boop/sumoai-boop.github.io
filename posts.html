<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{

  }
  body::before{
    content:'';position:fixed;inset:0;

  .topnav{

    padding:16px 48px;

    background:rgba(232,98,42,0.85);backdrop-filter:blur(8px);

  }
  .logo{
    font-family:'Cormorant Garamond',serif;
    font-size:18px;font-weight:300;
    color:#FFF5E6;text-decoration:none;letter-spacing:0.04em;
  }
  .logo em{font-style:italic;color:#FFD4A8;}
  nav{display:flex;flex-wrap:wrap;gap:8px;}
  nav a{
    padding:7px 16px;
    border:1px solid rgba(255,245,230,0.3);
    border-radius:99px;font-size:10px;
    letter-spacing:0.1em;text-transform:uppercase;
    color:#FFF5E6;text-decoration:none;
    background:rgba(255,255,255,0.08);
    transition:background 0.2s,border-color 0.2s;
  }
  nav a:hover,nav a.active{background:rgba(255,255,255,0.22);border-color:rgba(255,245,230,0.7);}

  .page-content{
    position:relative;z-index:10;
    max-width:860px;margin:0 auto;
    padding:110px 48px 80px;
  }
  .page-title{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(40px,7vw,72px);font-weight:300;
    color:#FFF5E6;line-height:1;margin-bottom:8px;
  }
  .page-title em{font-style:italic;color:#FFD4A8;}
  .page-label{
    font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
    color:rgba(255,245,230,0.5);margin-bottom:48px;display:block;
  }
  .divider{
    width:48px;height:1px;
    background:rgba(255,245,230,0.3);
    margin:32px 0;
  }

  @media(max-width:600px){
    .topnav{padding:12px 20px;}
    .page-content{padding:90px 24px 60px;}
    nav a{padding:6px 12px;font-size:9px;}
  }

  .post-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3px;}
  .post-card{
    padding:36px 32px;
    background:rgba(0,0,0,0.15);
    transition:background 0.25s;border-radius:4px;
  }
  .post-card:hover{background:rgba(0,0,0,0.28);}
  .post-date{font-size:10px;color:#FFD4A8;letter-spacing:0.12em;margin-bottom:14px;display:block;}
  .post-title{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;font-weight:300;line-height:1.3;
    color:#FFF5E6;margin-bottom:12px;
  }
  .post-excerpt{font-size:11px;color:rgba(255,245,230,0.65);line-height:1.9;letter-spacing:0.03em;}
  .post-more{
    display:inline-block;margin-top:18px;
    font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    color:#FFD4A8;text-decoration:none;
    border-bottom:1px solid rgba(255,212,168,0.5);padding-bottom:2px;
    transition:opacity 0.2s;
  }
  .post-more:hover{opacity:0.6;}
  @media(max-width:600px){.post-grid{grid-template-columns:1fr;}}
