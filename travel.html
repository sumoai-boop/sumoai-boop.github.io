<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊足跡 — Sumoai's Reel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:#E8622A;min-height:100vh;font-family:'Space Mono',monospace;overflow-x:hidden;position:relative;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.05) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;z-index:0;}
  .bg-circle{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
  .c1{width:480px;height:480px;background:#D4501F;top:-140px;right:-100px;opacity:0.4;}
  .c2{width:300px;height:300px;background:#C94318;bottom:-90px;left:-70px;opacity:0.35;}
  .topnav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 48px;display:flex;justify-content:space-between;align-items:center;background:rgba(232,98,42,0.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.1);}
  .logo{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#FFF5E6;text-decoration:none;letter-spacing:0.04em;}
  .logo em{font-style:italic;color:#FFD4A8;}
  nav{display:flex;flex-wrap:wrap;gap:8px;}
  nav a{padding:7px 16px;border:1px solid rgba(255,245,230,0.3);border-radius:99px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#FFF5E6;text-decoration:none;background:rgba(255,255,255,0.08);transition:background 0.2s,border-color 0.2s;}
  nav a:hover,nav a.active{background:rgba(255,255,255,0.22);border-color:rgba(255,245,230,0.7);}
  .page-content{position:relative;z-index:10;max-width:860px;margin:0 auto;padding:110px 48px 80px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(40px,7vw,72px);font-weight:300;color:#FFF5E6;line-height:1;margin-bottom:8px;}
  .page-title em{font-style:italic;color:#FFD4A8;}
  .page-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,245,230,0.5);margin-bottom:48px;display:block;}
  .divider{width:48px;height:1px;background:rgba(255,245,230,0.3);margin:32px 0;}
  @media(max-width:600px){.topnav{padding:12px 20px;}.page-content{padding:90px 24px 60px;}nav a{padding:6px 12px;font-size:9px;}}

  #map-wrap{width:100%;background:#1a2535;border-radius:12px;overflow:hidden;position:relative;margin-top:8px;}
  #map svg{display:block;width:100%;}
  .maptip{position:absolute;pointer-events:none;background:#E8622A;color:#FFF5E6;padding:6px 12px;border-radius:99px;font-size:12px;font-family:monospace;letter-spacing:0.08em;opacity:0;transition:opacity 0.15s;white-space:nowrap;}
  .pin{cursor:pointer;}
  .pin:hover circle.outer{r:10;}
  .map-footer{font-size:11px;color:rgba(255,245,230,0.45);font-family:monospace;letter-spacing:0.1em;padding:12px 16px;background:#1a2535;border-radius:0 0 12px 12px;text-align:right;}
</style>
</head>
<body>
<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>
<div class="topnav">
  <a href="index.html" class="logo">Sumoai's <em>Reel</em></a>
  <nav>
    <a href="index.html">首頁</a>
    <a href="about.html">關於</a>
    <a href="photos.html">照片</a>
    <a href="dramas.html">追劇</a>
    <a href="travel.html">旅遊足跡</a>
    <a href="threads.html">Threads</a>
  </nav>
</div>
<div class="page-content">
  <h1 class="page-title">旅遊<em>足跡</em></h1>
  <span class="page-label">— 04 / TRAVEL</span>
  <div id="map-wrap">
    <div id="map"></div>
    <div class="maptip" id="tip"></div>
  </div>
  <div class="map-footer">10 個城市 · 6 個國家和地區</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
  <script>
  const cities=[
    {name:'上海',lat:31.23,lng:121.47},{name:'杭州',lat:30.25,lng:120.15},
    {name:'東京',lat:35.68,lng:139.69},{name:'大阪',lat:34.69,lng:135.50},
    {name:'沖繩',lat:26.21,lng:127.68},{name:'曼谷',lat:13.75,lng:100.50},
    {name:'宿霧',lat:10.32,lng:123.89},{name:'首爾',lat:37.57,lng:126.98},
    {name:'澳門',lat:22.20,lng:113.54},{name:'香港',lat:22.32,lng:114.17},
  ];
  const W=860,H=500;
  const svg=d3.select('#map').append('svg').attr('viewBox',`0 0 ${W} ${H}`).attr('width','100%');
  const proj=d3.geoMercator().center([110,25]).scale(680).translate([W/2,H/2]);
  const path=d3.geoPath(proj);
  const tip=document.getElementById('tip');
  const wrap=document.getElementById('map-wrap');
  d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world=>{
    svg.append('g').selectAll('path')
      .data(topojson.feature(world,world.objects.countries).features)
      .join('path').attr('d',path).attr('fill','#243044').attr('stroke','#1a2535').attr('stroke-width',0.5);
    cities.forEach(c=>{
      const [x,y]=proj([c.lng,c.lat]);
      const g=svg.append('g').attr('class','pin').attr('transform',`translate(${x},${y})`);
      g.append('circle').attr('class','outer').attr('r',8).attr('fill','#E8622A').attr('opacity',0.3);
      g.append('circle').attr('r',5).attr('fill','#E8622A');
      g.append('circle').attr('r',2.5).attr('fill','#FFD4A8');
      g.on('mouseenter',(event)=>{tip.textContent=c.name;tip.style.opacity='1';})
       .on('mousemove',(event)=>{
         const rect=wrap.getBoundingClientRect();
         tip.style.left=(event.clientX-rect.left+12)+'px';
         tip.style.top=(event.clientY-rect.top-18)+'px';
       })
       .on('mouseleave',()=>{tip.style.opacity='0';});
    });
    svg.append('g').selectAll('text').data(cities).join('text')
      .attr('x',d=>proj([d.lng,d.lat])[0]+9)
      .attr('y',d=>proj([d.lng,d.lat])[1]+4)
      .text(d=>d.name)
      .attr('fill','#FFF5E6').attr('font-size','12px').attr('font-family','monospace').attr('opacity',0.85);
  });
  </script>
</div></body></html>
