name: LINE 提醒通知

on:
  schedule:
    # 每分鐘執行一次（GitHub Actions 最小間隔是每5分鐘，這裡設每5分鐘）
    - cron: '*/5 * * * *'
  workflow_dispatch: # 也可以手動觸發測試

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 檢查並發送 LINE 提醒
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          node -e "
          const fs = require('fs');
          const https = require('https');

          // 讀取提醒資料
          let reminders = [];
          try {
            const raw = fs.readFileSync('reminders.json', 'utf8');
            reminders = JSON.parse(raw);
          } catch(e) {
            console.log('reminders.json 不存在或格式錯誤，跳過');
            process.exit(0);
          }

          const now = new Date();
          // 台灣時間 = UTC+8
          const twNow = new Date(now.getTime() + 8 * 60 * 60 * 1000);
          const twStr = twNow.toISOString().slice(0, 16); // YYYY-MM-DDTHH:MM

          let updated = false;

          reminders.forEach(r => {
            if (r.done) return;
            const reminderDT = r.date + 'T' + r.time;
            if (reminderDT !== twStr) return;

            // 時間到，發送 LINE 訊息
            const msg = [
              '🔔 提醒通知',
              '',
              '📌 ' + r.title,
              '📅 ' + r.date + ' ' + r.time,
              r.note ? '📝 ' + r.note : '',
              r.repeat && r.repeat !== 'none' ? '🔁 重複：' + {daily:'每天',weekly:'每週',monthly:'每月',yearly:'每年'}[r.repeat] : ''
            ].filter(Boolean).join('\n');

            const body = JSON.stringify({
              to: process.env.LINE_USER_ID,
              messages: [{ type: 'text', text: msg }]
            });

            const options = {
              hostname: 'api.line.me',
              path: '/v2/bot/message/push',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.LINE_TOKEN
              }
            };

            const req = https.request(options, res => {
              console.log('LINE API 回應：' + res.statusCode + ' / ' + r.title);
            });
            req.on('error', e => console.error('發送失敗：', e));
            req.write(body);
            req.end();

            // 處理重複
            if (!r.repeat || r.repeat === 'none') {
              r.done = true;
            } else {
              const d = new Date(r.date + 'T' + r.time);
              if (r.repeat === 'daily')   d.setDate(d.getDate() + 1);
              if (r.repeat === 'weekly')  d.setDate(d.getDate() + 7);
              if (r.repeat === 'monthly') d.setMonth(d.getMonth() + 1);
              if (r.repeat === 'yearly')  d.setFullYear(d.getFullYear() + 1);
              r.date = d.toISOString().slice(0, 10);
              r.time = d.toISOString().slice(11, 16);
            }
            updated = true;
          });

          if (updated) {
            fs.writeFileSync('reminders.json', JSON.stringify(reminders, null, 2));
            console.log('reminders.json 已更新');
          } else {
            console.log('本次無到期提醒');
          }
          "

      - name: 推送更新後的 reminders.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reminders.json
          git diff --staged --quiet || git commit -m "更新提醒狀態"
          git push
