name: LINE 提醒通知

on:
  schedule:
    - cron: '*/5 * * * *'   # 每 5 分鐘自動跑（不用手動）。GitHub 排程常延遲，故腳本內設了補發窗
  workflow_dispatch:         # 也可在 Actions 分頁手動觸發測試

permissions:
  contents: write            # 讓 bot 能把更新後的 reminders.json 推回（重要，否則旗標存不住會重複發）

concurrency:
  group: line-reminder
  cancel-in-progress: false

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 檢查並發送 LINE 提醒
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          cat > /tmp/send.js << 'SCRIPT'
          const fs = require('fs');
          const https = require('https');
          const TOKEN = process.env.LINE_TOKEN;
          const USER  = process.env.LINE_USER_ID;
          const FILE  = 'reminders.json';

          // ── 你的需求設定 ──
          const EARLY_MIN  = 10;   // 到期前幾分鐘送「預告」
          const EARLY_WIN  = 12;   // 預告補抓窗：到期前 10~22 分鐘內任一次跑到都會發（吸收排程延遲）
          const GRACE_MIN  = 60;   // 到期後幾分鐘內仍補發正式提醒（吸收排程延遲）

          if (!TOKEN || !USER) {
            console.error('❌ 缺少 LINE_TOKEN 或 LINE_USER_ID');
            console.error('   請到 repo → Settings → Secrets and variables → Actions 設定');
            process.exit(1);
          }

          const repeatLabel = { daily:'每天', weekly:'每週', monthly:'每月', yearly:'每年' };
          const fmt = r => [
            '📌 ' + r.title,
            '📅 ' + r.date + ' ' + r.time,
            r.note ? '📝 ' + r.note : '',
            (r.repeat && r.repeat !== 'none') ? '🔁 ' + (repeatLabel[r.repeat]||r.repeat) : ''
          ].filter(Boolean).join('\n');
          const dueAt = r => new Date(r.date + 'T' + r.time + ':00Z');

          function sendLine(text){
            return new Promise(resolve => {
              const body = JSON.stringify({ to: USER, messages: [{ type:'text', text }] });
              const req = https.request({
                hostname:'api.line.me', path:'/v2/bot/message/push', method:'POST',
                headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+TOKEN,
                          'Content-Length': Buffer.byteLength(body) }
              }, res => {
                let d=''; res.on('data',c=>d+=c);
                res.on('end',()=>{ const ok=res.statusCode>=200&&res.statusCode<300;
                  console.log('LINE 回應 '+res.statusCode+(ok?'':' → '+d)); resolve(res.statusCode); });
              });
              req.on('error', e=>{ console.error('送出錯誤：'+e.message); resolve(0); });
              req.write(body); req.end();
            });
          }

          function advance(r, twNow){
            const d = dueAt(r); let g=0;
            do {
              if (r.repeat==='daily')        d.setUTCDate(d.getUTCDate()+1);
              else if (r.repeat==='weekly')  d.setUTCDate(d.getUTCDate()+7);
              else if (r.repeat==='monthly') d.setUTCMonth(d.getUTCMonth()+1);
              else if (r.repeat==='yearly')  d.setUTCFullYear(d.getUTCFullYear()+1);
              else break;
            } while ((twNow - d)/60000 > GRACE_MIN && ++g < 600);
            r.date = d.toISOString().slice(0,10);
            r.time = d.toISOString().slice(11,16);
            r.notified = false; r.notifiedEarly = false;
          }

          (async () => {
            let reminders;
            try { reminders = JSON.parse(fs.readFileSync(FILE,'utf8')); }
            catch(e){ console.log('reminders.json 讀取失敗'); return; }

            const twNow = new Date(Date.now() + 8*3600*1000);
            console.log('台灣現在時間 ' + twNow.toISOString().slice(0,16).replace('T',' '));
            console.log('提醒筆數 ' + reminders.length);
            let changed = false;

            for (const r of reminders) {
              if (r.done) continue;
              const diff = (twNow - dueAt(r))/60000;   // 正=已過、負=未到（分鐘）
              console.log('· '+r.title+' | '+r.date+' '+r.time+' | diff '+diff.toFixed(1)+'分');

              // ① 提前預告：到期前 EARLY_MIN ~ (EARLY_MIN+EARLY_WIN) 分鐘內，只發一次
              if (diff < -EARLY_MIN && diff >= -(EARLY_MIN+EARLY_WIN) && !r.notifiedEarly) {
                const code = await sendLine('⏰ 提前提醒（約 '+EARLY_MIN+' 分鐘後）\n\n'+fmt(r));
                if (code>=200&&code<300){ r.notifiedEarly=true; changed=true; console.log('  ✓ 已發預告：'+r.title); }
              }

              // ② 到期提醒：含 60 分鐘補發窗，只發一次
              if (diff >= 0 && diff <= GRACE_MIN && !r.notified) {
                const code = await sendLine('🔔 提醒通知\n\n'+fmt(r));
                if (code>=200&&code<300){
                  r.notified=true; changed=true;
                  if (!r.repeat || r.repeat==='none') r.done=true; else advance(r, twNow);
                  console.log('  ✓ 已發到期：'+r.title);
                }
              }

              // ③ 逾期超過補發窗仍沒發到：重複類靜默滾到下一個時點（不洗版）
              if (diff > GRACE_MIN && !r.notified && r.repeat && r.repeat!=='none') {
                advance(r, twNow); changed=true;
                console.log('  ↻ 逾期滾動：'+r.title+' → '+r.date+' '+r.time);
              }
            }

            if (changed){ fs.writeFileSync(FILE, JSON.stringify(reminders,null,2)); console.log('reminders.json 已更新'); }
            else console.log('本次無須變更');
          })();
          SCRIPT
          node /tmp/send.js

      - name: 推送更新後的 reminders.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reminders.json
          if ! git diff --staged --quiet; then
            git commit -m "更新提醒狀態 [skip ci]"
            git pull --rebase
            git push
          fi
